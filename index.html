<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibidem — Recreación Histórica de la Antigüedad Tardía</title>
    
    <!-- Metaetiquetas descriptivas generales -->
    <meta name="description" content="Asociación cultural dedicada a la recreación histórica rigurosa de la vida civil y militar durante la Antigüedad Tardía.">
    
    <!-- Identificadores dinámicos para corregir la URL de Netlify automáticamente -->
    <link id="canonical-link" rel="canonical" href="">
    <meta id="og-url" property="og:url" content="">
    
    <!-- Open Graph / Redes Sociales (Genéricos estáticos) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Ibidem — Recreación Histórica">
    <meta property="og:description" content="Asociación cultural dedicada a la recreación histórica rigurosa de la vida civil y militar durante la Antigüedad Tardía.">
    <meta property="og:image" content="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ibidem — Recreación Histórica">
    <meta name="twitter:description" content="Asociación cultural dedicada a la recreación histórica rigurosa de la vida civil y militar durante la Antigüedad Tardía.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg">

    <!-- Fuentes Corporativas (Cinzel para títulos, Merriweather para textos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">

    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos de precarga respetando la paleta de color institucional (Rojo Sigillata #963b2f) -->
    <style>
        :root {
            --rojo-sigillata: #963b2f;
            --crema-fondo: #fcfaf6;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--crema-fondo);
            font-family: 'Merriweather', serif;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--crema-fondo);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(150, 59, 47, 0.1);
            border-radius: 50%;
            border-top-color: var(--rojo-sigillata);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga inicial estática -->
    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <!-- Contenedor principal donde React monta toda la aplicación -->
    <div id="root"></div>

    <!-- Script automatizado para la corrección de URL dinámica (Solución al problema de compartir enlaces) -->
    <script>
      (function() {
        try {
          // Detecta en tiempo real la URL exacta donde está el usuario
          var currentUrl = window.location.href;
          
          // Localiza las etiquetas preparadas en el <head>
          var canonicalEl = document.getElementById('canonical-link');
          var ogUrlEl = document.getElementById('og-url');
          
          // Las sobrescribe con la dirección real del navegador para evitar el duplicado de Netlify
          if (canonicalEl) {
            canonicalEl.setAttribute('href', currentUrl);
          }
          if (ogUrlEl) {
            ogUrlEl.setAttribute('content', currentUrl);
          }
        } catch (e) {
          console.error("Error al actualizar los metadatos dinámicos:", e);
        }
      })();
    </script>

</body>
</html>
