<!DOCTYPE html>
<html lang="es\" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#963b2f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ibidem: Recreación Histórica</title>
    <meta name="description" content="Asociación de recreación histórica dedicada a la reconstrucción minuciosa de la vida civil romana.">
    <link rel="canonical" href="https://ibidemrecreacion.netlify.app/">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ibidemrecreacion.netlify.app/">
    <meta property="og:title" content="Ibidem: Recreación Histórica">
    <meta property="og:description" content="Asociación dedicada a la reconstrucción minuciosa de la vida civil romana.">
    <meta property="og:image" content="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        romanRed: '#963b2f',
                        romanGold: '#c5a059',
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        // Definición global de iconos simulando la estructura esperada por el componente <Icon />
        const Icons = {
            Facebook: "M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.16 16.45 6.16V8.65H15.17C13.93 8.65 13.55 9.42 13.55 10.21V12.06H16.34L15.89 14.96H13.55V21.96C18.34 21.21 22 17.06 22 12.06C22 6.53 17.5 2.04 12 2.04Z",
            Instagram: "M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6m11.4 2a1 1 0 1 1-1 1 1 1 0 0 1 1-1M12 7a5 5 0 1 1-5 5 5 5 0 0 1 5-5m0 2a3 3 0 1 0 3 3 3 3 0 0 0-3-3Z",
            Mail: "M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 4l-8 5l-8-5V6l8 5l8-5v2Z",
            Menu: "M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z",
            Close: "M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z",
            ChevronUp: "M7.41,15.41L12,10.83L16.59,15.41L18,14L12,8L6,14L7.41,15.41Z"
        };
    </script>
</head>
<body class="bg-stone-900 text-stone-100 font-sans antialiased selection:bg-romanRed selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente auxiliar interno para renderizar los iconos SVG de forma limpia
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg 
                viewBox="0 0 24 24" 
                width={size} 
                height={size} 
                className={`fill-current ${className}`}
                aria-hidden="true"
            >
                <path d={path} />
            </svg>
        );

        // Componente ScrollToTop
        const ScrollToTop = () => {
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const toggleVisibility = () => setVisible(window.scrollY > 300);
                window.addEventListener('scroll', toggleVisibility);
                return () => window.removeEventListener('scroll', toggleVisibility);
            }, []);
            return visible ? (
                <button 
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    className="fixed bottom-6 right-6 bg-romanRed hover:bg-red-800 text-white p-3 rounded-full shadow-lg transition-all duration-300 z-50 hover:scale-110"
                    aria-label="Volver arriba"
                >
                    <Icon path={Icons.ChevronUp} size={24} />
                </button>
            ) : null;
        };

        // Componente de Modales Legales
        const LegalModal = ({ type, onClose }) => {
            const content = type === 'legal' 
                ? { title: "Aviso Legal", text: "En cumplimiento de las normativas de transparencia vigentes, los contenidos expuestos en este sitio web tienen carácter estrictamente divulgativo y cultural de carácter histórico." }
                : { title: "Accesibilidad", text: "Este sitio web ha sido diseñado con criterios de accesibilidad semántica para garantizar la correcta visualización e interpretación por parte de la mayor variedad de usuarios y tecnologías asistivas posibles." };
            
            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm animate-fade-in">
                    <div className="bg-stone-850 border border-stone-700 p-6 rounded-lg max-w-md w-full relative bg-stone-800">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-white">
                            <Icon path={Icons.Close} size={24} />
                        </button>
                        <h3 className="font-cinzel text-xl text-romanGold mb-4">{content.title}</h3>
                        <p className="text-sm text-gray-300 leading-relaxed font-sans">{content.text}</p>
                    </div>
                </div>
            );
        };

        // Componente Principal de la Aplicación
        const App = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [legalModal, setLegalModal] = useState(null);

            // Carga asíncrona de datos.json
            useEffect(() => {
                fetch('./datos.json')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Error al cargar el archivo de datos JSON');
                        }
                        return response.json();
                    })
                    .then(jsonData => {
                        setData(jsonData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            // Pantalla de carga estética
            if (loading) {
                return (
                    <div className="min-h-screen bg-stone-900 flex flex-col items-center justify-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-romanGold mb-4"></div>
                        <p className="font-cinzel text-romanGold tracking-wider text-sm animate-pulse">Cargando Fasti...</p>
                    </div>
                );
            }

            // Manejo de errores de carga
            if (error || !data) {
                return (
                    <div className="min-h-screen bg-stone-900 flex flex-col items-center justify-center p-4 text-center">
                        <p className="font-cinzel text-romanRed text-lg mb-2">Impossibile cargar los datos de la cronología.</p>
                        <p className="text-xs text-stone-400 font-sans">Por favor, asegúrate de que 'datos.json' se encuentra en el mismo directorio raíz.</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    {/* Navegación Principal */}
                    <nav className="bg-stone-950/90 backdrop-blur-md sticky top-0 z-40 border-b border-stone-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <img 
                                    src={data.general.logoUrl} 
                                    alt="Ibidem Logo" 
                                    className="h-12 w-auto filter drop-shadow"
                                    onError={(e) => { e.target.style.display = 'none'; }}
                                />
                                <span className="font-cinzel text-xl tracking-widest text-romanGold font-bold">IBIDEM</span>
                            </div>

                            {/* Menú Escritorio */}
                            <div className="hidden md:flex items-center gap-8 font-cinzel text-sm tracking-wider">
                                <a href="#inicio" className="hover:text-romanGold transition-colors">Inicio</a>
                                <a href="#pilares" className="hover:text-romanGold transition-colors">Rigor</a>
                                <a href="#eventos" className="hover:text-romanGold transition-colors">Fasti</a>
                                <a href={`mailto:${data.general.email}`} className="bg-romanRed hover:bg-red-800 text-white px-4 py-2 rounded transition-colors text-xs font-semibold">Contacto</a>
                            </div>

                            {/* Botón Menú Móvil */}
                            <button 
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)} 
                                className="md:hidden text-stone-300 hover:text-white"
                                aria-label="Abrir menú"
                            >
                                <Icon path={mobileMenuOpen ? Icons.Close : Icons.Menu} size={28} />
                            </button>
                        </div>

                        {/* Desplegable Móvil */}
                        {mobileMenuOpen && (
                            <div className="md:hidden bg-stone-950 border-b border-stone-800 font-cinzel text-center py-4 flex flex-col gap-4 text-sm tracking-wide animate-fade-in">
                                <a href="#inicio" onClick={() => setMobileMenuOpen(false)} className="py-2 hover:text-romanGold">Inicio</a>
                                <a href="#pilares" onClick={() => setMobileMenuOpen(false)} className="py-2 hover:text-romanGold">Rigor</a>
                                <a href="#eventos" onClick={() => setMobileMenuOpen(false)} className="py-2 hover:text-romanGold">Fasti</a>
                                <a href={`mailto:${data.general.email}`} className="mx-auto bg-romanRed text-white px-6 py-2 rounded text-xs w-fit">Contacto</a>
                            </div>
                        )}
                    </nav>

                    {/* Sección Héroe (Inicio) */}
                    <header id="inicio" className="relative h-[70vh] flex items-center justify-center bg-cover bg-center" style={{ backgroundImage: `linear-gradient(to bottom, rgba(28,25,23,0.4), rgba(28,25,23,0.95)), url(${data.general.heroImageHome})` }}>
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <h1 className="font-cinzel text-2xl md:text-4xl text-stone-100 font-bold leading-relaxed tracking-wide mb-6 italic">
                                {data.home.heroTitle}
                            </h1>
                            <div className="w-24 h-1 bg-romanGold mx-auto mb-6"></div>
                            <p className="font-sans text-stone-300 text-base md:text-lg max-w-2xl mx-auto leading-relaxed font-light">
                                {data.home.intro}
                            </p>
                        </div>
                    </header>

                    {/* Pilares / Rigor Arqueológico */}
                    <section id="pilares" className="py-16 bg-stone-900 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                        <div className="grid md:grid-cols-2 gap-8">
                            {data.home.pilares && data.home.pilares.map((pilar, idx) => (
                                <div key={idx} className="bg-stone-950 border border-stone-800 p-8 rounded-lg shadow-xl hover:border-romanGold/50 transition-all group">
                                    <h3 className="font-cinzel text-xl text-romanGold mb-4 font-semibold tracking-wider group-hover:text-white transition-colors">
                                        {pilar.title}
                                    </h3>
                                    <p className="text-stone-300 font-sans font-light leading-relaxed text-sm">
                                        {pilar.text}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Listado de Eventos (Fasti) */}
                    <section id="eventos" className="py-16 bg-stone-950 border-t border-b border-stone-800 w-full">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-12">
                                <h2 className="font-cinzel text-3xl text-romanGold tracking-widest font-bold">FASTI</h2>
                                <p className="text-xs font-sans text-stone-400 tracking-wider mt-2 uppercase">Crónica de nuestras actividades y representaciones</p>
                            </div>

                            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {data.cronologia && data.cronologia.map((evento) => (
                                    <article key={evento.id} className="bg-stone-900 border border-stone-800 rounded-lg overflow-hidden flex flex-col justify-between hover:scale-[1.02] transition-transform duration-300 shadow-lg">
                                        <div>
                                            <div className="h-48 w-full overflow-hidden bg-stone-950 relative">
                                                <img 
                                                    src={evento.coverImage} 
                                                    alt={evento.eventTitle} 
                                                    className="w-full h-full object-cover opacity-85 hover:opacity-100 transition-opacity"
                                                    loading="lazy"
                                                />
                                                <div className="absolute top-3 left-3 bg-romanRed text-white font-cinzel text-[10px] px-2 py-1 rounded tracking-widest uppercase">
                                                    {evento.date.split(" de ")[2] || "Ev."}
                                                </div>
                                            </div>
                                            <div className="p-6">
                                                <span className="text-[11px] font-sans text-romanGold tracking-widest font-medium block mb-1 uppercase">
                                                    {evento.date}
                                                </span>
                                                <h3 className="font-cinzel text-lg text-stone-100 font-bold mb-3 tracking-wide line-clamp-1">
                                                    {evento.eventTitle}
                                                </h3>
                                                <p className="text-xs text-stone-400 font-sans flex items-center gap-1">
                                                    <span className="text-romanGold">📍</span> {evento.location.place}, {evento.location.locality}
                                                </p>
                                            </div>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Pie de Página */}
                    <footer className="bg-stone-950 pt-12 pb-6 border-t border-stone-800 w-full text-center">
                        <div className="max-w-7xl mx-auto px-4">
                            <h2 className="font-cinzel text-xl text-romanGold tracking-widest mb-4 font-bold">IBIDEM</h2>
                            <p className="font-sans text-xs text-stone-400 max-w-sm mx-auto mb-6 leading-relaxed font-light">
                                Asociación de recreación histórica dedicada al estudio riguroso y la divulgación de la vida civil en la antigüedad tardía.
                            </p>
                            
                            {/* RRSS */}
                            <div className="flex justify-center gap-6 text-stone-400 mb-8">
                                <a href={data.general.facebook} target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors" aria-label="Ibidem en Facebook">
                                    <Icon path={Icons.Facebook} size={28} />
                                </a>
                                <a href={data.general.instagram} target="_blank" rel="noopener noreferrer" className="hover:text-white transition-colors" aria-label="Ibidem en Instagram">
                                    <Icon path={Icons.Instagram} size={28} />
                                </a>
                                <a href={`mailto:${data.general.email}`} className="hover:text-white transition-colors" aria-label="Enviar correo a Ibidem">
                                    <Icon path={Icons.Mail} size={28} />
                                </a>
                            </div>

                            {/* Enlaces Legales */}
                            <div className="flex justify-center flex-wrap gap-4 text-xs font-cinzel text-stone-500 mb-6 tracking-wide">
                                <button onClick={() => setLegalModal('legal')} className="hover:text-stone-300 underline transition-colors">Aviso Legal</button>
                                <span aria-hidden="true" className="text-stone-700">|</span>
                                <button onClick={() => setLegalModal('accesibilidad')} className="hover:text-stone-300 underline transition-colors">Accesibilidad</button>
                            </div>

                            <p className="font-cinzel text-[10px] text-stone-600 tracking-widest">
                                &copy; {new Date().getFullYear()} IBIDEM. Todos los derechos reservados.
                            </p>
                        </div>
                    </footer>

                    {/* Ventana Modal Activa */}
                    {legalModal && <LegalModal type={legalModal} onClose={() => setLegalModal(null)} />}
                    
                    {/* Botón flotante para subir */}
                    <ScrollToTop />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
