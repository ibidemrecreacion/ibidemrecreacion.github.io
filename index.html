        :root {
            --color-pompeyano:       #9A2A2A;

        body {
            font-family: 'Merriweather', serif;
            background-color: var(--color-pergamino);

        .scrollbar-hide::-webkit-scrollbar { display: none; }

        a { transition: color 0.3s ease; }

    <script id="ibidem-data" type="application/json">{"general":{"email":"ibidemrecreacion@gmail.com","facebook":"https://www.facebook.com/ibidem.ibidem/","instagram":"https://www.instagram.com/ibidemrecreacion/","logoUrl":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg","heroImageHome":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg"},"home":{"heroTitle":"«Somos lo que recordamos y recordamos para no olvidar quiénes fuimos.»","intro":"Somos una asociación dedicada a la reconstrucción minuciosa de la vida civil romana, centrando nuestro esfuerzo en el detalle de la indumentaria, los oficios y la gastronomía del Imperio. Nuestro enfoque es simple: hacer vivir la historia basándonos siempre en fuentes primarias.","pilares":[{"title":"Rigor arqueológico","text":"Nuestra labor parte de la exégesis de fuentes primarias, iconografía musivaria y hallazgos arqueológicos. Cada prenda, objeto y gesto es el resultado de un proceso de reconstrucción histórica documentada, garantizando una experiencia de divulgación científica de alta fidelidad.","linkTo":"tabularium"},{"title":"Historia habitada","text":"Frente a la narrativa bélica tradicional, Ibidem centra su mirada en la humanitas. Reivindicamos la vida civil de la Antigüedad Tardía, recuperando los espacios de la artesanía, el rito doméstico y la cultura material que definieron la identidad de la persona común.","linkTo":"imagina"},{"title":"Vocación didáctica","text":"Entendemos la recreación como una herramienta pedagógica de primer orden. Actuamos como puentes entre la academia y la sociedad, transformando el rigor de la investigación en una experiencia inmersiva y tangible, orientada a la preservación del patrimonio inmaterial.","linkTo":"fasti"}]},"nostri":{"mainText":"Nuestra historia no comienza en los libros, sino en la curiosidad por entender cómo se sentía, cómo se vestía y cómo se vivía el día a día en la Antigüedad Tardía. Ibidem nació como un grupo de entusiastas del rigor histórico que pronto comprendieron que la mejor forma de proteger el patrimonio es dándolo a conocer de una manera tangible y honesta. Nos alejamos del espectáculo bélico para centrar nuestro esfuerzo en la vida civil. Para nosotros, reconstruir un par de zapatos siguiendo un hallazgo arqueológico o recrear el rito de la mesa en una villa romana es un acto de respeto hacia quienes nos precedieron. No pretendemos ser actores que interpretan un papel; nos consideramos divulgadores en activo que utilizan la arqueología experimental como herramienta para conectar el presente con nuestro pasado común. A lo largo de los años, Ibidem ha evolucionado hasta convertirse en un interlocutor de confianza para museos e instituciones culturales. Sin embargo, en el corazón de nuestro proyecto sigue latiendo la misma pasión del primer día: la de habitar la historia para que esta no se olvide, cuidando cada detalle —desde la costura de una túnica hasta la composición de un pigmento— para que el espectador no solo vea el pasado, sino que lo sienta.","founder":{"name":"José Montesinos Moreno","years":"1969–2022","desc":"Ibidem nació de la mente y la experiencia de Pepe Montesinos, fundador y coordinador de nuestro grupo. Pepe era tremendamente inteligente, curioso, inquieto, inconformista, polémico, infatigable y tan generoso que allá por donde pasó dejó un poco (más bien mucho) de su esencia. Y todo ello lo hacía con tanto sentido del humor que era imposible no dejarse llevar por esa tormenta creativa que era Pepe. Era un polímata con el que poder debatir sobre lo más profundo de la naturaleza humana o satirizar hasta el absurdo cualquier tema. Sus manos dominaron la pintura, el modelado, la costura, la artesanía y su mente era capaz de reconciliar campos del conocimiento aparentemente inconexos para llegar a conclusiones tan divergentes como curiosas. Para la gente de Ibidem no solo fue un coordinador: fue un amigo, un líder, un maestro al que poder acudir en cualquier momento. Por eso su ausencia se hace tan dura. Se te echa tanto de menos, Pepe...","image":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Bio.jpg"}},"tabularium":[{"id":5,"category":"Ciencia","title":"Llegas tarde a los idus de marzo","antetitle":"Cuando César intentó domar el tiempo","author":"Juan Alberto Aguilar","date":"12 de marzo de 2026","summary":"Si planeas acudir al Foro el próximo 15 de marzo para conmemorar la muerte de César has de saber que llegarás tarde.","img":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Articulos/Idus_marzo/Idus_marzo.png","caption":"Julio César fue asesinado en la curia de Pompeyo frente a la escultura monumental de éste.","intro":"Si planeas acudir al Foro Romano el próximo 15 de marzo para conmemorar la muerte de Julio César, llegarás tarde. Un año antes de su muerte, César implantó un nuevo calendario en Roma, el juliano, que el tiempo demostró que no eran tan perfecto como su promotor pretendía.","sections":[{"title":"La importancia de contar el tiempo","content":"<p>El tiempo ha sido y sigue siendo una de las grandes incógnitas de la Humanidad. En las civilizaciones de la Antigüedad, la medición del tiempo constituía una necesidad de primer nivel para el Estado. Para una sociedad de base agraria, la sincronización con los ciclos solares no era un mero capricho cultural o religioso. **El calendario permitía predecir con exactitud los periodos de siembra y cosecha**; un desfase administrativo prolongado podía derivar en hambrunas y en la desestabilización del orden público.<br/><br/>Más allá de la agricultura, medir el tiempo con exactitud permitía la articulación de tres ejes fundamentales para cualquier poder centralizado:\n\n- **Sincronización logística y militar:** La movilización de las legiones y el transporte de suministros dependían de las ventanas climáticas. Un calendario errático impedía planificar campañas militares o asegurar la llegada del grano a las ciudades antes del cierre de la navegación invernal.\n- **Seguridad jurídica y fiscal:** El cobro de tributos y el pago de deudas requerían plazos fijos. Sin un calendario fiable, el sistema de crédito colapsaba, pues los intereses y las liquidaciones se volvían arbitrarios, generando una inseguridad que paralizaba el comercio.\n- **Legitimación religiosa:** En el mundo antiguo, el éxito de las instituciones dependía del favor divino (*pax deorum*). Celebrar un sacrificio o una festividad fuera del día prescrito por el orden natural se consideraba una negligencia grave que invalidaba la acción del magistrado y ponía en riesgo la estabilidad del Estado.<br/><br/>El paso de los calendarios lunares —más sencillos de observar pero difíciles de ajustar a los ciclos de las estaciones— a los solares marcó la transición hacia una administración más eficiente. En civilizaciones como la romana, el calendario dejó de ser un registro de fases lunares para convertirse en el sistema sobre el que se calculaban presupuestos, se dictaban leyes y se proyectaba la expansión imperial.</p>"},{"title":"Los idus llegan tarde","content":"<p>En los *idus* de marzo del 709 *ab urbe condita* (el 15 de marzo del año 44 a. C.), Julio César fue asesinado por una conspiración senatorial en la curia de Pompeyo, un lugar identificado hace unos años por investigadores del CSIC. Esa fecha se ha convertido en una importante cita que reúne a curiosos y aficionados a la Historia frente al altar de Julio César (un ara que levantó Augusto en el lugar donde fue incinerado el cuerpo de César y que todavía se conserva en los restos del templo del divino Julio) para celebrar el aniversario del magnicidio. Sin embargo, si quisiéramos ser astronómicamente precisos y conmemorar el aniversario de los *idus* el día que la Tierra ocupa la misma posición que aquel fatídico mediodía del 44 a. C., llegamos con unas horas de retraso.<br/><br/>Para entender cómo ha podido suceder esto necesitamos conocer cómo era la reforma del calendario que el propio César había instaurado poco antes de morir, así como las consecuencias de los cálculos que llevaron al mismo.</p>","image":{"src":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Articulos/Idus_marzo/Funeral_Cesar.jpg","caption":"La pira funeraria de César se erigió en el Foro romano, en el lugar donde años después se levantó el Templo del divino Julio. Ilustración de Jean Claude Golvin."}},{"title":"El subjetivo calendario de la República","content":"<p>Antes de la intervención de César, **el calendario romano era un sistema lunar de 355 días** que exigía una vigilancia constante para evitar el desajuste de las estaciones. La responsabilidad de mantener este orden recaía en el colegio de pontífices, con el *pontifex maximus* a la cabeza. Sin embargo, en la práctica, la gestión de los meses se convirtió en un instrumento de manipulación para las élites.<br/><br/>Las magistraturas (cargos públicos y políticos) en la República de Roma eran estrictamente anuales y el calendario dictaba la duración exacta del mandato de un político. Los magistrados curules —cónsules y pretores—, que ostentaban el máximo poder ejecutivo, dependían de la decisión de los pontífices de añadir o no el mes intercalar, el Mercedonius. Si el cónsul de turno era un aliado, el calendario se «estiraba» para prolongar su estancia en el poder; si era un adversario, el año se acortaba deliberadamente. El tiempo no era una magnitud física, sino un recurso elástico gestionado a voluntad.<br/><br/>Esta arbitrariedad tenía consecuencias críticas en la columna vertebral de la República: el fisco. El término «calendario» deriva de las ***kalendae***, el primer día de cada mes, fecha señalada para el cobro de intereses y la liquidación de deudas. En una economía que dependía de un complejo sistema de crédito, la incertidumbre temporal generaba una inseguridad jurídica constante. Si los pontífices alteraban la duración del año por intereses políticos, los acreedores perdían días de devengo y los deudores se veían asfixiados por plazos imprevistos.<br/><br/>Asimismo, la gestión de la *annona* —el suministro de grano para la plebe— y la recaudación del *tributum* exigían una planificación que el viejo sistema ya no podía sostener. Un desfase de semanas respecto al ciclo real de las cosechas provocaba cuellos de botella en el transporte marítimo desde provincias como África o Sicilia, disparando los precios del trigo. César entendió que para estabilizar un imperio que ya era una realidad territorial, necesitaba arrebatar el tiempo a los sacerdotes y convertirlo en una unidad de medida estable y previsible. El calendario debía dejar de ser un privilegio para pasar a ser una herramienta del Estado.</p>","subsections":[]},{"title":"La ciencia alejandrina al servicio de Roma","content":"<p>La reforma juliana no fue el resultado de la ciencia romana, históricamente más volcada en el derecho y la ingeniería militar que en la astronomía teórica. Fue, en esencia, un botín cultural obtenido tras la estancia de César en Egipto. Allí, el dictador comprendió que **el calendario solar egipcio, con una tradición de milenios, era infinitamente superior al arcaico sistema lunar de Roma**.<br/><br/>La figura clave en este proceso fue el astrónomo y filósofo **Sosígenes de Alejandría**. Su papel ilustra la dependencia de las élites romanas respecto al conocimiento helenístico para resolver problemas de gestión imperial. Al contratar a Sosígenes, César no solo buscaba exactitud, sino importar un sistema de control universal que ya había demostrado su eficacia en la administración de los Ptolomeos.<br/><br/>Esta transferencia tecnológica supuso una ruptura con la tradición itálica. Al adoptar el modelo solar alejandrino, César impuso en Roma una lógica científica griega que desplazaba los ritos ancestrales de los pontífices. La ciencia de Alejandría se convirtió así en el soporte técnico del nuevo orden político romano. Este hecho subraya una realidad recurrente en la Antigüedad: la estabilidad de un imperio no solo dependía de sus legiones, sino de su capacidad para absorber y aplicar los avances técnicos de las culturas que sometía.</p>","image":{"src":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Articulos/Idus_marzo/Sosigenes.png","caption":"Sosígenes de Alejandría fue la mente detrás de la reforma juliana del calendario romano."}},{"title":"El año de la confusión","content":"<p>Cuando César se propuso enmendar el desajuste acumulado durante décadas, **el calendario civil se había adelantado casi tres meses a las estaciones astronómicas**. Las fiestas de la vendimia, por ejemplo, caían a mediados del verano. Tras su estancia en Egipto, el líder romano entendió que la solución técnica exigía abandonar el ciclo lunar y adoptar un año solar de 365 días, incorporando un día adicional cada cuatro años para absorber la fracción restante. Este ajuste matemático de 365,25 días estaba diseñado para dotar a la administración de una sincronización inalterable a largo plazo.<br/><br/>Pero para poner en marcha este sistema, primero había que remendar el caos derivado del calendario anterior. **César decretó que el año 46 a. C. sirviese como periodo de transición**. Al año regular y al mes intercalar, el Estado impuso la inserción de dos meses extraordinarios entre noviembre y diciembre. El resultado fue un periodo anómalo de 445 días, un reajuste que los ciudadanos romanos tuvieron que soportar y que pasó a la historia como el ***annus confusionis*** o «año de la confusión».<br/><br/>Aquella medida drástica fue más allá de lo puramente administrativo al suponer una exhibición de poder absoluto. Al obligar a toda la República a adoptar esta irregularidad para forzar la cuadratura con el ciclo natural, el dictador dejaba patente que su autoridad no conocía límite alguno.<br/><br/>El 1 de enero del 45 a. C., el calendario juliano entró en vigor con las estaciones restauradas en su lugar legítimo. No obstante, esto fue percibido por sus enemigos en el Senado como una prueba más de su tiranía. La monopolización del tiempo bajo el mando de un solo hombre dio más argumentos a quienes, apenas catorce meses después, acabaron con su vida en los *idus* de marzo.</p>","subsections":[]},{"title":"Un sistema no tan perfecto","content":"<p>El diseño del astrónomo alejandrino se basaba en una premisa matemática elegante: un año de 365 días y un cuarto. La inserción del **día bisiesto** (cuya denominación proviene de *ante diem bis sextum kalendas martias* -el segundo sexto día antes de las calendas de marzo-, nombre que tenía el día intercalar entre el 23 y 24 de febrero) cada cuatro años parecía resolver cualquier desajuste futuro. Sin embargo, la mecánica celeste no obedece a fracciones exactas. **El año trópico** —el tiempo real que invierte la Tierra en completar su órbita en torno al Sol— **no dura 365,25 días, sino aproximadamente 365,24219 días**.<br/><br/>Esa discrepancia de apenas once minutos y catorce segundos anuales supuso, a largo plazo, el fracaso del calendario juliano. Lo que en la vida de un ciudadano romano resultaba del todo imperceptible, a escala histórica se convirtió en un desfase más que apreciable. El sistema acumulaba un día completo de retraso respecto a los equinoccios cada ciento veintiocho años. Así, la herramienta concebida para dotar a Roma de una estabilidad temporal perpetua comenzó a desfasarse desde el mismo instante de su promulgación.<br/><br/>Aquel leve error de cálculo astronómico sería el responsable de que, siglos más tarde, la Iglesia tuviera que intervenir para evitar que el calendario litúrgico se desfasara aún más cada año.</p>","subsections":[]},{"title":"La reforma gregoriana","content":"<p>El desajuste del sistema juliano continuó su curso mucho después de la caída del Imperio. Para finales del siglo XVI, los once minutos de desfase anual se habían acumulado hasta convertirse en un problema de primer orden para el Vaticano. El equinoccio de primavera, referencia para el cálculo de la Pascua, se había adelantado diez días respecto a la fecha en la que solía caer durante los primeros siglos del cristianismo.<br/><br/>En 1582, el papa **Gregorio XIII** promulgó la bula ***Inter gravissimas*** para atajar esta deriva. Asesorado por el astrónomo jesuita **Cristóbal Clavio**, el pontífice ordenó suprimir diez días del mes de octubre de aquel año. Tras el jueves 4 de octubre, el calendario civil saltó directamente al viernes 15. Sin embargo, la Iglesia no pretendía restaurar el cielo de la República romana, pues su único objetivo era devolver el equinoccio al **21 de marzo**. Esa era la fecha en la que se encontraba durante el **Concilio de Nicea** en el año 325 d. C., momento en el que se habían estandarizado las reglas matemáticas para datar la Semana Santa.<br/><br/>Al calibrar el año tomando como base el siglo IV y no el siglo I a. C., la reforma gregoriana eliminó los diez días de desfase acumulados desde Nicea, pero dejó intactos los casi tres días de error que ya se habían sumado entre el asesinato de César y la celebración de dicho concilio. El papado salvó así su liturgia, pero condenó el aniversario del dictador.</p>","image":{"src":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Articulos/Idus_marzo/Inter_gravissima.png","caption":"Con la bula Inter gravissimas (1582) se corrigió el desfase del calendario juliano, instaurándose el calendario gregoriano que usamos en la actualidad."}},{"title":"Una conmemoración desfasada","content":"<p>La decisión papal provocó que el 15 de marzo del calendario gregoriano actual no se corresponda con la posición que ocupaba la Tierra en su órbita cuando los conjurados desenvainaron sus armas en la curia de Pompeyo. Si se mide el tiempo transcurrido desde aquel mediodía del año 44 a. C. mediante el rigor de los días solares, el aniversario exacto del magnicidio recae en nuestro actual 12 de marzo.<br/><br/>Conmemorar los *idus* en su fecha nominal es, en definitiva, una cuestión cultural y no física. El 15 de marzo continuará siendo la cita oficial para el recuerdo en el Foro Romano. No obstante, la evidencia astronómica impone un hecho innegable: para cuando las flores lleguen al altar de César, el Sol ya habrá dejado atrás, con setenta y dos horas de antelación, el punto exacto del espacio en el que Julio César exhaló su último aliento.</p>","subsections":[]}],"bibliography":[{"author":"Plutarco","title":"Vidas paralelas: Alejandro y César"},{"author":"Suetonio","title":"Vida de los doce césares"},{"author":"Gregorio XIII","title":"Bula Inter gravissimas","year":"1582"},{"author":"Feeney, Denis","title":"Caesar's Calendar: Ancient Time and the Beginnings of History","publisher":"University of California Press","year":"2007"},{"author":"Michels, Agnes Kirsopp","title":"The Calendar of the Roman Republic","publisher":"Princeton University Press","year":"1967"},{"author":"Rüpke, Jörg","title":"The Roman Calendar from Numa to Constantine: Time, History, and the Fasti","publisher":"Wiley-Blackwell","year":"2011"},{"author":"Coyne, G. V., Hoskin, M. A. y Pedersen, O.","title":"Gregorian Reform of the Calendar: Proceedings of the Vatican Conference to Commemorate its 400th Anniversary","publisher":"Pontifical Academy of Sciences","year":"1983"}]},{"id":4,"category":"Religión","title":"¿Cuándo nació realmente la Navidad?","antetitle":"Cristianismo primitivo","author":"Juan Alberto Aguilar","date":"22 de diciembre de 2025","summary":"Cada año, al encender las luces y adornar nuestros hogares en diciembre, se repite la misma historia: la Navidad no es más que una fiesta pagana reciclada, una simple copia de las celebraciones romanas del solsticio. Esta narrativa, aunque popular, simplifica en exceso un fascinante proceso histórico y teológico que duró siglos. La realidad, como a menudo sucede en la Antigüedad tardía, es mucho más compleja, entrecruzando creencias cristianas, tradiciones judías, cálculos astronómicos y, por supuesto, la política imperial.","img":"https://www.walksinrome.com/uploads/2/5/1/0/25107996/adoration-of-the-three-magi-fresco-catacombs-of-priscilla-rome_orig.jpg","caption":"Los tres Reyes Magos, en las catacumbas de Priscila, es la imagen más antigua conservada (siglo III) de la Natividad.","intro":"Cada año, al encender las luces y adornar nuestros hogares en diciembre, se repite la misma historia: la Navidad no es más que una fiesta pagana reciclada, una simple copia de las celebraciones romanas del solsticio. Esta narrativa, aunque popular, simplifica en exceso un fascinante proceso histórico y teológico que duró siglos. La realidad, como a menudo sucede en la Antigüedad tardía, es mucho más compleja, entrecruzando creencias cristianas, tradiciones judías, cálculos astronómicos y, por supuesto, la política imperial.\n\nSi los primeros cristianos, que estaban más enfocados en la resurrección de Jesús que en su nacimiento, evitaban celebrar cumpleaños (una práctica que figuras como Orígenes consideraban «pagana» o digna solo de pecadores como Herodes y el Faraón), surge la pregunta crucial para la historia: **¿Por qué, y cómo, se estableció el 25 de diciembre como la fecha de la Natividad?**","sections":[{"title":"Dos teorías enfrentadas","content":"Aunque es algo más complejo, podemos decir que la historiografía moderna explica el origen del 25 de diciembre como fecha para el nacimiento de Jesús en torno a dos grandes hipótesis que se confrontan desde el siglo XIX: la **teoría de la historia de las religiones** y la **teoría del cálculo**.","subsections":[{"subtitle":"La sombra del «Sol invictus»: la teoría de la sustitución","content":"La teoría más conocida es que la Iglesia eligió intencionadamente el 25 de diciembre para sustituir la fiesta pagana del *Dies natalis Solis invicti* (Día del nacimiento del Sol invicto). Esta celebración honraba al dios Sol, y su fecha coincidía con el solsticio de invierno en el calendario romano, un momento que simboliza el renacimiento de la luz tras la noche más larga del año.\n\nEl culto al *Sol Invictus* había ganado gran relevancia en Roma a partir del emperador Aureliano, quien en el año 274 d. C. lo convirtió en un culto oficial e instituyó juegos cuatrienales. Para los defensores de esta hipótesis, como argumentó el historiador Hermann Usener, los primeros líderes cristianos, amenazados por la popularidad persistente de estos rituales paganos, decidieron superponer la celebración de la Natividad. De esta manera, el recién nacido Jesús se convertía en el verdadero **«Sol de justicia»** (*Sol justitiae*), eclipsando a la deidad solar pagana.","image":{"src":"https://substackcdn.com/image/fetch/$s_!mGmI!,w_1456,c_limit,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F704449fc-a25d-4277-906b-bc82f0c8f2cf_2609x1468.jpeg","caption":"Mosaico de Cristo como *Sol Invictus* (c. 250 d. C.) hallado en el Mausoleo de los Julios, bajo la basílica de San Pedro."}},{"subtitle":"La teoría del cálculo","content":"La hipótesis rival, impulsada por académicos como Louis Duchesne y Thomas Talley, descarta la influencia pagana como factor primario y argumenta que la fecha provino de la **cronología interna de la fe cristiana**.\n\nEsta teoría sostiene que el 25 de diciembre se estableció al calcular nueve meses exactos después de la fecha fijada para la concepción de Jesús (la Anunciación). La clave de la cronología radicaba en una creencia que se había extendido en el cristianismo temprano: los profetas (o, en el caso de Jesús, un ser perfecto) debían vivir un número entero de años, lo que significaba que **su concepción y su muerte (Pasión) ocurrían en el mismo día del año**.\n\nLos cristianos latinos en Occidente, basándose en esta idea de «edad integral», calcularon que Jesús murió el **25 de marzo**, la fecha tradicional del equinoccio de primavera en el calendario romano. Si la concepción también ocurrió el 25 de marzo, la suma de nueve meses de gestación resultaba en el 25 de diciembre para el nacimiento. Ya para el año 221 d. C., escritores patrísticos como Sexto Julio Africano habían postulado este esquema de concepción/pasión el 25 de marzo, lo que implicaba un nacimiento en diciembre."}]},{"title":"Los primeros testimonios: el conflicto entre Oriente y Occidente","content":"A pesar de las sofisticadas teorías de cálculo, la incertidumbre sobre la fecha era la norma en la Iglesia primitiva. Clemente de Alejandría, hacia el año 200 d. C., registró que varias comunidades proponían fechas de nacimiento en marzo, abril o mayo, pero el 25 de diciembre no figura entre ellas.\n\nLa evidencia documental más antigua e indiscutible que fijaba la Natividad en el 25 de diciembre se encuentra en Roma, en el **Cronógrafo del 354**. Este manuscrito incluye la nota en latín: *VIII kal. Ian. natus Christus in Betleem Iudeae* (Nacimiento de Cristo en Belén de Judea, el 25 de diciembre). Una sección de este documento parece datar originalmente del 336 d. C. e indica que en Roma, la Natividad en esta fecha ya marcaba el inicio del año eclesiástico.\n\nNo obstante, esta fecha no fue universalmente aceptada. En el Imperio oriental la fiesta más importante era la **Epifanía** (Manifestación), que se celebraba el **6 de enero**. Para los cristianos orientales, la Epifanía era originalmente una celebración integral que conmemoraba el nacimiento, la adoración de los Magos, el primer milagro en Caná y, sobre todo, el **bautismo de Jesús** en el Jordán.\n\nJuan Crisóstomo (c. 347-407), predicando en Constantinopla, justificó la adopción del 25 de diciembre por parte de la comunidad y señaló que la fecha ya era celebrada en Roma desde el principio, por antigua tradición. La introducción del 25 de diciembre como fiesta separada del Nacimiento comenzó en Roma (336 d. C.) y se extendió lentamente hacia el este: Antioquía adoptó la fecha hacia el 370 y Constantinopla hacia el 380. Incluso el 6 de enero oriental tenía su propia justificación por cálculo: nueve meses después del 6 de abril, fecha que en Oriente se asociaba a la concepción y crucifixión.","image":{"src":"https://www.tertullian.org/fathers/chronography_images/06_december.png","caption":"Ilustración del mes de diciembre en el Cronógrafo del 354, el documento que contiene la primera mención escrita de la Navidad el 25 de diciembre."}},{"title":"Una fusión de fe y política astronómica","content":"Es improbable que la Navidad se deba a un solo factor. Hoy, muchos académicos reconocen que este debate simplificado ignora la complejidad histórica, social y política que hay detrás de esta fecha.\n\nPor un lado, la **teoría del cálculo** muestra que la fecha del 25 de diciembre tiene raíces en la especulación cronológica cristiana que precede a la oficialización del *Natalis Solis Invicti* de Aureliano en 274 d. C. El hecho de que San Agustín estuviera familiarizado con el esquema 25 de marzo/25 de diciembre refuerza la antigüedad del concepto dentro del pensamiento teológico.\n\nPor otro lado, la **teoría de la historia de las religiones** resalta el innegable contexto político y simbólico en el que la fiesta se consolidó. El historiador Steven Hijmans argumenta que, más que una apropiación, la fiesta pagana del *Sol Invictus* pudo haber sido instaurada por Aureliano precisamente para contrarrestar una fecha que ya era reverenciada por la creciente comunidad cristiana en Roma.\n\nEn última instancia, la fecha del 25 de diciembre se formalizó en el Imperio Romano en un momento de gran sincretismo y búsqueda de unidad. El emperador Constantino I, quien continuó usando la iconografía del *Sol Invictus* en su acuñación (al menos hasta c. 317 d. C.) y mantuvo el título de *pontifex maximus* hasta su muerte, fomentó la celebración. Al institucionalizar la Natividad en esta fecha, la Iglesia fusionó con éxito el simbolismo solar cósmico —donde la *lux mundi* (luz del mundo, es decir, Jesús) nacía cuando los días comenzaban a alargarse— con una teología profundamente arraigada en los cálculos de la Pasión. El triunfo de la fecha fue, por tanto, una combinación de teología, cálculo y pragmatismo político imperial."}],"bibliography":[{"author":"Talley, Thomas J.","title":"The Origins of the Liturgical Year","publisher":"Pueblo Publishing Company","year":"1991"},{"author":"Roll, Susan K.","title":"Toward the Origins of Christmas","publisher":"Peeters Publishers","year":"1995"},{"author":"Hijmans, Steven E.","title":"Sol Invictus, the Winter Solstice, and the Origins of Christmas","publisher":"Mouseion","year":"2003","pages":"377-398"},{"author":"McGowan, Andrew","title":"How December 25 Became Christmas","publisher":"Bible Review","year":"2002"}]},{"id":3,"category":"Religión","title":"Los Lares: guardianes del hogar romano","antetitle":"Culto doméstico","author":"Ibidem","date":"15 de diciembre de 2025","summary":"Descubre cómo los romanos honraban diariamente a los espíritus protectores de su hogar a través de rituales que fortalecían los lazos familiares y aseguraban la prosperidad.","img":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/tabularium/larario/Larario_Lararium.jpg","caption":"","intro":"En cada hogar romano, desde la más humilde *insula* hasta la más suntuosa *domus*, existía un espacio sagrado dedicado a los **Lares**, los espíritus protectores de la familia. Estos dioses menores, representados como jóvenes danzantes vestidos con túnicas cortas, eran los **guardianes invisibles** que velaban por la seguridad, la prosperidad y la armonía del núcleo familiar. El culto a los Lares no era una mera superstición, sino el **corazón pulsante de la religiosidad romana**, una práctica diaria que conectaba lo divino con lo cotidiano.","sections":[{"title":"Orígenes y naturaleza de los Lares","subsections":[{"subtitle":"De espíritus agrícolas a protectores domésticos","content":"Los Lares tienen un origen **etrusco-itálico** anterior a la propia Roma. Inicialmente, estos espíritus estaban asociados a los campos y las encrucijadas (*Lares Compitales*), protegiendo las tierras de cultivo y los límites territoriales. Con el tiempo, su culto se **domesticó**, transformándose en los *Lares Familiares* que custodiaban cada hogar.\n\nSegún la tradición, los Lares eran:\n\n- Espíritus de antepasados difuntos que permanecían ligados al hogar\n- Guardianes de la familia y sus posesiones\n- Intermediarios entre los vivos y el mundo divino\n- Protectores contra el fuego, el robo y las enfermedades","image":{"src":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/tabularium/larario/Genio_Lares.jpg","caption":"Fresco pompeyano mostrando dos Lares flanqueando el Genius del pater familias."}},{"subtitle":"Iconografía: jóvenes eternos en perpetuo movimiento","content":"En la iconografía romana, los Lares aparecen típicamente como **jóvenes imberbes** vestidos con túnicas cortas (*tunicae exiguae*) ceñidas, en actitud de danza. Portan en una mano una *patera* (plato para libaciones) y en la otra un *rhyton* o cuerno para verter vino. Esta representación no es casual: el **movimiento perpetuo** simboliza su constante vigilancia sobre el hogar."}]},{"title":"El lararium: el altar doméstico","subsections":[{"subtitle":"Ubicación y arquitectura","content":"El *lararium* era el **santuario doméstico** donde se rendía culto a los Lares. Su ubicación variaba según la riqueza de la familia:\n\n1. En las *domus* aristocráticas: nicho monumental en el *atrium*, a menudo profusamente decorado con frescos.\n2. En hogares modestos: pequeño armario de madera o simple repisa.\n3. En *insulae*: hornacinas en las paredes o altares portátiles.\n\nLa estructura típica incluía:","image":{"src":"https://upload.wikimedia.org/wikipedia/commons/f/f0/House_altar%2C_Herculaneum_2005.jpg","caption":"Larario de la casa del altar. Herculano."}},{"subtitle":"Elementos del culto","content":"El lararium contenía diversos elementos rituales esenciales:\n\n- **Estatuillas** de los Lares (generalmente en bronce o terracota)\n- Imagen del **Genius** del *pater familias* (espíritu tutelar del cabeza de familia)\n- Representaciones de los **Penates** (dioses protectores de la despensa)\n- Una **serpiente** (*agathodaemon*), símbolo de prosperidad y fertilidad\n- Instrumentos para las ofrendas: *patera*, *acerra* (incensario), lucernas\n\nLa presencia de la serpiente es particularmente significativa. Este reptil, asociado con el mundo subterráneo y la regeneración, actuaba como **guardián del umbral** entre el mundo de los vivos y el de los muertos."}]},{"title":"Rituales cotidianos: la pietas familiar","content":"El culto a los Lares no era ocasional, sino una **práctica diaria** que estructuraba la vida familiar romana. Estos rituales reforzaban la jerarquía doméstica y la cohesión del grupo.\n\n**Ritual matutino:**\n\nCada mañana, al despertar, el *pater familias* o la *mater familias* se acercaba al lararium para saludar a los Lares. Se encendían lucernas y se quemaba incienso mientras se pronunciaban breves plegarias pidiendo protección para el día.\n\n**Ofrendas alimentarias:**\n\nAntes de cada comida principal, se depositaban pequeñas porciones de comida en el lararium:\n\n- Pan y sal (alimentos básicos de pureza)\n- Vino diluido con agua\n- Flores frescas (violetas, rosas)\n- Miel y pasteles en ocasiones especiales\n\nEstas ofrendas no eran consumidas por nadie; se dejaban hasta que se descompusieran naturalmente, momento en que eran retiradas y quemadas.","image":{"src":"https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/tabularium/larario/Larario_ofrenda_matutina.jpeg","caption":"Recreación de una familia romana realizando la ofrenda matutina a los Lares."}},{"title":"Festividades especiales","subsections":[{"subtitle":"Las Compitalia: cuando el barrio celebra","content":"Las **Compitalia** (a inicios de enero) eran las fiestas más importantes dedicadas a los Lares. Durante estos días, las familias del mismo *vicus* (barrio) se reunían en los *compita* (encrucijadas) para honrar a los *Lares Compitales*.\n\nLas celebraciones incluían:\n\n- Sacrificios de cerdos y ovejas en las encrucijadas\n- Competiciones atléticas y juegos\n- Banquetes comunitarios donde ricos y pobres compartían mesa\n- Liberación temporal de esclavos de sus obligaciones laborales\n\nEsta fiesta tenía un **carácter subversivo**: durante las Compitalia, las jerarquías sociales se difuminaban temporalmente, permitiendo una convivencia excepcional entre todas las clases."},{"subtitle":"Eventos familiares: bodas, nacimientos y funerales","content":"Los Lares eran testigos obligados de todos los **momentos cruciales** de la vida familiar:\n\n**En las bodas (*nuptiae*):**\n\nLa novia, al entrar por primera vez en su nuevo hogar, debía ungir el umbral con aceite y grasa de lobo, y realizar una ofrenda al lararium. Este acto simbolizaba su **incorporación a los Lares de la nueva familia** y su ruptura con los de su hogar paterno.\n\n**En los nacimientos (*dies lustricus*):**\n\nOcho días después del nacimiento de una niña (nueve para un niño), se realizaba una ceremonia de purificación ante el lararium, donde el recién nacido era oficialmente presentado a los Lares familiares y recibía su nombre.\n\n**En los funerales (*funus*):**\n\nAntes de que el cortejo fúnebre abandonara la casa, se realizaba una última ofrenda a los Lares, pidiendo que acogieran al difunto entre los espíritus protectores del hogar."}]},{"title":"El papel de los esclavos en el culto","content":"Contrariamente a lo que podría pensarse, los **esclavos tenían un papel activo** en el culto a los Lares. De hecho, muchas fuentes sugieren que eran ellos quienes mantenían el fuego sagrado del hogar y realizaban las ofrendas cotidianas bajo la supervisión del *pater familias*.\n\nEsta participación servía varios propósitos:\n\n- Integraba a los esclavos en la estructura religiosa familiar\n- Les otorgaba una forma de **dignidad ritual** dentro de su condición servil\n- Reforzaba su lealtad hacia la *domus* y sus amos\n- Les garantizaba la protección de los Lares al igual que a los miembros libres\n\nAlgunos esclavos especialmente devotos podían incluso encargar pequeños lararios portátiles para sus propios *cubicula* (habitaciones), una práctica que las fuentes arqueológicas han confirmado en Pompeya y Herculano."},{"title":"Declive y cristianización","content":"Con la **cristianización del Imperio** en el siglo IV d. C., el culto a los Lares fue progresivamente abandonado, aunque no sin resistencia. Los edictos imperiales que prohibieron los sacrificios paganos (391-392 d. C.) pusieron fin oficial a estas prácticas, pero la evidencia arqueológica sugiere que continuaron de forma **clandestina** durante décadas.\n\nCuriosamente, muchos elementos del culto a los Lares fueron **absorbidos por el cristianismo**:\n\n- Los lararios fueron sustituidos por altares domésticos con iconos cristianos\n- Las ofrendas de comida se transformaron en limosnas a los pobres\n- Los santos patronos asumieron funciones protectoras similares a las de los Lares\n- La costumbre de encender velas en el hogar perduró con significado cristiano\n\nEsta continuidad revela hasta qué punto el culto doméstico estaba **profundamente arraigado** en la psique romana, trascendiendo los cambios religiosos oficiales."}],"bibliography":[{"author":"Orlin, Eric M.","title":"Foreign Cults in Rome: Creating a Roman Empire","publisher":"Oxford University Press","year":"2010","pages":"45-78"},{"author":"Flower, Harriet I.","title":"The Dancing Lares and the Serpent in the Garden: Religion at the Roman Street Corner","publisher":"Princeton University Press","year":"2017"},{"author":"Foss, Pedar W.","title":"Watchful Lares: Roman Household Organization and the Rituals of Cooking and Dining","publisher":"En Laurence, R. y Wallace-Hadrill, A. (eds.), Domestic Space in the Roman World: Pompeii and Beyond","year":"1997","pages":"196-218"},{"author":"Bakker, Jan Theo","title":"Living and Working with the Gods: Studies of Evidence for Private Religion and its Material Environment in the City of Ostia","publisher":"J. C. Gieben","year":"1994"}]},{"id":2,"category":"Vida cotidiana","title":"La dieta de los gladiadores: 3 verdades sorprendentes que desafían el mito","antetitle":"","author":"Ibidem","date":"26 de octubre de 2025","summary":"¿Héroes musculados o luchadores de sumo? Descubre la sorprendente realidad dietética de los gladiadores romanos: cebada, grasa y supervivencia.","img":"https://placehold.co/1000x400/8B4513/F5EFE3?text=HOMBRES+DE+CEBADA","caption":"","intro":"Cuando pensamos en un gladiador romano, la imagen que suele venir a la mente es la de un héroe de acción de Hollywood: un físico esculpido, con músculos de acero y una definición corporal perfecta. Pero ¿y si te dijera que los gladiadores de la antigua Roma se parecían más a luchadores de sumo que a los héroes de la gran pantalla? La evidencia histórica nos cuenta una historia muy diferente, una donde la dieta no buscaba la estética, sino la supervivencia y, sobre todo, el espectáculo. Este artículo revelará los secretos de su sorprendente preparación, un sistema pragmático diseñado para el negocio más brutal del Imperio.","sections":[{"title":"Olvida los músculos, eran los «hombres de cebada»","content":"Lejos de las dietas ricas en proteínas que esperaríamos de un atleta de élite, los gladiadores tenían una alimentación muy específica basada principalmente en carbohidratos. Sus comidas consistían en granos, sobre todo cebada, y legumbres como las habas. Esta dependencia de los cereales era tan marcada que se ganaron el apodo revelador de *hordearii* («hombres de cebada»). Esta dieta, enfocada en ganar volumen y resistencia en lugar de definición muscular, no era bien vista por las élites romanas. El filósofo Séneca, por ejemplo, los describía de forma despectiva, evidenciando el desprecio que sentía por un físico que no buscaba la perfección, sino la funcionalidad para la arena.","image":"https://placehold.co/800x400/DAA520/3E2723?text=GRANO+Y+LEGUMBRES"},{"title":"La grasa como armadura","content":"La razón detrás de esta dieta alta en calorías era puramente estratégica y económica. El objetivo no era conseguir un físico definido, sino crear una gruesa capa de grasa subcutánea que cubriera sus músculos. Esta «armadura» natural era crucial en la arena, ya que amortiguaba el impacto de los golpes y protegía vasos sanguíneos, nervios y órganos de cortes superficiales. Esto era fundamental para la naturaleza del espectáculo y la lógica del negocio: permitía peleas más sangrientas y visualmente impactantes para el público, pero al mismo tiempo menos letales. Los gladiadores eran una inversión muy valiosa para sus dueños, quienes necesitaban mantenerlos vivos y listos para el siguiente combate."},{"title":"El desprecio por el atleta griego","content":"El físico robusto del gladiador no era un descuido, sino el resultado de un rechazo cultural deliberado al ideal atlético griego. Mientras los griegos veneraban la perfección estética del cuerpo, los romanos veían sus prácticas deportivas con desdén. Consideraban los gimnasios griegos «escuelas de vicios». Incluso Cicerón aprobaba la sentencia: «mostrarse desnudos en público es el comienzo de la corrupción». Para la mentalidad romana, eminentemente práctica, el cuerpo no era una obra de arte que perfeccionar, sino una herramienta para un fin.","image":"https://placehold.co/800x400/555555/F5EFE3?text=MOSAICO+GLADIADORES"}],"bibliography":[{"author":"Junkelmann, Marcus","title":"Das Spiel mit dem Tod: So kämpften Roms Gladiatoren","publisher":"Philipp von Zabern","location":"Mainz am Rhein","year":"2000"},{"author":"Mann, Christian","title":"Gladiatoren: Das Spiel um Leben und Tod","publisher":"C. H. Beck","location":"München","year":"2011"},{"author":"Nossov, Konstantin","title":"Gladiator: Rome's Bloody Spectacle","publisher":"Osprey Publishing","location":"Oxford","year":"2009"}]},{"id":1,"category":"Ritos","title":"El último viaje: el funus romano","antetitle":"","author":"Ibidem","date":"2 de noviembre de 2025","summary":"Para un romano, la muerte no era el final, sino la transición más crítica de su existencia. Descubre el ritual del funus.","img":"https://placehold.co/1000x400/2A2A2A/F5EFE3?text=FUNUS+ROMANO","caption":"","intro":"El *funus* romano era mucho más que la simple disposición de un cadáver; constituía un **proceso ceremonial estructurado**, crucial para la transición del difunto hacia el más allá y para la purificación de su familia. Los vivos, al entrar en contacto con la muerte, quedaban en un estado de impureza ritual o «contagio» (*miasma*), del cual debían limpiarse a través de una serie de actos prescritos que marcaban el final del duelo.","sections":[{"title":"El último aliento","content":"Los primeros ritos se desarrollaban en el ámbito doméstico, inmediatamente después del fallecimiento. Un familiar cercano recogía el **último aliento** del moribundo con un beso, el *osculus supremus*. El objetivo principal de unir la boca con la del difunto era aspirar el último aliento (*agere* o *efflare animam*) para capturar el alma del fallecido. A continuación, se le cerraban los ojos (*oculos premere*) y se le quitaban los anillos y pulseras (*anulus detahere*).","subsections":[{"subtitle":"Conclamatio","content":"Después del *osculus supremus* se procedía a la ***conclamatio***. Los presentes llamaban al difunto por su nombre en voz alta tres veces, un ritual para confirmar fehacientemente la muerte.\n\nEste rito tenía un doble objetivo: comprobar la muerte real y retener el alma cerca del cuerpo hasta que fuese enterrado, evitando así que errase. La *conclamatio* se repetía periódicamente hasta el momento del sepelio.\n\nUna vez ocurrida la muerte, la casa y la familia quedaban bajo la mancha de la ***miasma*** (contaminación). Para avisar a los viandantes (especialmente a sacerdotes y magistrados, que debían evitar la impureza), **se colocaban ramas de abeto, mirto, pino o ciprés en la puerta principal de la casa**. Así comenzaba el ***funus***, el conjunto de ceremonias que se celebraban desde el momento del fallecimiento hasta la restitución de la *pax deorum*."}]},{"title":"Nuntiatio mortis","content":"En los funerales de mayor importancia social (conocidos como *funus indictivum*) o de altos cargos, la comunicación de la muerte era un acto solemne. Si el difunto era un magistrado, la noticia se comunicaba a los demás magistrados y senadores mediante lictores o alguaciles públicos. Paralelamente a estos actos, uno de los asistentes debía dirigirse al *dessignator* (funcionario encargado de las sepulturas) para comunicar el fallecimiento y gestionar el sepelio en la necrópolis.\n\nEn el caso del deceso de un miembro de una familia pudiente, el ***praeco*** (pregonero) se encargaba de la ***nuntiatio mortis***, el anuncio del fallecimiento, el acto con el que daba inicio el funus. En primer lugar eran informados los familiares y los amigos más cercanos a la familia; más tarde se hacía pública la noticia al resto de ciudadanos. Con este anuncio daba comienzo el *privatus luctus*."},{"title":"Depositio","content":"La ***depositio*** era el rito funerario inicial, inmediatamente posterior al fallecimiento, que consistía en la colocación del cuerpo del difunto sobre la tierra desnuda. Este acto de deposición simbolizaba el **retorno del difunto a la Madre Tierra**, el vientre que lo había engendrado. Era interpretado como un gesto que imitaba el ritual del nacimiento, cuando el infante era colocado en la tierra. Así se cerraba el círculo de la vida al imitar el rito en el que el pater familias lo reconoció como hijo después de nacer. En un momento posterior, aunque relacionado con la preparación del cuerpo, se podía colocar al fallecido de rodillas (*supra genua tollere*) para comprobar nuevamente que la vida lo había abandonado.\n\nTras la depositio, el cuerpo pasaba a la fase de preparación profesional, que incluía el lavado y la unción (*unctura*), antes de ser colocado en el *lectus funebris* (lecho fúnebre) en el atrio de la casa para la exposición pública (*collocatio*)."},{"title":"Unctura","content":"La ***unctura*** propiamente dicha es el acto de unción y perfumado del cadáver. Esta la llevaban a cabo las mujeres de la familia, un grupo de esclavas o los *pollinctores*, esclavos del *libitinarius* (empresario funerario).\n\nEl cadáver era lavado con agua tibia y ungido con aceites y perfumes de nardo, mirra, ámbar gris, copaiba y bálsamo de Judea. Esta *unctura* se consideraba un gesto de piedad, una medida higiénica y servía para preservar el cadáver de la mejor forma posible o retrasar su descomposición antes de la exposición (prothesis). En el caso de personajes notables, este proceso podía complementarse con un embalsamamiento sencillo (aunque el embalsamamiento completo era inusual en Roma).\n\nTras la *unctura*, el cuerpo se preparaba para ser exhibido. El cadáver era amortajado, se tapaban sus orificios nasales con torundas, se inmovilizaba su mandíbula con una venda y se lo envolvía en un sudario, en el que se introducían sus objetos más preciados, amuletos, flores y ramas de ciprés. A los hombres se les vestía con la toga propia de su condición social. Si el difunto había ocupado altos cargos, se utilizaban las vestiduras de ceremonia correspondientes, como la *toga pura* (ciudadano), la *praetexta* (magistrado), la *toga purpurea* (censor) o la *toga picta* (triunfador). También se le colocaba una corona si la había ganado en vida. Por último, se depositaba una moneda bajo la lengua (o en la palma de la mano) para pagar al barquero Caronte por el viaje a través de la laguna Estigia, una costumbre de origen helénico."},{"title":"Collocatio y expositio","content":"Una vez limpio, perfumado y vestido, el cadáver era depositado en un *lectus funebris* (lecho fúnebre) en el *atrium* o en una habitación cerca de la entrada de la casa. Se colocaba con los pies mirando hacia la puerta. Este lecho estaba flanqueado por las *imagines maiorum* (máscaras de los antepasados), flores y guirnaldas, y se disponían cuatro incensarios en las esquinas, que proporcionaban un fuerte aroma para camuflar el hedor de la putrefacción.\n\nEsta ***expositio*** (velatorio), que podía durar varios días, no solo permitía a amigos y familiares presentar sus respetos, sino que **funcionaba como el primer acto de exhibición social del estatus de la familia**, a través de la riqueza de las telas y la afluencia de visitantes."},{"title":"Pompa funebris","content":"La ***pompa funebris*** (procesión funeraria), también conocida como ***translatio cadaveris***, era el momento de mayor visibilidad pública del funeral. Consistía en el traslado del cuerpo al *ustrinum* (crematorio), aunque su desarrollo no solo era un acto de pietas hacia el difunto, sino también un espectáculo público fundamental para reflejar y consolidar el estatus social y político de la familia.\n\nEl interés primordial de todas las partes involucradas en el funeral (el muerto, la familia y los observadores) era llamar la atención sobre la dignidad social o estatus del difunto. La *pompa* se caracterizaba por la exhibición del lujo y el boato, especialmente en el caso de las clases altas. Para la élite romana, era una actuación dinámica y multidimensional, diseñada para reforzar su posición social y política, más que por la solemnidad.\n\nLos funerales imperiales (*funus imperatorum*) eran especialmente grandiosos y suntuosos y llegaron a ser comparados con un *triumphus* o *pompa triumphalis*.\n\nLa *pompa* se realizaba con el cuerpo ya preparado, lavado, ungido y expuesto en el *lectus funebris*. La tradición romana asociaba la muerte con la contaminación (*miasma*), por lo que la procesión se realizaba idealmente de noche, o bien se mantenían elementos de la noche (como las antorchas o *funalia*) para alejar a los malos espíritus y advertir a los sacerdotes de la impureza de la casa. El cortejo fúnebre seguía un orden establecido y estaba compuesto por varios elementos que acentuaban el dramatismo y el estatus del difunto.\n\n- La procesión solía ser precedida por **músicos** que tocaban instrumentos de viento (flautas, trompas y tubas).\n- Les seguían las ***praeficae*** (plañideras profesionales), quienes lloraban, gritaban, se golpeaban el pecho y entonaban ***neniae*** (cantos fúnebres), un recurso ostentoso que indicaba la pujanza económica de la familia.\n- Un elemento central para la aristocracia era la **participación de los antepasados**. Hombres de complexión similar a los difuntos portaban ***imagines maiorum*** (máscaras de cera) y vestían las togas que correspondían a los cargos más altos que el antepasado había ostentado (como cónsul, censor o general triunfante), desfilando en carros con sus *fasces* e insignias. La prohibición de exhibir la imagen de un antepasado en el *funus* de un pariente era considerada una severa *damnatio memoriae*.\n- También participaban **mimos y bailarines** que danzaban e imitaban el comportamiento del difunto, a veces de forma grotesca o satírica, lo que aumentaba la espectacularidad.\n\nEl recorrido de la *pompa* era cuidadosamente planeado, especialmente para la élite. La procesión se dirigía fuera de la ciudad (*extra pomerium*) hacia la necrópolis o el lugar de cremación. Para los emperadores, el recorrido en Roma a menudo pasaba por la Vía Sacra. Si el fallecido era una figura importante, el cortejo hacía una parada obligatoria en el foro, en los *rostra*. Allí se exponía el cuerpo (a veces en posición vertical) y el pariente masculino de mayor edad pronunciaba la ***laudatio funebris***. Este discurso era vital para la propaganda y el prestigio familiar, ya que se exaltaban las virtudes y logros del difunto y sus antepasados. Los funerales que incluían *laudationes* eran conocidos como *funera indictiva* y se convocaba al público mediante *praeco* (pregonero) para maximizar la audiencia y, por ende, el luto.\n\nLa finalización de la *pompa* marcaba el inicio de la siguiente fase: la disposición final del cuerpo, que debía ocurrir fuera del *pomerium*. El cuerpo era llevado al *ustrinum* (lugar de cremación) o al lugar de inhumación."},{"title":"Disposición del cuerpo","content":"La legislación romana, concretamente la **Ley de las XII Tablas**, prohibía taxativamente enterrar o incinerar a los muertos dentro del *pomerium*, el límite sagrado de la ciudad. Por ello, las necrópolis se situaban a lo largo de las vías de acceso a la ciudad. Las dos prácticas principales de disposición del cuerpo fueron la *crematio* y la *inhumatio*.","subsections":[{"subtitle":"Crematio","content":"La ***crematio*** (cremación o incineración) era una fase determinante del *funus* romano, especialmente prevalente desde finales de la República hasta el Alto Imperio (siglos I a. C. al II d. C.). **La cremación tenía un propósito tanto pragmático** (higiénico y de ahorro de espacio) **como ritual, simbólico y filosófico**. Los romanos creían que el fuego y el alma eran de naturaleza similar, y la incineración permitía que el espíritu, concebido a veces como un soplo ardiente, se liberara del cuerpo y llegara al otro mundo o ascendiera al firmamento de manera más rápida. El proceso de la *crematio* se dividía en varias etapas.\n\n- En primer lugar, la pira (*rogus* o *pyra*) se construía en un lugar llamado ***ustrinum***. Si el cadáver era cremado en el propio lugar de enterramiento, este se conocía como *bustum*. Para su construcción se utilizaban maderas nobles y aromáticas. Llegaron a construirse túmulos de gran envergadura en casos de funerales importantes. Las piras solían ser de forma rectangular, a veces construidas en forma de altar o, en el caso de los emperadores, como estructuras escalonadas comparables a torres de luces o faros. Antes de la cremación, se retiraba el ***os resectum*** (generalmente un dedo), que se enterraría separadamente bajo tres puñados de tierra. Este rito era esencial para que el lugar de la cremación adquiriese el valor de ***locus religiosus*** (lugar sagrado).\n- Cuando el cuerpo estaba en presencia del rogus (pira), comenzaba el **ritual pericrematorio**. El difunto era colocado sobre la pira, a veces en su lecho funerario. Se le abría y se le volvía a cerrar los ojos por última vez, ya que se consideraba nefasto no mostrarlos al cielo antes de la cremación, y se le daba un beso de despedida. Algunas fuentes indican que en este momento un familiar depositaba una moneda bajo la lengua (o en la mano) para pagar a Caronte por el viaje a través de la laguna Estigia, si no se había realizado en el momento de amortajarlo. La moneda quemada en la pira representaba el tributo del difunto a los dioses infernales.\n- Para que el cuerpo se quemara con más facilidad, se le untaba grasa de animales sacrificados, mezclada con aceites perfumados.\n\nLa pira era encendida por un pariente o amigo, un acto que se realizaba con los presentes vueltos de espaldas para no interferir en el momento en que el alma abandonaba el cuerpo.\n\nA la pira se arrojaba incienso, perfumes y aromas como mirra y casia; objetos personales del muerto, alimentos, frutas y flores; vestiduras y joyas; restos de animales sacrificados en honor al difunto, que debían ser puros. La cremación estándar podía durar entre 5 y 8 horas, o requerir hasta 15 o 19 horas si no había manipulación humana. El proceso exigía la habilidad de profesionales (*ustores* o *crematores*), que controlaban el fuego y el flujo de oxígeno para que se superaran los 600 °C de forma regular. El fuego y la expansión de gases podían hacer que el abdomen se hinchara y la piel se rajara. Gracias a los restos arqueológicos se ha podido documentar fracturas que sugieren la manipulación y golpes a los restos para asegurar la combustión completa, especialmente del cráneo y los tejidos blandos.\n\nEn los funerales de figuras importantes (como generales o emperadores), se realizaba el ***decursio equitum***, un rito militar donde caballeros y soldados daban vueltas alrededor de la pira a modo de homenaje.\n\nEn el caso de los emperadores divinizados (*consecratio*), a veces solo se quemaba la *effigies* (imagen de cera) en la pira monumental, mientras que el cuerpo real podía ser inhumado previamente.\n\nUna vez que la pira funeraria se había consumido, se iniciaban los rituales de recogida de huesos y cenizas, conocidos como ***ossilegium***. Los rescoldos de la hoguera se apagaban con vino. Los parientes más cercanos, a menudo mujeres (como la esposa o la madre), recogían cuidadosamente los huesos calcinados. **Los huesos eran**, a veces, **lavados o limpiados con vino viejo y leche** (quizá para enfriarlos, ya que a menudo se retiraban con las brasas incandescentes). **Los restos se podían poner en ungüento o miel, y posteriormente se secaban con un paño de lino** antes de ser introducidos en la urna. Posteriormente se seleccionaban los fragmentos más significativos de hueso humano o, en algunos casos, se depositaba la máxima cantidad de huesos posible, incluso colocando los sobrantes en la fosa fuera de la urna.\n\nLos restos se introducían en la urna (llamada ***urna***, ***olla*** o ***caccabus***), que podía ser de mármol, metal, vidrio o cerámica. Los objetos de aderezo personal (como anillos, si habían sido retirados en la unctura), objetos quemados en la pira o un fragmento de una lucerna intencionalmente rota se introducían a menudo junto a los restos como parte del ritual.\n\nEl paso esencial antes de sellar la urna era **verter aceite perfumado sobre los restos carbonizados**. Este gesto final de libación, atestiguado por la presencia de ungüentarios de vidrio o cerámica en la sepultura, simbolizaba la consagración del lugar. Una vez llena y consagrada la urna, se procedía a su ubicación definitiva, constituyendo el ***sepulcrum***. La urna se depositaba en una fosa excavada en la tierra o en un ***nidus*** (nicho) de un ***columbarium***. Esta fosa de enterramiento podía estar repleta de carbones y cenizas (residuos de la pira).\n\nPara asegurar el hermetismo y, simbólicamente, fijar al muerto al *locus sepulturae*, la urna podía ser sellada o fijada de varias maneras:\n\n- Cubriéndola con una tapadera revestida de yeso blanco (escenificando el sellado simbólico).\n- Utilizando grandes clavos de hierro doblados en ángulo recto que sujetaban y fijaban la tapadera a la *olla* (los clavos, depositados intencionalmente o procedentes del lecho funerario, también tenían una función apotropaica).\n- Cubriendo la urna con grandes bloques de piedra volcánica que la envolvían.\n\nPor último, uno de los parientes se encargaba de santificar la tumba con el sacrificio de una cerda (*porca praesentanea*) a Ceres.\n\nEl proceso de colocar la urna cineraria en su lugar definitivo se puede englobar bajo el término ***humatio*** (entierro o consignación a la tierra), dado que, incluso después de la cremación, el acto final de depositar los restos y sellar la tumba se consideraba el rito esencial. También se describe como el entierro secundario del difunto."},{"subtitle":"Inhumatio","content":"En la práctica de la ***inhumatio*** (inhumación o entierro), el cuerpo se depositaba en un féretro o directamente en la fosa, a menudo dentro de un sarcófago. El término *humare* se usaba originalmente para el entierro en la tierra, y el *sepulcrum* se definía como el lugar donde el cuerpo o los huesos del difunto habían sido depositados (*condita sunt*).\n\nA pesar de su poca popularidad en la República, la inhumación estaba considerada la práctica más antigua y originaria de Roma, según Cicerón y Plinio. En los primeros siglos, los romanos a veces enterraban a sus muertos bajo el suelo de sus casas.\n\nLa inhumación y la cremación coexistieron durante siglos; ambas prácticas fueron legales y sagradamente equiparadas por la **Ley de las XII Tablas** (siglo V a. C.). Aunque a finales de la República y durante el Alto Imperio (siglos I y II d. C.) la cremación se convirtió en el rito más común, la inhumación nunca fue totalmente interrumpida. Era mantenida por algunas de las familias patricias más antiguas (como los Cornelios). También era el rito reservado para los pobres, esclavos y, habitualmente, para los niños que morían jóvenes (menores de 40 días o 7 meses, a veces enterrados en *subgrundaria* dentro de las casas).\n\nA partir del siglo II d. C. (especialmente desde Adriano) y durante el siglo III d. C., la inhumación experimentó un retorno imparable y se convirtió en el rito predominante en Roma y las provincias.\n\nLa extensión de la inhumación en Roma está relacionada con el impulso de algunos cultos del ámbito semita y orientales (como el cristianismo), que preferían garantizar la integridad del cuerpo para una supuesta vida en el más allá o para la resurrección.\n\nLa práctica del embalsamamiento, aunque considerada extranjera por los romanos, pudo ser utilizada por emigrantes egipcios o por occidentales convertidos a cultos orientales como Isis y Serapis, que buscaban preservar el cuerpo para el destino posterior.\n\nLa inhumación, como fase final del funus, se realizaba en las necrópolis situadas fuera del *pomerium*.\n\nA diferencia de la cremación (que usa urnas), la inhumación implicaba varios tipos de enterramiento: sarcófagos, ataúdes, tumbas de obra, de tégulas o fosas simples.\n\n- Los **sarcófagos** eran preferidos por los ricos, especialmente a partir de la época en que la inhumación se hizo popular. **Podían ser de piedra o mármol**, a menudo decorados con relieves.\n- Los ***capuli*** (ataúdes), por su parte, estaban realizados en madera y eran más humildes.\n\nLa morada final de los difuntos dependía también de las posibilidades económicas. Aquellos que podían permitírselo utilizaban tumbas de obra o panteones, mientras que las personas más humildes usaban un tipo común de sepultura modesta que consistía en cajas construidas con tejas (*tegulae*), dispuestas verticalmente para formar la caja y cubiertas a dos aguas (forma de tejadillo). Los restos de los más pobres o desarraigados eran a menudo lanzados a ***puticuli*** (fosas comunes) fuera de las ciudades, junto con escombros y animales muertos.\n\nOtro aspecto interesante es la posición del difunto en el *sepulcrum*. Generalmente, el cadáver se depositaba en decúbito supino (boca arriba), lo que se considera un símbolo de reposo. En el caso de infantes, se han documentado casos en decúbito lateral (posición fetal), interpretada como un simbólico retorno al vientre materno o a la Madre Tierra. Las posiciones anómalas (decúbito prono, cuerpos descuartizados, miembros fijados con clavos o piedras) reflejaban un desarrollo anormal del ritual funerario con intenciones necrofóbicas, buscando invalidar al muerto e impedir su regreso a la vida."}]},{"title":"Finalización del funus","content":"La ***humatio*** finalizaba con la fórmula simbólica de arrojar tres puñados de tierra sobre los restos o la urna (***iniecta gleba***). Solo a partir de la finalización de estos ritos (incluyendo el *os resectum* si se practicaba) es cuando el lugar adquiría el valor pleno de ***locus religiosus*** (lugar sagrado e inviolable). Una vez sellada la tumba, se colocaba un tubo de libación para verter líquidos (***circumpotatio***) en conmemoraciones posteriores. Los familiares llamaban gritando al difunto por última vez por su nombre y se despedían deseando ***Sit tibi terra levis*** (S. T. T. L.), una fórmula habitual en los epitafios."}],"bibliography":[{"author":"Toynbee, J. M. C.","title":"Death and Burial in the Roman World","publisher":"Johns Hopkins University Press","location":"Baltimore","year":"1996"},{"author":"Hope, Valerie M.","title":"Roman Death: The Dying and the Dead in Ancient Rome","publisher":"Continuum","location":"London","year":"2009"}]}],"fasti":{"upcoming":[],"past":[{"id":44,"title":"Fvnvs: Morir en la Antigua Roma","date":"1 de noviembre de 2025","location":{"locality":"Monturque (Córdoba)","place":"Criptopórtico"},"desc":"Recreación de los ritos fúnebres romanos (funus) en un entorno con importante patrimonio funerario.","tags":["Rito","Funerario"]},{"id":43,"title":"Fvnvs: El último viaje","date":"31 de octubre de 2025","location":{"locality":"Herrera (Sevilla)","place":"Termas romanas"},"desc":"Demostración de los rituales que acompañaban al difunto, recreada en las termas romanas de Herrera.","tags":["Rito","Funerario"]},{"id":42,"title":"Pvgno, ergo svm","date":"25 de octubre de 2025","location":{"locality":"Herrera (Sevilla)","place":"Termas romanas"},"desc":"Demostración de las técnicas de lucha (pugilato) y combate de la Antigüedad romana.","tags":["Rito","Lucha","Espectáculo"]},{"id":41,"title":"Adelfopoiesis","date":"27 de septiembre de 2025","location":{"locality":"Córdoba","place":"Casa Árabe"},"desc":"Recreación del rito de hermandad o adopción ritual en un enclave de diálogo cultural.","tags":["Rito","Social"]},{"id":40,"title":"Adelfopoiesis","date":"13 de septiembre de 2025","location":{"locality":"Puente Genil (Córdoba)","place":"Villa romana de Fuente Álamo"},"desc":"Ritual que exploraba la institución de la Adelfopoiesis en el marco de la villa romana.","tags":["Rito","Social"]},{"id":39,"title":"Las rosas de Heliogábalo","date":"26 de julio de 2025","location":{"locality":"Puente Genil (Córdoba)","place":"Villa romana de Fuente Álamo"},"desc":"Evento temático basado en el polémico emperador Heliogábalo y las costumbres suntuosas de la corte.","tags":["Temático","Emperador"]},{"id":38,"title":"Fvnvs immat         /** Convierte una cadena de fecha en español a un objeto Date. */
        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                const MONTHS = {
                    enero: 0, febrero: 1, marzo: 2, abril: 3, mayo: 4, junio: 5,
                    julio: 6, agosto: 7, septiembre: 8, octubre: 9, noviembre: 10, diciembre: 11,
                };
                const parts = dateStr.toLowerCase().replace(/de /g, '').replace(/,/g, '').split(' ');
                let month = -1, day = 1, year = new Date().getFullYear();
                parts.forEach(part => {
                    if (MONTHS[part] !== undefined) month = MONTHS[part];
                    else if (parseInt(part) > 31)   year  = parseInt(part);
                    else if (!isNaN(part))           day   = parseInt(part);
                });
                return month === -1 ? new Date(0) : new Date(year, month, day);
            } catch {
                return new Date(0);
            }
        };

        /**
         * Transforma un subconjunto de Markdown (negrita, cursiva, listas,
         * párrafos) a HTML seguro para dangerouslySetInnerHTML.
         */
        const parseMarkdown = (text) => {
            if (!text) return '';

            // Listas ordenadas
            text = text.replace(
                /^\d+\.\s+(.+)$/gm,
                '<li class="ml-6 pl-2 border-l-2 border-bronce mb-2">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ol class="list-none my-6">$&</ol>'
            );

            // Listas no ordenadas
            text = text.replace(
                /^[-•]\s+(.+)$/gm,
                '<li class="ml-6 relative before:content-[\'•\'] before:absolute before:-left-4 before:text-pompeyano">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ul class="list-none my-6">$&</ul>'
            );

            // Énfasis
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-pompeyano">$1</strong>');
            text = text.replace(/\*(.+?)\*/g,     '<em class="italic font-merriweather">$1</em>');

            // Párrafos
            return text
                .split('\n\n')
                .map(p => {
                    const trimmed = p.trim();
                    if (trimmed.startsWith('<ol') || trimmed.startsWith('<ul')) return trimmed;
                    return `<p class="mb-5 text-lg leading-relaxed">${trimmed.replace(/\n/g, '<br/>')}</p>`;
                })
                .join('');
        };

        /**
         * Igual que parseMarkdown pero añade la clase `first-para-drop-cap`

         */
        const parseMarkdownWithDropCap = (text) => {

            return html.replace(

            useEffect(() => {
                const onScroll = () => setVisible(window.scrollY > 300);
                window.addEventListener("scroll", onScroll);
                return () => window.removeEventListener("scroll", onScroll);
            }, []);
            return (
                <button
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    aria-label="Volver arriba"
                    className={`fixed bottom-8 right-8 p-3 bg-pompeyano text-pergamino shadow-lg z-30 transition-all border border-pergamino ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                >

        const LegalModal = ({ type, onClose }) => {
            const titleId = "legal-modal-title";
            const closeBtnRef = useRef(null);
            useEffect(() => {
                if (closeBtnRef.current) closeBtnRef.current.focus();
                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';
                return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
            }, []);
            if (!type || !LEGAL_TEXTS[type]) return null;
            const { title, content } = LEGAL_TEXTS[type];
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"

        const buildGroups = (events) => {
            const groups = {};
            events.forEach(event => {
                const key = normalizeTitle(event.title || event.eventTitle || "Actividad");
                if (!groups[key]) groups[key] = {
                    titulo:      key,
                    descripcion: EXTENDED_DESCRIPTIONS[key] || event.desc,
                    categoria:   event.category || "Divulgación",
                    count: 0, lastEvent: event,
                };
                groups[key].count++;
                const isNewer = parseDate(event.date) > parseDate(groups[key].lastEvent.date);
                if (!EXTENDED_DESCRIPTIONS[key] && isNewer) {
                    groups[key].lastEvent   = event;
                    groups[key].descripcion = event.desc;
                }
            });
            return Object.values(groups);

                            <Grid items={past} />

        const PageActivityDetail = ({ title, data }) => {

            const activityData = useMemo(() => {
                const all = [...(data.fasti.upcoming || []), ...(data.fasti.past || [])];
                return all
                    .filter(e => normalizeTitle(e.title || e.eventTitle) === decodedTitle)
                    .sort((a, b) => parseDate(b.date) - parseDate(a.date));
            }, [data, decodedTitle]);

            // Artículos del Tabularium relacionados por palabras clave del título
            const relatedArticles = useMemo(() => {
                if (!data.tabularium) return [];
                const keywords = decodedTitle
                    .split(/[:\s]+/)
                    .filter(w => w.length > 3)
                    .map(w => w.toUpperCase());
                return data.tabularium
                    .filter(art => keywords.some(k => art.title.toUpperCase().includes(k)))
                    .slice(0, 2);
            }, [data, decodedTitle]);

            if (activityData.length === 0) {
                return (
                    <div className="text-center py-20 font-cinzel">
                        Actividad no encontrada.{' '}
                        <a href="#fasti" className="text-pompeyano underline">Volver</a>
                    </div>

            const description = EXTENDED_DESCRIPTIONS[decodedTitle] || mainInfo.desc;

            const filtered = data.tabularium.filter(a => {
                const matchCat = filter === 'TODOS' || a.category === filter;

                    a.title.toLowerCase().includes(q) ||
                    a.author.toLowerCase().includes(q) ||

                        {filtered.map(art => (

                                        <span>{art.author}</span>
                                    </div>

        const RelatedArticles = ({ art, data }) => {
            const related = useMemo(() => {
                if (!data.tabularium) return [];
                return data.tabularium
                    .filter(a => a.id !== art.id && a.category === art.category)

            if (related.length === 0) return null;

            return (
                <div className="mt-16 pt-8 border-t border-bronce/30">

                    <div className="grid md:grid-cols-3 gap-6">
                        {related.map(r => (
                            <a key={r.id} href={`#article?id=${r.id}`}
                                className="group block bg-pergamino-light border border-bronce/20 hover:border-pompeyano transition-all duration-300">
                                <div className="aspect-video overflow-hidden">
                                    <img src={r.img} alt={r.title} loading="lazy"
                                        className="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 group-hover:scale-105 transition-all duration-500" />
                                </div>
