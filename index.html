        /**

         * actividades del mismo tipo a lo largo del historial.
         */
        const normalizeTitle = (raw) => {
            if (!raw) return "Actividad";
            const upper = raw.toUpperCase();
            if (
                upper.includes("FVNVS")            ||
                upper.includes("MORIR EN LA ANTIGUA") ||
                upper.includes("ÚLTIMO VIAJE")     ||
                upper.includes("FVUNUS")
            ) return "FVNVS: EL RITO FUNERARIO";
            if (
                upper.includes("ROSAS DE HELIOGÁBALO") ||
                upper.includes("HELIOGABALO")
            ) return "LAS ROSAS DE HELIOGÁBALO";
            return raw;
        };

        /** Convierte una cadena de fecha en español a un objeto Date. */
        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                const MONTHS = {
                    enero: 0, febrero: 1, marzo: 2, abril: 3, mayo: 4, junio: 5,
                    julio: 6, agosto: 7, septiembre: 8, octubre: 9, noviembre: 10, diciembre: 11,
                };
                const parts = dateStr.toLowerCase().replace(/de /g, '').replace(/,/g, '').split(' ');
                let month = -1, day = 1, year = new Date().getFullYear();
                parts.forEach(part => {
                    if (MONTHS[part] !== undefined) month = MONTHS[part];
                    else if (parseInt(part) > 31)   year  = parseInt(part);
                    else if (!isNaN(part))           day   = parseInt(part);
                });
                return month === -1 ? new Date(0) : new Date(year, month, day);
            } catch {
                return new Date(0);
            }
        };

        /**
         * Transforma un subconjunto de Markdown (negrita, cursiva, listas,
         * párrafos) a HTML seguro para dangerouslySetInnerHTML.
         */
        const parseMarkdown = (text) => {
            if (!text) return '';

            // Listas ordenadas
            text = text.replace(
                /^\d+\.\s+(.+)$/gm,
                '<li class="ml-6 pl-2 border-l-2 border-bronce mb-2">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ol class="list-none my-6">$&</ol>'
            );

            // Listas no ordenadas
            text = text.replace(
                /^[-•]\s+(.+)$/gm,
                '<li class="ml-6 relative before:content-[\'•\'] before:absolute before:-left-4 before:text-pompeyano">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ul class="list-none my-6">$&</ul>'
            );

            // Énfasis
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-pompeyano">$1</strong>');
            text = text.replace(/\*(.+?)\*/g,     '<em class="italic font-merriweather">$1</em>');

            // Párrafos
            return text
                .split('\n\n')
                .map(p => {
                    const trimmed = p.trim();
                    if (trimmed.startsWith('<ol') || trimmed.startsWith('<ul')) return trimmed;
                    return `<p class="mb-5 text-lg leading-relaxed">${trimmed.replace(/\n/g, '<br/>')}</p>`;
                })
                .join('');
        };

        /**
         * Igual que parseMarkdown pero añade la clase `first-para-drop-cap`
         * al primer <p> generado, para la letra capitular del artículo.
         * Se usa exclusivamente en el contenido de la primera sección.
         */
        const parseMarkdownWithDropCap = (text) => {
            const html = parseMarkdown(text);
            // Sustituye solo la primera ocurrencia de <p class="mb-5...">
            return html.replace(
                '<p class="mb-5 text-lg leading-relaxed">',
                '<p class="mb-5 text-lg leading-relaxed first-para-drop-cap">'
            );
        };

        const PageImagina = ({ albumId, data }) => {
            const [selected,      setSelected]      = useState(null);
            const [lightboxIndex, setLightboxIndex] = useState(null);

            // Combina álbumes explícitos con los eventos que tienen imágenes
            const albums = useMemo(() => {
                const combined = [...(data.imagina || [])];
                const events   = [...(data.fasti.upcoming || []), ...(data.fasti.past || [])];
                events.forEach(e => {
                    if (combined.find(a => a.id === e.id)) return;
                    if (!e.images && !e.coverImage)         return;
                    const imgs = e.images ? [...e.images] : [];
                    if (e.coverImage && (!imgs[0] || imgs[0].src !== e.coverImage)) {
                        imgs.unshift({ src: e.coverImage });
                    }
                    if (imgs.length > 0) {
                        combined.push({
                            id:         e.id,
                            eventTitle: e.title || e.eventTitle,
                            date:       e.date,
                            coverImage: e.coverImage || imgs[0].src,
                            images:     imgs,
                        });
                    }
                });
                return combined.sort((a, b) => parseDate(b.date) - parseDate(a.date));
            }, [data]);

            useEffect(() => {
                setSelected(albumId ? albums.find(a => a.id == albumId) : null);
                setLightboxIndex(null);
            }, [albumId, albums]);

            // Navegación del lightbox por teclado
            useEffect(() => {
                if (lightboxIndex === null || !selected) return;
                const onKey = (e) => {
                    if (e.key === 'Escape')     setLightboxIndex(null);
                    if (e.key === 'ArrowRight') setLightboxIndex(i => Math.min(i + 1, selected.images.length - 1));
                    if (e.key === 'ArrowLeft')  setLightboxIndex(i => Math.max(i - 1, 0));
                };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';
                return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
            }, [lightboxIndex, selected]);

            const Lightbox = () => {
                if (lightboxIndex === null || !selected) return null;
                const img   = selected.images[lightboxIndex];
                const total = selected.images.length;
                return (
                    <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center"
                        onClick={() => setLightboxIndex(null)} role="dialog" aria-modal="true"
                        aria-label={`Visor: ${img.caption || `Foto ${lightboxIndex+1} de ${total}`}`}>
                        <button className="absolute top-4 right-4 text-white/60 hover:text-white p-2 z-10 transition-colors"
                            onClick={() => setLightboxIndex(null)} aria-label="Cerrar visor" autoFocus>
                            <Icon path={Icons.X} size={32} />
                        </button>
                        {lightboxIndex > 0 && (
                            <button className="absolute left-2 md:left-6 text-white/60 hover:text-white p-3 z-10 transition-colors"
                                onClick={e => { e.stopPropagation(); setLightboxIndex(i => i - 1); }} aria-label="Imagen anterior">
                                <Icon path={Icons.ChevronLeft} size={40} />
                            </button>
                        )}
                        {lightboxIndex < total - 1 && (
                            <button className="absolute right-2 md:right-6 text-white/60 hover:text-white p-3 z-10 transition-colors"
                                onClick={e => { e.stopPropagation(); setLightboxIndex(i => i + 1); }} aria-label="Imagen siguiente">
                                <Icon path={Icons.ChevronRight} size={40} />
                            </button>
                        )}
                        <div className="max-w-5xl w-full px-16 md:px-24" onClick={e => e.stopPropagation()}>
                            <img src={img.src} alt={img.caption || `Fotografía ${lightboxIndex+1} de ${total}`}
                                className="w-full h-auto max-h-[80vh] object-contain" />
                            {img.caption && <p className="text-center text-white/70 font-merriweather text-sm italic mt-4 px-4">{img.caption}</p>}
                            <p className="text-center text-white/40 font-lato text-xs mt-2 uppercase tracking-widest">{lightboxIndex+1} / {total}</p>
                        </div>
                    </div>
                );
            };

            // Vista de álbum individual
            if (selected) {
                return (
                    <div className="fade-in px-4 py-8">
                        <Lightbox />
                        <div className="max-w-7xl mx-auto">
                            <button
                                onClick={() => window.location.hash = 'imagina'}
                                className="mb-8 font-lato text-sm font-bold text-pompeyano uppercase tracking-widest flex items-center hover:underline"
                            >
                                <Icon path={Icons.ArrowLeft} className="mr-2" /> Regresar a la Galería
                            </button>
                            <SectionHeader title={selected.eventTitle} subtitle={selected.date} />
                            <div className="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8">
                                {selected.images.map((img, i) => (
                                    <div key={i}
                                        className="break-inside-avoid bg-white p-2 shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-zoom-in"
                                        onClick={() => setLightboxIndex(i)}
                                        role="button" tabIndex={0}
                                        onKeyDown={e => e.key === 'Enter' && setLightboxIndex(i)}
                                        aria-label={`Ampliar: ${img.caption || `Foto ${i+1}`}`}>
                                        <img
                                            src={img.src}
                                            className="w-full h-auto grayscale-[10%] hover:grayscale-0 transition-all duration-700"
                                            loading="lazy"
                                            alt={img.caption || `Fotografía ${i+1} del evento ${selected.eventTitle}`}
                                        />
                                        {img.caption && (
                                            <p className="font-merriweather text-xs italic text-center mt-3 text-gray-500">{img.caption}</p>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // Vista de cuadrícula de álbumes
            return (
                <div className="fade-in px-4 py-8">
                    <SectionHeader title="IMAGINA" subtitle="Archivo Visual" />
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                        {albums.map(alb => (
                            <a
                                key={alb.id}
                                href={`#imagina?id=${alb.id}`}
                                className="group relative block overflow-hidden bg-texto aspect-[4/3] border-4 border-white shadow-lg"
                                aria-label={`Ver galería: ${alb.eventTitle}`}
                            >
                                <img
                                    src={alb.coverImage}
                                    className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700"
                                    alt=""
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-90" />
                                <div className="absolute bottom-0 left-0 p-6 w-full">
                                    <span className="font-lato text-[10px] text-ocre uppercase tracking-widest mb-1 block">{alb.date}</span>
                                    <h3 className="font-cinzel text-xl text-white font-bold">{alb.eventTitle}</h3>
                                    <span className="font-lato text-xs text-gray-300 mt-2 block group-hover:text-pompeyano transition-colors uppercase tracking-widest">
                                        Ver Colección &rarr;
                                    </span>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        const PageCivitas = ({ data }) => (
            <div className="fade-in px-4 py-8 max-w-6xl mx-auto">
                <SectionHeader title="CIVITAS" subtitle="Participación y Contacto" />

                {/* Tarjetas de ingreso y contratación */}
                <div className="grid md:grid-cols-2 gap-12 mb-20">
                    <div className="bg-white p-8 border-t-4 border-pompeyano shadow-sm">
                        <Icon path={Icons.Users} size={40} className="text-pompeyano mb-4" />
                        <h3 className="font-cinzel text-2xl font-bold text-texto mb-4">Admissio: Hazte Socio</h3>
                        <p className="font-merriweather text-sm text-gray-600 mb-6 leading-relaxed">
                            Formar parte de IBIDEM es adquirir un compromiso con el rigor y la investigación. Buscamos personas apasionadas por la historia, dispuestas a aprender los oficios y protocolos de la Roma tardía.
                        </p>
                        <a
                            href={`mailto:${data.general.email}?subject=Solicitud de Ingreso IBIDEM`}
                            className="inline-block bg-pompeyano text-white font-cinzel text-sm font-bold py-3 px-6 hover:bg-red-900 transition-colors"
                        >
                            Solicitar Ingreso
                        </a>
                    </div>
                    <div className="bg-white p-8 border-t-4 border-bronce shadow-sm">
                        <Icon path={Icons.Briefcase} size={40} className="text-bronce mb-4" />
                        <h3 className="font-cinzel text-2xl font-bold text-texto mb-4">Munera: Contratación</h3>
                        <p className="font-merriweather text-sm text-gray-600 mb-6 leading-relaxed">
                            Ofrecemos servicios de divulgación histórica para museos, ayuntamientos y centros educativos: recreaciones fidedignas, talleres de cultura material y conferencias especializadas.
                        </p>
                        <a
                            href={`mailto:${data.general.email}?subject=Contratación Servicios IBIDEM`}
                            className="inline-block border border-texto text-texto font-cinzel text-sm font-bold py-3 px-6 hover:bg-texto hover:text-white transition-colors"
                        >
                            Solicitar Dossier
                        </a>
                    </div>
                </div>

                {/* Formulario y sala de prensa */}
                <div className="grid md:grid-cols-3 gap-12">
                    <div className="md:col-span-2 bg-pergamino-light p-8 border border-bronce/30">
                        <h3 className="font-cinzel text-xl font-bold text-texto mb-6">Formulario de Contacto</h3>
                        <form
                            className="space-y-4"
                            onSubmit={e => { e.preventDefault(); alert('Gracias por su mensaje. Le responderemos en breve.'); }}
                        >
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text"  placeholder="Nombre y Apellidos"  className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano outline-none" required />
                                <input type="email" placeholder="Correo Electrónico"  className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano outline-none" required />
                            </div>
                            <select className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano outline-none">
                                <option>Motivo de la consulta</option>
                                <option>Información General</option>
                                <option>Prensa y Medios</option>
                                <option>Contratación</option>
                            </select>
                            <textarea rows="4" placeholder="Su mensaje..." className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano outline-none" required />
                            <button type="submit" className="bg-texto text-white font-cinzel text-sm font-bold py-3 px-8 hover:bg-pompeyano transition-colors w-full md:w-auto">
                                Enviar Mensaje
                            </button>
                        </form>
                    </div>
                    <div className="bg-texto text-pergamino p-8 relative overflow-hidden">
                        <div className="relative z-10">
                            <h3 className="font-cinzel text-xl font-bold text-white mb-6 border-b border-gray-600 pb-2">Sala de Prensa</h3>
                            <p className="font-lato text-xs text-gray-400 mb-6 uppercase tracking-wider">Recursos para medios</p>
                            <ul className="space-y-4">
                                {[
                                    "Logotipos Oficiales (.zip)",
                                    "Dossier de Prensa " + new Date().getFullYear() + ","
                                    "Manual de Identidad",
                                ].map(label => (
                                    <li key={label}>
                                        <a href="#!" className="flex items-center group">
                                            <Icon path={Icons.Download} size={18} className="mr-3 text-pompeyano" />
                                            <span className="font-merriweather text-sm group-hover:text-white text-gray-300 transition-colors">{label}</span>
                                        </a>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ─── Aplicación principal ────────────────────────────────────────────────

        const App = () => {
            const [data,        setData]        = useState(null);
            const [loadError,   setLoadError]   = useState(null);
            const [page,        setPage]        = useState('home');
            const [params,      setParams]      = useState({});
            const [mobileMenu,  setMobileMenu]  = useState(false);
            const [legalModal,  setLegalModal]  = useState(null);

            useEffect(() => {
                // Carga de datos y ocultación del loader
                fetch('./datos.json')
                    .then(r => {
                        if (!r.ok) throw new Error('Error HTTP ' + r.status);
                        return r.json();
                    })
                    .then(d => {
                        setData(d);
                        const loader = document.getElementById('loader');
                        if (loader) {
                            loader.style.opacity = '0';
                            setTimeout(() => { loader.style.display = 'none'; }, 500);
                        }
                    })
                    .catch(err => {
                        console.error('Error cargando datos.json:', err);
                        setLoadError(err.message);
                        const loader = document.getElementById('loader');
                        if (loader) loader.style.display = 'none';
                    });

                // Enrutamiento basado en hash
                const handleHash = () => {
                    const hash    = window.location.hash.slice(1) || 'home';
                    const [p, q]  = hash.split('?');
                    const parsed  = {};
                    if (q) q.split('&').forEach(pair => { const [k, v] = pair.split('='); parsed[k] = v; });
                    setPage(p);
                    setParams(parsed);
                    setMobileMenu(false);
                    window.scrollTo(0, 0);
                };

                window.addEventListener('hashchange', handleHash);
                handleHash();
                return () => window.removeEventListener('hashchange', handleHash);
            }, []);


            if (loadError) return (
                <div className="min-h-screen flex items-center justify-center bg-pergamino px-6" role="alert" aria-live="assertive">
                    <div className="text-center max-w-md">
                        <img src="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg"
                            alt="Ibidem" className="h-20 mx-auto mb-8 opacity-40" />
                        <h1 className="font-cinzel text-2xl text-pompeyano mb-4">Error al cargar el sitio</h1>
                        <p className="font-merriweather text-sm text-gray-600 mb-6 leading-relaxed">No se han podido cargar los datos. Comprueba tu conexión e inténtalo de nuevo.</p>
                        <button onClick={() => window.location.reload()}
                            className="bg-pompeyano text-white font-cinzel text-sm font-bold py-3 px-8 hover:bg-red-900 transition-colors">Reintentar</button>
                    </div>
                </div>
            );

            if (!data) return null;

            return (
                <div className="flex flex-col min-h-screen">

                    {/* ── Cabecera ──────────────────────────────────────────── */}
                    <header className="main-header sticky top-0 z-40 shadow-sm" role="banner">
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="#home" className="block py-1">
                                <img src={data.general.logoUrl} alt="Ibidem" className="h-14 md:h-20 w-auto" />
                            </a>
                            <nav className="hidden md:flex space-x-8">
                                {NAV_ITEMS.map(item => (
                                    <a
                                        key={item.key}
                                        href={`#${item.key}`}
                                        aria-current={page === item.key ? 'page' : undefined}
                                        className={`font-cinzel font-bold text-sm tracking-widest py-2 border-b-2 transition-all ${
                                            page === item.key
                                                ? 'text-pompeyano border-pompeyano'
                                                : 'text-texto border-transparent hover:text-pompeyano hover:border-bronce'
                                        }`}
                                    >
                                        {item.label}
                                    </a>
                                ))}
                            </nav>
                            <button className="md:hidden text-pompeyano p-2" onClick={() => setMobileMenu(true)} aria-label="Abrir menú de navegación" aria-expanded={mobileMenu} aria-controls="mobile-menu">
                                <Icon path={Icons.Menu} size={28} />
                            </button>
                        </div>
                    </header>

                    {/* ── Menú móvil ────────────────────────────────────────── */}
                    {mobileMenu && (
                        <div id="mobile-menu" className="fixed inset-0 z-50 bg-pergamino flex flex-col items-center justify-center space-y-8 fade-in" role="dialog" aria-modal="true" aria-label="Menú de navegación">
                            <button onClick={() => setMobileMenu(false)} className="absolute top-6 right-6 text-pompeyano" aria-label="Cerrar menú de navegación" autoFocus>
                                <Icon path={Icons.X} size={40} />
                            </button>
                            {NAV_ITEMS.map(item => (
                                <a
                                    key={item.key}
                                    href={`#${item.key}`}
                                    className="font-cinzel text-2xl font-bold text-texto hover:text-pompeyano tracking-widest"
                                    onClick={() => setMobileMenu(false)}
                                >
                                    {item.label}
                                </a>
                            ))}
                        </div>
                    )}

                    {/* ── Contenido principal ───────────────────────────────── */}
                    <main id="contenido-principal" className="flex-grow container mx-auto relative z-10" role="main">
                        {page === 'home'       && <PageHome           data={data} />}
                        {page === 'nostri'     && <PageNostri         data={data} />}
                        {page === 'fasti'      && <PageFasti          data={data} />}
                        {page === 'activity'   && <PageActivityDetail data={data} title={params.title} />}
                        {page === 'imagina'    && <PageImagina        data={data} albumId={params.id} />}
                        {page === 'tabularium' && <PageTabularium     data={data} />}
                        {page === 'article'    && <PageArticle        data={data} id={params.id} />}
                    </main>

                    {/* ── Pie de página ─────────────────────────────────────── */}
                    <footer className="bg-texto text-pergamino py-12 border-t-8 border-pompeyano mt-12 relative overflow-hidden" role="contentinfo">
                        <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/black-linen.png')]" />
                        <div className="container mx-auto px-6 text-center relative z-10">
                            <img
                                src={data.general.logoUrl}
                                alt="Ibidem Logo"
                                className="h-16 mx-auto mb-8 opacity-50 grayscale hover:grayscale-0 transition-all duration-500"
                            />
                            <div className="flex justify-center gap-8 mb-8">
                                <a href={data.general.facebook}       aria-label="Ibidem en Facebook"> <Icon path={Icons.Facebook}  size={32} /></a>
                                <a href={data.general.instagram}      aria-label="Ibidem en Instagram"><Icon path={Icons.Instagram} size={32} /></a>
                                <a href={`mailto:${data.general.email}`} aria-label="Enviar correo a Ibidem"> <Icon path={Icons.Mail}      size={32} /></a>
                            </div>
                            <div className="flex justify-center flex-wrap gap-4 text-sm font-cinzel text-gray-400 mb-6">
                                <button onClick={() => setLegalModal('legal')}          className="hover:text-white underline">Aviso Legal</button>
                                <span aria-hidden="true">|</span>
                                <button onClick={() => setLegalModal('accesibilidad')}  className="hover:text-white underline">Accesibilidad</button>
                            </div>
                            <p className="font-cinzel text-xs text-gray-500">
                                &copy; {new Date().getFullYear()} IBIDEM. Todos los derechos reservados.
                            </p>
                        </div>
                    </footer>

                    {legalModal && <LegalModal type={legalModal} onClose={() => setLegalModal(null)} />}
                    <ScrollToTop />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
