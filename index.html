    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Sistema de Enrutamiento Nativo simplificado para GitHub Pages / Netlify
        const navigate = (path) => {
            window.history.pushState({}, '', path);
            window.dispatchEvent(new PopStateEvent('popstate'));
        };

        // Elementos fijos de navegación global
        const NAV_ITEMS = [
            { key: 'home', label: 'DOMVS' },
            { key: 'nostri', label: 'NOSTRI' },
            { key: 'fasti', label: 'FASTI' },
            { key: 'imagina', label: 'IMAGINA' },
            { key: 'tabularium', label: 'TABVLARIVM' },
            { key: 'civitas', label: 'CIVITAS' },
        ];

        // Descripciones extensas inyectadas por consistencia de catálogo histórico
        const EXTENDED_DESCRIPTIONS = {
            "FVNVS: EL RITO FUNERARIO": `El ritual funerario romano (*Fvnvs*) constituye uno de los momentos más trascendentales de la vida pública y privada en el mundo antiguo. No es solo un acto de despedida, sino la consagración de la memoria familiar y la transición del individuo al estatus de ancestro protector (*Manes*).\n\nEn esta actividad, recreamos la *pompa funebris* completa con el máximo rigor documental: desde la *collocatio* (exposición del difunto) en el atrio de la vivienda rodeado de coronas y lámparas de aceite, pasando por el cortejo nocturno acompañado por músicos (*siticines*), plañideras profesionales (*praeficae*) que entonan cantos de dolor (*nenia*), y portadores de máscaras de cera (*imagines maiorum*) que representan a los antepasados ilustres de la familia.\n\nEl rito culmina con los discursos laudatorios en el foro (*laudatio funebris*) y las ceremonias de purificación colectiva. Una experiencia inmersiva y sobrecogedora que traslada al espectador directamente a la mentalidad y la religiosidad de la sociedad romana tardoantigua.`,
            "LAS ROSAS DE HELIOGÁBALO": `Más allá del mito decadentista popularizado por la pintura academicista del siglo XIX, esta recreación explora la compleja realidad social, política y culinaria del *convivium* imperial en el siglo III d.C.\n\nTomando como eje la controvertida figura de Marco Aurelio Antonino (Heliogábalo), la actividad desentraña el protocolo de mesa tardorromano, el uso de las vajillas de sigillata y vidrio, la sofisticación de los menús basados en el recetario de Apicio y la introducción de cultos y costumbres orientales en la urbe.\n\nA través del ambiente sensorial generado por la música antigua reconstruida, la perfumería de época y la lluvia simbólica de pétalos, analizamos la vida de la corte imperial y desmitificamos la "leyenda negra" de los historiadores senatoriales, ofreciendo una visión rigurosa de la diversidad y el sincretismo cultural de la dinastía Severa.`
        };

        // Textos legales institucionales fijos
        const LEGAL_TEXTS = {
            legal: {
                title: "Aviso Legal",
                content: `TITULARIDAD DEL SITIO WEB\nEn cumplimiento de lo dispuesto en el artículo 10 de la Ley 34/2002, de 11 de julio, de Servicios de la Sociedad de la Información y del Comercio Electrónico (LSSI-CE), se informa que el presente sitio web es titularidad de la Asociación Cultural de Recreación Histórica IBIDEM, entidad sin ánimo de lucro registrada oficialmente, con correo electrónico de contacto: ibidemrecreacion@gmail.com.\n\nPROPIEDAD INTELECTUAL\nLos derechos de propiedad intelectual de los contenidos de este sitio web (textos, fotografías, artículos de divulgación, diseños gráficos, combinaciones de color y logotipos) pertenecen en exclusiva a la Asociación Cultural IBIDEM o a sus respectivos autores. Queda prohibida su reproducción, distribución o uso público sin la autorización expresa y por escrito de la asociación. En consonancia con nuestros principios, se perseguirá cualquier uso indebido no autorizado de las imágenes de nuestras actividades.`
            },
            privacidad: {
                title: "Política de Privacidad",
                content: `RESPONSABLE DEL TRATAMIENTO DE DATOS\nAsociación Cultural de Recreación Histórica IBIDEM.\nContacto: ibidemrecreacion@gmail.com\n\nFINALIDAD DE LOS DATOS\nEste sitio web es meramente informativo y divulgativo. No se requiere el registro de usuarios ni se recogen datos de carácter personal de forma automatizada. En caso de que se realice un contacto voluntario a través de correo electrónico corporativo, los datos facilitados (nombre y dirección de correo) se utilizarán única y exclusivamente para responder a la consulta planteada, siendo eliminados posteriormente.\n\nCOOKIES\nEste sitio web no emplea cookies de seguimiento de terceros ni herramientas analíticas intrusivas, garantizando una navegación limpia y privada.`
            },
            accesibilidad: {
                title: "Declaración de Accesibilidad",
                content: `COMPROMISO CON LA ACCESIBILIDAD\nLa Asociación Cultural IBIDEM se ha comprometido a hacer accesible su sitio web de conformidad con las pautas de accesibilidad para el contenido web (WCAG 2.1), nivel AA.\n\nMEDIDAS APLICADAS\n- Uso de marcado HTML5 estructural y semántico.\n- Contraste de color optimizado entre el texto y los fondos (siguiendo nuestra gama tipificada de papiro y bronce).\n- Escalado correcto de tipografías en dispositivos móviles.\n- Alternativas textuales completas para imágenes clave y soporte para navegación íntegra mediante teclado.`
            }
        };

        // Normalizador semántico de títulos de actividades
        const normalizeTitle = (rawTitle) => {
            if (!rawTitle) return "Actividad";
            const upper = rawTitle.toUpperCase();
            if (upper.includes("FVNVS") || upper.includes("MORIR EN LA ANTIGUA") || upper.includes("ÚLTIMO VIAJE") || upper.includes("FVUNUS")) {
                return "FVNVS: EL RITO FUNERARIO";
            }
            if (upper.includes("ROSAS DE HELIOGÁBALO") || upper.includes("HELIOGABALO")) {
                return "LAS ROSAS DE HELIOGÁBALO";
            }
            return rawTitle;
        };

        // Parseador robusto de fechas castellanas para ordenación cronológica interna
        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                const MONTHS = {
                    enero: 0, febrero: 1, marzo: 2, abril: 3, mayo: 4, junio: 5,
                    julio: 6, agosto: 7, septiembre: 8, octubre: 9, noviembre: 10, diciembre: 11
                };
                const parts = dateStr.toLowerCase().replace(/de /g, '').replace(/,/g, '').split(' ');
                let month = -1;
                let day = 1;
                let year = new Date().getFullYear();

                parts.forEach(part => {
                    if (MONTHS[part] !== undefined) month = MONTHS[part];
                    else if (parseInt(part) > 31) year = parseInt(part);
                    else if (!isNaN(part)) day = parseInt(part);
                });

                if (month === -1) return new Date(0);
                return new Date(year, month, day);
            } catch (e) {
                return new Date(0);
            }
        };

        // Renderizador Markdown a HTML ultraligero nativo
        const parseMarkdown = (text) => {
            if (!text) return '';
            // Listas ordenadas históricas (ej: 1. Primer punto)
            text = text.replace(/^\d+\.\s+(.+)$/gm, '<li class="ml-6 pl-2 border-l-2 border-bronce mb-2">$1</li>');
            text = text.replace(/(<li class="ml-6.*<\/li>\n?)+/g, '<ol class="list-none my-6">$&</ol>');
            
            // Listas desordenadas con topos pompeyanos (ej: - Punto)
            text = text.replace(/^[-•]\s+(.+)$/gm, '<li class="ml-6 relative before:content-[\'•\'] before:absolute before:-left-4 before:text-pompeyano">$1</li>');
            text = text.replace(/(<li class="ml-6.*<\/li>\n?)+/g, '<ul class="list-none my-6">$&</ul>');

            // Negritas y cursivas
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-pompeyano">$1</strong>');
            text = text.replace(/\*(.+?)\*/g, '<em class="italic font-merriweather">$1</em>');

            // Párrafos limpios separados por doble salto de línea
            return text.split('\n\n').map(p => {
                const trimmed = p.trim();
                if (trimmed.startsWith('<ol') || trimmed.startsWith('<ul')) return trimmed;
                return `<p class="mb-5 text-lg leading-relaxed">${trimmed.replace(/\n/g, '<br/>')}</p>`;
            }).join('');
        };

        // Inyector estricto de letra capitular romana (Drop Cap) en el párrafo inicial de crónicas
        const parseMarkdownWithDropCap = (text) => {
            const html = parseMarkdown(text);
            return html.replace('<p class="mb-5 text-lg leading-relaxed">', '<p class="mb-5 text-lg leading-relaxed first-para-drop-cap">');
        };

        // Calculador estimativo de tiempo de lectura académica
        const readingTime = (article) => {
            let combinedText = article.intro || '';
            if (article.sections) {
                article.sections.forEach(s => {
                    combinedText += ' ' + (s.content || '');
                    if (s.subsections) {
                        s.subsections.forEach(ss => { combinedText += ' ' + (ss.content || ''); });
                    }
                });
            }
            const words = combinedText.trim().split(/\s+/).length;
            const minutes = Math.max(1, Math.round(words / 200));
            return minutes === 1 ? '1 min de lectura' : `${minutes} min de lectura`;
        };

        // Componente Icono SVG Dinámico unificado (Aislado del DOM global)
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
                aria-hidden="true"
                focusable="false"
            >
                <path d={path} />
            </svg>
        );

        // Diccionario de trazados de iconos mínimos e indispensables
        const Icons = {
            Menu: "M4 12h16M4 6h16M4 18h16",
            X: "M18 6L6 18M6 6l12 12",
            Mail: "M4 4h16c2 0 2 2 2 2v12c0 2-2 2-2 2H4c-2 0-2-2-2-2V6c0-2 2-2 2-2zM22 6l-10 7L2 6",
            ArrowLeft: "M19 12H5 M12 19l-7-7 7-7",
            ArrowRight: "M5 12h14M12 5l7 7-7 7",
            ArrowUp: "M12 19V5M5 12l7-7 7 7",
            Facebook: "M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z",
            Instagram: "M15 2h-6a7 7 0 0 0-7 7v6a7 7 0 0 0 7 7h6a7 7 0 0 0 7-7V9a7 7 0 0 0-7-7z M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M17.5 6.5h.01",
            Camera: "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M12 15a2 2 0 1 1 0-4 2 2 0 0 1 0 4z",
            Book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20",
            Users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
            Briefcase: "M20 7h-3a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z M15 7h-6V5h6v2z",
            Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3",
            Calendar: "M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z M16 2v4 M8 2v4 M3 10h18"
        };

        // Encabezado Clásico de Sección Epigráfica
        const SectionHeader = ({ title, subtitle }) => (
            <div className="text-center mb-12 pt-8">
                {subtitle && <span className="block font-lato text-bronce font-bold text-xs tracking-[0.2em] uppercase mb-3">{subtitle}</span>}
                <h2 className="font-cinzel text-4xl md:text-5xl font-bold text-texto leading-tight inline-block relative px-8 pb-4 border-b border-bronce">
                    {title}
                </h2>
            </div>
        );

        // Botón de Scroll Flotante de Retorno al Origen
        const ScrollToTop = () => {
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const checkVisibility = () => setVisible(window.scrollY > 300);
                window.addEventListener("scroll", checkVisibility);
                return () => window.removeEventListener("scroll", checkVisibility);
            }, []);
            return (
                <button 
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    aria-label="Volver al inicio de la página"
                    className={`fixed bottom-8 right-8 p-3 bg-pompeyano text-pergamino shadow-lg z-30 transition-all border border-pergamino ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                >
                    <Icon path={Icons.ArrowUp} size={20} />
                </button>
            );
        };

        // Modal de Lectura de Textos Legales e Institucionales (Accesible mediante teclado)
        const LegalModal = ({ type, onClose }) => {
            const titleId = "legal-modal-title";
            const closeBtnRef = useRef(null);

            useEffect(() => {
                if (closeBtnRef.current) closeBtnRef.current.focus();
                const handleKeyDown = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleKeyDown);
                document.body.style.overflow = 'hidden';
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    document.body.style.overflow = '';
                };
            }, [onClose]);

            if (!type || !LEGAL_TEXTS[type]) return null;
            const { title, content } = LEGAL_TEXTS[type];

            return (
                <div 
                    className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                    onClick={onClose}
                    role="presentation"
                >
                    <div 
                        className="bg-pergamino p-8 max-w-2xl w-full border border-pompeyano shadow-2xl relative max-h-[85vh] flex flex-col animate-fade-in"
                        onClick={(e) => e.stopPropagation()}
                        role="dialog"
                        aria-modal="true"
                        aria-labelledby={titleId}
                    >
                        <button 
                            ref={closeBtnRef}
                            onClick={onClose}
                            aria-label="Cerrar cuadro de diálogo"
                            className="absolute top-4 right-4 text-pompeyano hover:text-texto transition-colors"
                        >

                // Manejo dinámico del historial del navegador (Navegación SPA)
                const handlePopState = () => {
                    setCurrentPath(window.location.pathname);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setMobileMenuOpen(false);
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            // Enrutador interno semántico
            const renderView = () => {
                if (!data) return null;
                if (currentPath === '/' || currentPath === '/home') return <PageHome data={data} />;
                if (currentPath === '/nostri') return <PageNostri data={data} />;
                if (currentPath === '/fasti') return <PageFasti data={data} />;
                if (currentPath === '/imagina') return <PageImagina data={data} />;
                if (currentPath === '/tabularium') return <PageTabularium data={data} />;
                if (currentPath === '/civitas') return <PageCivitas />;
                
                // Rutas paramétricas dinámicas
                if (currentPath.startsWith('/activity/')) {
                    const activityTitle = currentPath.replace('/activity/', '');
                    return <PageActivityDetail title={activityTitle} data={data} />;
                }
                if (currentPath.startsWith('/article/')) {
                    const articleId = currentPath.replace('/article/', '');
                    return <PageArticleDetail id={articleId} data={data} />;
                }

                return <PageHome data={data} />;
            };

            if (!data) return null;

            // Determinar ítem activo en menú de navegación superior
            const currentRouteKey = currentPath.split('/')[1] || 'home';

            return (
                <div className="min-h-screen flex flex-col justify-between select-text selection:bg-pompeyano selection:text-pergamino">
                    
                    {/* ENCABEZADO MONUMENTAL */}
                    <header className="main-header sticky top-0 z-40 shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            
                            {/* Isologo Corporativo */}
                            <div 
                                className="flex items-center gap-4 cursor-pointer select-none"
                                onClick={() => navigate('/')}
                                role="link"
                                aria-label="Ir a la página de inicio"
                            >
                                <img 
                                    src="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg" 
                                    alt="Logo oficial de la Asociación Ibidem" 
                                    className="h-12 w-auto"
                                />
                                <span className="font-cinzel font-bold text-xl tracking-widest text-pompeyano hidden sm:inline">
                                    IBIDEM
                                </span>
                            </div>

                            {/* Navegación Desktop */}
                            <nav className="hidden md:flex gap-6" aria-label="Navegación principal de la corporación">
                                {NAV_ITEMS.map(item => (
                                    <button
                                        key={item.key}
                                        onClick={() => navigate(`/${item.key}`)}
                                        className={`font-lato text-xs font-bold tracking-widest uppercase pb-1 border-b-2 transition-all duration-200 ${
                                            currentRouteKey === item.key 
                                                ? 'border-pompeyano text-pompeyano' 
                                                : 'border-transparent text-texto hover:text-pompeyano'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>

                            {/* Disparador Menú Responsive */}
                            <button 
                                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                className="md:hidden text-pompeyano p-2"
                                aria-label={mobileMenuOpen ? "Cerrar menú de navegación" : "Abrir menú de navegación"}
                                aria-expanded={mobileMenuOpen}
                            >
                                <Icon path={mobileMenuOpen ? Icons.X : Icons.Menu} size={24} />
                            </button>
                        </div>

                        {/* Desplegable Móvil Semántico */}
                        {mobileMenuOpen && (
                            <nav className="md:hidden bg-pergamino border-t border-bronce/20 p-4 absolute top-full left-0 w-full flex flex-col gap-4 shadow-xl animate-fade-in" aria-label="Navegación móvil">
                                {NAV_ITEMS.map(item => (
                                    <button
                                        key={item.key}
                                        onClick={() => navigate(`/${item.key}`)}
                                        className={`font-lato text-sm font-bold tracking-widest uppercase text-left py-2 border-l-4 pl-3 ${
                                            currentRouteKey === item.key
                                                ? 'border-pompeyano text-pompeyano bg-pergamino-light'
                                                : 'border-transparent text-texto'
                                        }`}
                                    >
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                        )}
                    </header>

                    {/* CONTENEDOR DE VISTAS ASÍNCRONAS */}
                    <main id="contenido-principal" className="flex-grow focus:outline-none" tabIndex="-1">
                        {renderView()}
                    </main>

                    {/* PIE DE PÁGINA INSTITUIONAL */}
                    <footer className="bg-texto text-pergamino border-t-4 border-pompeyano pt-12 pb-6 px-4 font-lato text-xs tracking-wider">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 mb-8 border-b border-pergamino/10 pb-8 items-center text-center md:text-left">
                            
                            {/* Columna Identidad */}
                            <div>
                                <h4 className="font-cinzel text-lg font-bold mb-3 text-pergamino">Asociación IBIDEM</h4>
                                <p className="font-merriweather italic text-pergamino/70 text-xs leading-relaxed max-w-xs mx-auto md:mx-0">
                                    Asociación dedicada a la reconstrucción minuciosa y científica de la vida civil y cotidiana en la Antigua Roma.
                                </p>
                            </div>

                            {/* Columna Canales Sociales */}
                            <div className="flex justify-center gap-6" aria-label="Enlaces a redes sociales institucionales">
                                <a 
                                    href={data.general.facebook} 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="text-pergamino/60 hover:text-pergamino transition-colors p-2"
                                    aria-label="Seguir a Ibidem en Facebook (Abre en ventana nueva)"
                                >
                                    <Icon path={Icons.Facebook} size={24} />
                                </a>
                                <a 
                                    href={data.general.instagram} 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="text-pergamino/60 hover:text-pergamino transition-colors p-2"
                                    aria-label="Seguir a Ibidem en Instagram (Abre en ventana nueva)"
                                >
                                    <Icon path={Icons.Instagram} size={24} />
                                </a>
                            </div>

                            {/* Columna Enlaces de Cumplimiento Técnico */}
                            <div className="flex flex-col md:items-end gap-2 text-pergamino/60 select-none">
                                <button onClick={() => setActiveLegalModal('legal')} className="hover:text-pergamino transition-colors text-center md:text-right w-full md:w-fit">Aviso Legal</button>
                                <button onClick={() => setActiveLegalModal('privacidad')} className="hover:text-pergamino transition-colors text-center md:text-right w-full md:w-fit">Política de Privacidad</button>
                                <button onClick={() => setActiveLegalModal('accesibilidad')} className="hover:text-pergamino transition-colors text-center md:text-right w-full md:w-fit">Declaración de Accesibilidad</button>
                            </div>
                        </div>

                        {/* Créditos de Propiedad Intelectual */}
                        <div className="text-center text-pergamino/40 text-[10px] uppercase tracking-[0.2em] select-none">
                            &copy; 2026 Asociación Cultural de Recreación Histórica Ibidem. Todos los derechos reservados.
                        </div>
                    </footer>

                    {/* COMPONENTES PERIFÉRICOS GLOBALIZADOS */}
                    <ScrollToTop />
                    
                    {activeLegalModal && (
                        <LegalModal 
                            type={activeLegalModal} 
                            onClose={() => setActiveLegalModal(null)} 
                        />
                    )}
                </div>
            );
        };

        // Renderizado inicial en el árbol del DOM
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

    <script>
    window.addEventListener('DOMContentLoaded', () => {
        // Ejecutamos la automatización con un margen seguro tras la carga inicial
        setTimeout(() => {
            const todosLosBotones = document.querySelectorAll('button, a');
            let botonTabularium = null;
            
            for (let b of todosLosBotones) {
                // CORRECCIÓN CRÍTICA: Validamos fehacientemente que b y b.textContent existan antes de llamar a toLowerCase()
                if (b && b.textContent && b.textContent.toLowerCase().includes('tabularium')) {
                    botonTabularium = b.closest('a') || b.closest('button') || b;
                    break;
                }
            }

            if (botonTabularium && typeof botonTabularium.click === 'function') {
                botonTabularium.click(); // Clicamos en Tabularium de forma segura

                // PASO B: Esperamos a que React termine de pintar el listado de tarjetas
                setTimeout(() => {
                    const elementos = document.querySelectorAll('h2, h3, h4, p, a, span');
                    for (let el of elementos) {
                        if (el && el.textContent && el.textContent.toLowerCase().includes('cromático del poder')) {
                            const contenedorClicable = el.closest('a') || el.closest('button') || el.closest('div[onclick]') || el;
                            if (contenedorClicable && typeof contenedorClicable.click === 'function') {
                                contenedorClicable.click(); // Accedemos al artículo real
                                break;
                            }
                        }
                    }
                }, 600); // Tiempo para que se rendericen los artículos en pantalla
            }
        }, 1200); // Tiempo para que la app cargue y monte el árbol de React
    });
    </script>
</body>
</html>
