        "articulos": [
          {
            "id": "cercadilla",
            "title": "El Palacio de Cercadilla: Monumentalidad y Poder en la Córdoba Tardorromana",
            "summary": "Un análisis detallado sobre el imponente complejo palatino atribuido al emperador Maximiano Hercúleo, baluarte del urbanismo tardoantiguo en Hispania.",

            "content": [
              { "type": "paragraph", "text": "El yacimiento arqueológico de Cercadilla, ubicado en Córdoba, constituye uno de los testimonios monumentales más formidables de la antigüedad tardía en toda la cuenca mediterránea. Descubierto en 1991 con motivo de las obras de soterramiento del ferrocarril, este colosal complejo palatino alteró profundamente las teorías previas sobre el desarrollo urbano de Corduba durante los siglos III y IV d.C." },
              { "type": "paragraph", "text": "La hipótesis más sólida y respaldada por la comunidad científica atribuye la edificación del palacio al emperador Maximiano Hercúleo, quien cogobernó el Imperio Romano junto a Diocleciano durante la Tetrarquía. Construido aproximadamente entre los años 293 y 305 d.C., el palacio servía como sede oficial y residencia imperial durante las campañas del tetrarca en Hispania y el norte de África, reflejando el programa propagandístico y la estética del poder absoluto de la época." },
              { "type": "heading", "text": "Una Arquitectura al Servicio de la Majestad Imperial" },
              { "type": "paragraph", "text": "La escala de Cercadilla es sobrecogedora. El diseño se estructuraba en torno a un gigantesco criptopórtico semicircular de más de 100 metros de diámetro, que abrazaba una gran plaza de recepción. Desde este eje central se articulaban los grandes edificios de aparato, entre los que destaca el aula regia: una inmensa sala absidada destinada a las audiencias solemnes, donde el emperador se manifestaba ante sus súbditos rodeado de un ceremonial litúrgico casi divino." },
              { "type": "image", "src": "https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Tabularium/Cercadilla/Cercadilla_planta.jpg", "caption": "Planta arqueológica general del palacio imperial de Cercadilla, destacando su imponente estructura semicircular." },
              { "type": "paragraph", "text": "Además de las zonas públicas y de gobierno, el palacio contaba con un sector termal privado de dimensiones palaciegas, ricas dependencias residenciales pavimentadas con mosaicos policromos y un sistema de abastecimiento de agua independiente mediante acueductos. La fisonomía de Cercadilla no buscaba la integración urbana, sino imponerse visualmente sobre el territorio, proclamando el orden tetrárquico frente a la crisis del siglo III." },
              { "type": "heading", "text": "Evolución y Ocaso del Conjunto" },
              { "type": "paragraph", "text": "Tras la abdicación de Maximiano, el complejo no perdió su carácter institucional. Durante el siglo IV, se transformó probablemente en la residencia del vicarius de las provincias hispanas o del gobernador provincial. Con la progresiva cristianización de la sociedad romana, el palacio experimentó una mutación excepcional: el aula regia fue reutilizada como centro de culto cristiano y necrópolis, vinculándose directamente a la memoria del mártir san Acisclo, convirtiéndose así en un importante centro de peregrinación visigodo." },
              { "type": "paragraph", "text": "Hoy en día, a pesar de la destrucción parcial que sufrió el yacimiento en los años noventa, Cercadilla sigue siendo un referente indispensable para los arqueólogos internacionales. Desde la Asociación Ibidem reivindicamos el estudio y la difusión de este patrimonio cordobés, cuyo esplendor material nos recuerda que Andalucía fue, durante siglos, uno de los corazones políticos del Imperio Romano." }

            "title": "El Secreto de los Tintes: La Producción de la Púrpura de Tiro",
            "summary": "Estudio arqueológico y técnico sobre la extracción del tinte más valioso de la antigüedad, símbolo exclusivo de la dignidad imperial romana.",
            "coverImage": "https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Tabularium/Purpura/Purpura_portada.jpg",
            "content": [
              { "type": "paragraph", "text": "Pocos elementos materiales poseían una carga simbólica tan intensa en el mundo romano como la púrpura de Tiro. Más que un color, representaba el estatus supremo, el poder militar, el favor de los dioses y, finalmente, la soberanía exclusiva del propio emperador. El valor de este tinte llegó a superar con creces el peso de su equivalente en oro, sustentando una industria estatal celosamente vigilada." },
              { "type": "paragraph", "text": "El origen de este codiciado pigmento se encuentra en las entrañas de pequeños moluscos gasterópodos marinos, concretamente en especies de las familias Muricidae, como el Bolinus brandaris (cañaílla), el Hexaplex trunculus (búsano) y la Stramonita haemastoma. En sus glándulas hipobranquiales se genera un fluido incoloro que, al entrar en contacto con el aire y la luz solar, experimenta una reacción química enzimática que lo transforma sucesivamente en amarillo, verde, azul y, finalmente, en el característico tono rojo purpúreo o violáceo." },
              { "type": "image", "src": "https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/Tabularium/Purpura/Murices.jpg", "caption": "Ejemplares de moluscos murícidos utilizados desde la época fenicia para la obtención de los diferentes tonos de púrpura." },
              { "type": "heading", "text": "Un Proceso de Fabricación Arduo y Pestilente" },
              { "type": "paragraph", "text": "Las fuentes clásicas, especialmente la Historia Natural de Plinio el Viejo, detallan minuciosamente el proceso de manufactura. Para obtener apenas unos gramos de tinte puro eran necesarios miles de moluscos. Los caracoles de mayor tamaño se perforaban individualmente para extraer la glándula, mientras que los más pequeños se machacaban en su totalidad en morteros de piedra." },
              { "type": "paragraph", "text": "La masa resultante se depositaba en grandes tinajas de plomo o hierro junto a agua salada y se sometía a un proceso de cocción lenta y continua a temperatura moderada durante diez días. Esta reducción eliminaba las impurezas orgánicas y concentraba el principio activo. El hedor insoportable que emanaba de estas factorías (denominadas purpurariae) obligaba por ley a situarlas a una distancia considerable de los núcleos urbanos, marcando el paisaje litoral del Mediterráneo." },

              { "type": "paragraph", "text": "En Ibidem hemos llevado a cabo recreaciones experimentales de tejidos empleando lanas e hilos teñidos artesanalmente con extractos naturales, reproduciendo la rica gama de matices que oscilan desde el sutil color rosáceo hasta el oscuro 'sangre de toro'. Comprender la materialidad de la púrpura es entender los mecanismos de control social y la sofisticación económica de la sociedad romana tardía." }

    <script type="text/babel">

        // LEEMOS LOS DATOS Y PERMITIMOS SU REESCRITURA (let en lugar de const)
        let data = JSON.parse(document.getElementById('ibidem-data').textContent);

        // Componente de Renderizado de Iconos SVG
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg viewBox="0 0 24 24" width={size} height={size} className={`fill-current inline-block ${className}`} aria-hidden="true">
                <path d={path} />
            </svg>
        );

        // Botón Inteligente para Volver Arriba
        const ScrollToTop = () => {
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const handleScroll = () => setVisible(window.scrollY > 400);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <button
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    className={`fixed bottom-6 right-6 bg-pompeyano text-white p-3 rounded-full shadow-2xl transition-all duration-300 z-50 hover:scale-110 active:scale-95 ${visible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
                    aria-label="Volver arriba"
                >
                    <Icon path={Icons.ChevronUp} size={24} />
                </button>
            );
        };

        // Modales Legales Transparentes
        const LegalModal = ({ type, onClose }) => {
            const content = type === 'legal'
                ? { title: "Aviso Legal", text: "En cumplimiento de las normativas de transparencia institucionales, los contenidos históricos y visuales expuestos en este dominio pertenecen a la Asociación Ibidem y poseen una finalidad exclusivamente cultural, educativa y de divulgación histórica sin ánimo de lucro." }
                : { title: "Accesibilidad", text: "Este espacio web ha sido optimizado estructuralmente bajo pautas de diseño semántico para garantizar que la navegación, consulta de artículos e interactividad sean plenamente legibles por la mayor variedad posible de tecnologías asistivas y usuarios." };

            return (
                <div className="fixed inset-0 bg-stone-950/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-pergamino border-2 border-double border-pompeyano p-6 rounded shadow-2xl max-w-md w-full relative" onClick={e => e.stopPropagation()}>

                        </button>

                        <p className="font-merriweather text-sm leading-relaxed text-texto">{content.text}</p>
                    </div>
                </div>
            );
        };

        // Componente Principal de la Aplicación (Mantiene la estructura intacta)
        const App = () => {
            const [page, setPage] = React.useState('home'); 
            const [params, setParams] = React.useState(null); 
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
            const [legalModal, setLegalModal] = React.useState(null);

            const navigate = (targetPage, targetParams = null) => {
                setPage(targetPage);
                setParams(targetParams);
                setMobileMenuOpen(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const currentArticle = page === 'article' && params?.id 
                ? data.tabularium.articulos.find(a => a.id === params.id) 
                : null;
