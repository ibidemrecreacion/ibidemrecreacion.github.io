<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#963b2f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ibidem: Recreación Histórica</title>
    <meta name="description" content="Asociación de recreación histórica dedicada a la reconstrucción minuciosa de la vida civil romana.">
    <link rel="canonical" href="https://ibidemrecreacion.netlify.app/">
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ibidemrecreacion.netlify.app/">
    <meta property="og:title" content="Ibidem: Recreación Histórica">
    <meta property="og:description" content="Asociación dedicada a la reconstrucción minuciosa de la vida civil romana.">
    <meta property="og:image" content="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg">

    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Colores oficiales del Manual de Identidad de Ibidem */
            --color-sigillata:       #963b2f;
            --color-papiro:          #F5EFE3;
            --color-papiro-light:    #FAF7F2;
            --color-texto:           #2D2D2D;
            --color-bronce:          #7A7A52;
            --color-ocre:            #D4A017;
        }

        body {
            font-family: 'Merriweather', serif;
            background-color: var(--color-papiro);
            color: var(--color-texto);
            line-height: 1.8;
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .font-cinzel  { font-family: 'Cinzel', serif; letter-spacing: 0.1em; text-transform: uppercase; }
        .font-lato    { font-family: 'Lato', sans-serif; }

        /* Mejora de lectura: evitamos guiones automáticos rotos en pantallas pequeñas */
        .text-reading,
        .text-reading p {
            text-align: justify;
            hyphens: manual;
            -webkit-hyphens: manual;
            color: var(--color-texto);
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        a { transition: color 0.3s ease; }
        a:hover { color: var(--color-sigillata); }

        .main-header {
            background-color: rgba(245, 239, 227, 0.98);
            border-bottom: 3px double var(--color-sigillata);
            padding: 1rem 0;
        }

        .card-ibidem {
            background-color: var(--color-papiro-light);
            border: 1px solid rgba(122, 122, 82, 0.3);
            transition: all 0.3s ease;
        }
        .card-ibidem:hover {
            border-color: var(--color-sigillata);
            background-color: #fffdf9;
            box-shadow: 4px 4px 0px rgba(150, 59, 47, 0.1);
        }

        .separator-bronce {
            width: 80px;
            height: 2px;
            background: var(--color-bronce);
            margin: 2rem auto;
        }

        @media (min-width: 768px) {
            ::-webkit-scrollbar       { width: 10px; }
            ::-webkit-scrollbar-track { background: var(--color-papiro); }
            ::-webkit-scrollbar-thumb { background: var(--color-bronce); border-radius: 5px; }
            ::-webkit-scrollbar-thumb:hover { background: var(--color-sigillata); }
        }

        .text-reading h1,
        .text-reading h2,
        .text-reading h3,
        .text-reading h4 {
            text-align: left;
            hyphens: none;
            -webkit-hyphens: none;
        }

        /* Letra capitular elegante estilo National Geographic / Histórico */
        .first-para-drop-cap::first-letter {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: var(--color-sigillata);
            float: left;
            font-size: 5.2rem;
            line-height: 0.78;
            margin-right: 0.12em;
            margin-top: 0.08em;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        .skip-link { position:absolute; top:-40px; left:1rem; background:var(--color-sigillata); color:#fff; padding:0.5rem 1rem; font-family:'Lato',sans-serif; font-size:0.875rem; z-index:200; transition:top 0.2s ease; text-decoration:none; }
        .skip-link:focus { top:1rem; color:#fff; }
        :focus-visible { outline:2px solid var(--color-sigillata); outline-offset:3px; }
    </style>

    <script>
        // Vinculación estricta de clases Tailwind con las variables de diseño corporativo
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pompeyano:        'var(--color-sigillata)', /* Mapeado para no romper clases previas */
                        sigillata:        'var(--color-sigillata)',
                        pergamino:        'var(--color-papiro)',
                        'pergamino-light':'var(--color-papiro-light)',
                        texto:            'var(--color-texto)',
                        bronce:           'var(--color-bronce)',
                        ocre:             'var(--color-ocre)'
                    },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out both' },
                    fontFamily: {
                        cinzel:       ['Cinzel', 'serif'],
                        merriweather: ['Merriweather', 'serif'],
                        lato:         ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
