<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibidem - Recreación Histórica Civil Tardorromana</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sigillata: '#963b2f',
                    },
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            text-align: justify;
            hyphens: auto;
            -webkit-hyphens: auto;
            -ms-hyphens: auto;
        }
        .font-title {
            font-family: 'Cinzel', serif;
        }
    </style>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-50 text-stone-800 flex flex-col min-h-screen selection:bg-sigillata selection:text-white">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentTab, setCurrentTab] = useState('home');
            const [selectedArticle, setSelectedArticle] = useState(null);

            // Carga dinámica y limpia de datos externos
            useEffect(() => {
                fetch('./datos.json')
                    .then(res => {
                        if (!res.ok) throw new Error('No se pudo leer el archivo datos.json. Asegúrate de estar usando un servidor local.');
                        return res.json();
                    })
                    .then(data => {
                        setData(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            if (loading) return (
                <div className="flex items-center justify-center min-h-screen bg-stone-50">
                    <div className="text-xl font-title text-sigillata animate-pulse tracking-widest">Cargando Tabularium...</div>
                </div>
            );

            if (error) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-stone-50 p-6 text-center">
                    <div className="text-2xl font-title text-red-800 mb-2">Error de conexión de datos</div>
                    <p className="text-stone-600 max-w-md mb-4">{error}</p>
                    <div className="text-xs text-stone-400 bg-stone-100 p-3 rounded border border-stone-200">
                        Nota técnica: Los navegadores bloquean la lectura de archivos locales si abres el HTML directamente con doble clic. <br/>
                        Usa la extensión <strong>Live Server</strong> de VS Code para previsualizarlo correctamente en tu ordenador.
                    </div>
                </div>
            );

            const { general, home, nostri, tabularium } = data;

            return (
                <div className="flex flex-col min-h-screen justify-between">
                    {/* Barra de navegación institucional */}
                    <header className="bg-white border-b border-stone-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 cursor-pointer select-none" onClick={() => { setCurrentTab('home'); setSelectedArticle(null); window.scrollTo(0,0); }}>
                                <img src={general.logoUrl} alt="Ibidem Logo" className="h-12 w-auto" />
                                <span className="font-title text-2xl font-bold tracking-wider text-sigillata">IBIDEM</span>
                            </div>
                            <nav className="flex gap-2 sm:gap-6 text-sm font-medium">
                                <button 
                                    onClick={() => { setCurrentTab('home'); setSelectedArticle(null); window.scrollTo(0,0); }}
                                    className={`px-3 py-1.5 font-title tracking-wide transition border-b-2 ${currentTab === 'home' ? 'text-sigillata border-sigillata font-bold' : 'text-stone-600 border-transparent hover:text-sigillata'}`}
                                >
                                    Inicio
                                </button>
                                <button 
                                    onClick={() => { setCurrentTab('tabularium'); setSelectedArticle(null); window.scrollTo(0,0); }}
                                    className={`px-3 py-1.5 font-title tracking-wide transition border-b-2 ${currentTab === 'tabularium' ? 'text-sigillata border-sigillata font-bold' : 'text-stone-600 border-transparent hover:text-sigillata'}`}
                                >
                                    Tabularium
                                </button>
                                <button 
                                    onClick={() => { setCurrentTab('nostri'); setSelectedArticle(null); window.scrollTo(0,0); }}
                                    className={`px-3 py-1.5 font-title tracking-wide transition border-b-2 ${currentTab === 'nostri' ? 'text-sigillata border-sigillata font-bold' : 'text-stone-600 border-transparent hover:text-sigillata'}`}
                                >
                                    Nosotros
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Contenedor Principal Dinámico */}
                    <main className="flex-grow">
                        {selectedArticle ? (
                            <ArticleView article={selectedArticle} onBack={() => { setSelectedArticle(null); window.scrollTo(0,0); }} />
                        ) : currentTab === 'home' ? (
                            <HomeView home={home} general={general} onNavigate={(tab) => { setCurrentTab(tab); window.scrollTo(0,0); }} />
                        ) : currentTab === 'tabularium' ? (
                            <TabulariumView tabularium={tabularium} onSelectArticle={(art) => { setSelectedArticle(art); window.scrollTo(0,0); }} />
                        ) : currentTab === 'nostri' ? (
                            <NostriView nostri={nostri} />
                        ) : null}
                    </main>

                    {/* Pie de página de la Asociación */}
                    <footer className="bg-stone-900 text-stone-400 text-sm border-t border-stone-800 mt-16">
                        <div className="max-w-6xl mx-auto px-4 py-10 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="text-center md:text-left">
                                <p className="font-title text-stone-200 font-bold tracking-wide text-base mb-1">Asociación Cultural Ibidem</p>
                                <p className="text-stone-500 text-xs sm:text-sm">Divulgación y Recreación Histórica de la Vida Civil en la Antigüedad Tardía</p>
                            </div>
                            <div className="flex gap-6 items-center text-xs sm:text-sm">
                                <a href={`mailto:${general.email}`} className="hover:text-stone-200 transition">Email</a>
                                <a href={general.facebook} target="_blank" rel="noopener noreferrer" className="hover:text-stone-200 transition">Facebook</a>
                                <a href={general.instagram} target="_blank" rel="noopener noreferrer" className="hover:text-stone-200 transition">Instagram</a>
                            </div>
                        </div>
                        <div className="border-t border-stone-800/60 py-4 text-center text-xs text-stone-600 font-title tracking-widest">
                            &copy; {new Date().getFullYear()} IBIDEM &bull; Fasti
                        </div>
                    </footer>
                </div>
            );
        }

        // VISTA DE LA PORTADA (HOME)
        function HomeView({ home, general, onNavigate }) {
            return (
                <div>
                    <div className="relative h-[55vh] md:h-[65vh] bg-stone-900 text-white flex items-center justify-center overflow-hidden">
                        <img src={general.heroImageHome} alt="Ibidem Recreación" className="absolute inset-0 w-full h-full object-cover opacity-35 object-top" />
                        <div className="relative z-10 max-w-4xl mx-auto px-6 text-center">
                            <h1 className="font-title text-2xl md:text-4xl lg:text-5xl font-semibold tracking-wide leading-relaxed md:leading-snug italic text-stone-100">
                                {home.heroTitle}
                            </h1>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-6 py-16 md:py-24">
                        <p className="text-base md:text-xl text-stone-700 leading-relaxed text-center italic md:px-8">
                            {home.intro}
                        </p>
                    </div>

                    <div className="bg-stone-100/80 py-16 border-y border-stone-200">
                        <div className="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
                            {home.pilares.map((pilar, idx) => (
                                <div key={idx} className="bg-white p-8 rounded border border-stone-200 shadow-sm flex flex-col justify-between">
                                    <div>
                                        <h3 className="font-title text-lg md:text-xl font-bold text-sigillata mb-4 tracking-wide border-b border-stone-100 pb-2">{pilar.title}</h3>
                                        <p className="text-stone-600 text-sm md:text-base leading-relaxed text-justify mb-6">{pilar.text}</p>
                                    </div>
                                    <button 
                                        onClick={() => onNavigate(pilar.linkTo === 'tabularium' ? 'tabularium' : 'home')}
                                        className="text-xs font-title font-bold tracking-widest text-sigillata hover:text-stone-900 transition self-start flex items-center gap-1 uppercase"
                                    >
                                        Explorar &rarr;
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // VISTA DEL SECTOR TABULARIUM (CRÓNICAS Y ARTÍCULOS)
        function TabulariumView({ tabularium, onSelectArticle }) {
            return (
                <div className="max-w-6xl mx-auto px-6 py-12">
                    <div className="text-center mb-16">
                        <h2 className="font-title text-3xl md:text-4xl font-bold text-sigillata tracking-widest mb-3">TABULARIUM</h2>
                        <div className="h-0.5 w-16 bg-sigillata mx-auto mb-4"></div>
                        <p className="text-stone-500 text-sm max-w-md mx-auto italic">Estudios, exégesis de fuentes primarias y divulgación de cultura material tardorromana.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        {tabularium.map((art) => (
                            <article key={art.id} className="bg-white rounded overflow-hidden border border-stone-200 shadow-sm flex flex-col justify-between hover:shadow-md transition duration-300">
                                <div>
                                    <div className="h-60 sm:h-64 overflow-hidden relative bg-stone-200">
                                        <img src={art.img} alt={art.title} className="w-full h-full object-cover object-center hover:scale-[1.02] transition duration-500" />
                                        <span className="absolute top-4 left-4 bg-sigillata text-white text-[10px] font-title tracking-widest uppercase px-2.5 py-1 rounded-sm shadow">
                                            {art.category}
                                        </span>
                                    </div>
                                    <div className="p-6 md:p-8">
                                        <span className="text-[11px] uppercase font-semibold text-stone-400 tracking-widest block mb-1.5">{art.antetitle}</span>
                                        <h3 className="font-title text-xl md:text-2xl font-bold text-stone-900 mb-3 hover:text-sigillata cursor-pointer transition leading-snug" onClick={() => onSelectArticle(art)}>
                                            {art.title}
                                        </h3>
                                        <div className="text-xs text-stone-500 mb-4 flex gap-3 flex-wrap">
                                            <span>Por <strong>{art.author}</strong></span>
                                            <span>&bull;</span>
                                            <span>{art.date}</span>
                                        </div>
                                        <p className="text-stone-600 text-sm md:text-base leading-relaxed text-justify line-clamp-3">{art.summary}</p>
                                    </div>
                                </div>
                                <div className="px-6 pb-6 md:px-8 md:pb-8">
                                    <button 
                                        onClick={() => onSelectArticle(art)}
                                        className="w-full text-center bg-stone-50 hover:bg-sigillata hover:text-white text-stone-700 font-title text-xs font-bold tracking-widest py-3 px-4 border border-stone-200 hover:border-sigillata rounded-sm transition uppercase"
                                    >
                                        Acceder al Registro
                                    </button>
                                </div>
                            </article>
                        ))}
                    </div>
                </div>
            );
        }

        // DESPLIEGUE DEL ARTÍCULO DETALLADO
        function ArticleView({ article, onBack }) {
            return (
                <div className="max-w-3xl mx-auto px-6 py-12">
                    <button onClick={onBack} className="font-title text-xs font-bold text-stone-400 hover:text-sigillata mb-10 flex items-center gap-2 transition uppercase tracking-widest">
                        &larr; Volver al Tabularium
                    </button>

                    <header className="mb-10">
                        <span className="text-xs uppercase font-title font-bold text-sigillata tracking-widest block mb-2">{article.category}</span>
                        <span className="text-xs sm:text-sm uppercase font-semibold text-stone-400 tracking-wider block mb-1">{article.antetitle}</span>
                        <h1 className="font-title text-3xl md:text-4xl lg:text-5xl font-bold text-stone-900 leading-tight mb-4">{article.title}</h1>
                        <div className="flex gap-4 items-center text-xs sm:text-sm text-stone-500 border-y border-stone-200 py-3 mt-6">
                            <span>Investigación: <strong>{article.author}</strong></span>
                            <span>&bull;</span>
                            <span>{article.date}</span>
                        </div>
                    </header>

                    {article.img && (
                        <div className="my-8 bg-stone-100 border border-stone-200 p-1.5 rounded-sm shadow-sm">
                            <img src={article.img} alt={article.title} className="w-full h-auto max-h-[55vh] object-cover" />
                            {article.caption && <p className="text-xs text-stone-500 p-3 bg-stone-50 border-t border-stone-200 text-center italic leading-relaxed">{article.caption}</p>}
                        </div>
                    )}

                    <div className="text-stone-700 text-base md:text-lg leading-relaxed text-justify space-y-6">
                        <p className="font-medium text-stone-900 text-lg md:text-xl border-l-2 border-sigillata pl-4 mb-8 italic bg-stone-100/50 py-2 pr-2 rounded-r">
                            {article.intro}
                        </p>
                        
                        {article.sections && article.sections.map((sec, idx) => (
                            <div key={idx} className="space-y-4 pt-4">
                                {sec.title && <h2 className="font-title text-xl md:text-2xl font-bold text-sigillata tracking-wide mt-8 border-b border-stone-200 pb-2">{sec.title}</h2>}
                                <div dangerouslySetInnerHTML={{ __html: sec.content }} className="space-y-4 text-justify html-content" />
                                
                                {sec.image && sec.image.src && (
                                    <div className="my-6 bg-stone-50 border border-stone-200 rounded p-1.5 max-w-xl mx-auto shadow-sm">
                                        <img src={sec.image.src} alt={sec.title || "Ilustración"} className="w-full h-auto object-cover" />
                                        {sec.image.caption && <p className="text-xs text-stone-500 mt-2 text-center italic p-2 bg-white border-t border-stone-100">{sec.image.caption}</p>}
                                    </div>
                                )}

                                {sec.subsections && sec.subsections.map((sub, sIdx) => (
                                    <div key={sIdx} className="pl-0 sm:pl-4 space-y-2 mt-4">
                                        {sub.subtitle && <h3 className="font-title text-lg font-semibold text-stone-900 mt-4 tracking-wide">{sub.subtitle}</h3>}
                                        <p className="text-stone-600 text-sm md:text-base text-justify leading-relaxed">{sub.content}</p>
                                        {sub.image && sub.image.src && (
                                            <div className="my-4 bg-stone-50 border border-stone-200 rounded p-1.5 max-w-lg mx-auto shadow-sm">
                                                <img src={sub.image.src} alt={sub.subtitle || "Imagen"} className="w-full h-auto object-cover" />
                                                {sub.image.caption && <p className="text-xs text-stone-500 mt-2 text-center italic p-1.5 bg-white border-t border-stone-100">{sub.image.caption}</p>}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>

                    {/* Bibliografía Académica */}
                    {article.bibliography && article.bibliography.length > 0 && (
                        <div className="mt-14 p-6 md:p-8 bg-stone-100 border border-stone-200 rounded">
                            <h3 className="font-title text-base md:text-lg font-bold text-stone-900 tracking-wider mb-4 border-b border-stone-300 pb-2 uppercase">Fuentes Históricas y Bibliografía</h3>
                            <ul className="list-disc pl-5 text-xs md:text-sm text-stone-600 space-y-2.5 text-left">
                                {article.bibliography.map((bib, idx) => (
                                    <li key={idx} className="leading-relaxed">
                                        <strong>{bib.author}</strong> ({bib.year || 's.f.'}). <em>{bib.title}</em>.{bib.publisher ? ` ${bib.publisher}` : ''}{bib.pages ? ` Págs. ${bib.pages}.` : ''}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            );
        }

        // VISTA SECCIÓN NOSOTROS (NOSTRI)
        function NostriView({ nostri }) {
            return (
                <div className="max-w-3xl mx-auto px-6 py-12">
                    <div className="text-center mb-14">
                        <h2 className="font-title text-3xl md:text-4xl font-bold text-sigillata tracking-widest mb-3">NOSOTROS</h2>
                        <div className="h-0.5 w-16 bg-sigillata mx-auto"></div>
                    </div>

                    <div className="text-stone-700 text-base md:text-lg leading-relaxed text-justify mb-16 space-y-4">
                        <p>{nostri.mainText}</p>
                    </div>

                    {nostri.founder && (
                        <div className="border-t border-stone-200 pt-12">
                            <div className="bg-stone-100 border border-stone-200 rounded p-6 md:p-8 flex flex-col md:flex-row gap-8 items-center md:items-start">
                                <img src={nostri.founder.image} alt={nostri.founder.name} className="w-40 h-40 md:w-48 md:h-48 object-cover rounded-full shadow border-4 border-white bg-stone-300 flex-shrink-0" />
                                <div>
                                    <div className="text-center md:text-left mb-3">
                                        <h3 className="font-title text-xl font-bold text-sigillata tracking-wide mb-0.5">{nostri.founder.name}</h3>
                                        <span className="text-[11px] font-bold text-stone-400 tracking-widest uppercase block">{nostri.founder.years}</span>
                                    </div>
                                    <p className="text-stone-600 text-xs md:text-sm leading-relaxed text-justify italic">
                                        {nostri.founder.desc}
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
