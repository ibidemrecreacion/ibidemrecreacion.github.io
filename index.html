        // ─── Aplicación principal ────────────────────────────────────────────────

        const App = () => {
            const [data,        setData]        = useState(null);
            const [loadError,   setLoadError]   = useState(null);
            const [page,        setPage]        = useState('home');
            const [params,      setParams]      = useState({});
            const [mobileMenu,  setMobileMenu]  = useState(false);
            const [legalModal,  setLegalModal]  = useState(null);

            useEffect(() => {
                // Carga de datos y ocultación del loader
                const applyData = (d) => {
                    setData(d);
                    const loader = document.getElementById('loader');
                    if (loader) { loader.style.opacity='0'; setTimeout(()=>{ loader.style.display='none'; },500); }
                };
                // Leer datos incrustados (funciona con file://)
                const inlineEl = document.getElementById('ibidem-data');
                if (inlineEl) {
                    try { applyData(JSON.parse(inlineEl.textContent)); }
                    catch(e) { console.error('Error parseando datos incrustados:', e); setLoadError(e.message); }
                } else {
                    // Fallback: fetch (funciona en servidor/GitHub Pages)
                    fetch('./datos.json')
                        .then(r => { if (!r.ok) throw new Error('Error HTTP ' + r.status); return r.json(); })
                        .then(applyData)
                        .catch(err => {
                            console.error('Error cargando datos.json:', err);
                            setLoadError(err.message);
                            const loader = document.getElementById('loader');
                            if (loader) loader.style.display='none';
                        });
                }

                // Enrutamiento basado en hash
                const handleHash = () => {
                    const hash    = window.location.hash.slice(1) || 'home';
                    const [p, q]  = hash.split('?');
                    const parsed  = {};
                    if (q) q.split('&').forEach(pair => { const [k, v] = pair.split('='); parsed[k] = v; });
                    setPage(p);
                    setParams(parsed);
                    setMobileMenu(false);
                    window.scrollTo(0, 0);
                };

                window.addEventListener('hashchange', handleHash);
                handleHash();
                return () => window.removeEventListener('hashchange', handleHash);
            }, []);

            // Metadatos dinámicos por página
            useEffect(() => {
                if (!data) return;
                const siteName  = "Ibidem Recreación Histórica";
                const siteDesc  = "Asociación dedicada a la reconstrucción minuciosa de la vida civil romana.";
                const siteImage = "https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Pepe_Larario.jpg";
                let title = siteName;
                let desc  = siteDesc;
                let image = siteImage;

                if (page === 'article' && params.id) {
                    const art = data.tabularium.find(a => a.id == params.id);
                    if (art) {
                        title = `${art.title} — ${siteName}`;
                        desc  = art.summary || art.intro?.substring(0, 160) || siteDesc;
                        image = art.img || siteImage;
                    }
                } else if (page === 'fasti') {
                    title = `Actividades — ${siteName}`;
                    desc  = "Catálogo completo de actividades de recreación histórica romana de Ibidem.";
                } else if (page === 'tabularium') {
                    title = `Tabularium — ${siteName}`;
                    desc  = "Archivo de artículos y estudios sobre la vida civil romana.";
                } else if (page === 'imagina') {
                    title = `Imagina — ${siteName}`;
                    desc  = "Archivo visual de las recreaciones históricas de Ibidem.";
                } else if (page === 'nostri') {
                    title = `Nostri — ${siteName}`;
                    desc  = "Historia y equipo de la Asociación Cultural Ibidem.";
                } else if (page === 'civitas') {
                    title = `Contacto — ${siteName}`;
                    desc  = "Ponte en contacto con Ibidem Recreación Histórica.";
                }

                document.title = title;
                const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
                setMeta('meta[name="description"]',         'content', desc);
                setMeta('meta[property="og:title"]',        'content', title);
                setMeta('meta[property="og:description"]',  'content', desc);
                setMeta('meta[property="og:image"]',        'content', image);
                setMeta('meta[property="twitter:title"]',   'content', title);
                setMeta('meta[property="twitter:description"]', 'content', desc);
                setMeta('meta[property="twitter:image"]',   'content', image);
            }, [page, params, data]);


            if (loadError) return (
                <div className="min-h-screen flex items-center justify-center bg-pergamino px-6" role="alert" aria-live="assertive">
                    <div className="text-center max-w-md">
                        <img src="https://raw.githubusercontent.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg"
                            alt="Ibidem" className="h-20 mx-auto mb-8 opacity-40" />
                        <h1 className="font-cinzel text-2xl text-pompeyano mb-4">Error al cargar el sitio</h1>
                        <p className="font-merriweather text-sm text-gray-600 mb-6 leading-relaxed">No se han podido cargar los datos. Comprueba tu conexión e inténtalo de nuevo.</p>
                        <button onClick={() => window.location.reload()}
                            className="bg-pompeyano text-white font-cinzel text-sm font-bold py-3 px-8 hover:bg-red-900 transition-colors">Reintentar</button>
                    </div>
                </div>
            );
            if (!data) return null;

            return (
                <div className="flex flex-col min-h-screen">

                    {/* ── Cabecera ──────────────────────────────────────────── */}
                    <header className="main-header sticky top-0 z-40 shadow-sm" role="banner">
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <a href="#home" className="block py-1">
                                <img src={data.general.logoUrl} alt="Ibidem" className="h-14 md:h-20 w-auto" />
                            </a>
                            <nav className="hidden md:flex space-x-8">
                                {NAV_ITEMS.map(item => (
                                    <a
                                        key={item.key}
                                        href={`#${item.key}`}
                                        aria-current={page === item.key ? 'page' : undefined}
                                        className={`font-cinzel font-bold text-sm tracking-widest py-2 border-b-2 transition-all ${
                                            page === item.key
                                                ? 'text-pompeyano border-pompeyano'
                                                : 'text-texto border-transparent hover:text-pompeyano hover:border-bronce'
                                        }`}
                                    >
                                        {item.label}
                                    </a>
                                ))}
                            </nav>
                            <button className="md:hidden text-pompeyano p-2" onClick={() => setMobileMenu(true)} aria-label="Abrir menú de navegación" aria-expanded={mobileMenu} aria-controls="mobile-menu">
                                <Icon path={Icons.Menu} size={28} />
                            </button>
                        </div>
                    </header>

                    {/* ── Menú móvil ────────────────────────────────────────── */}
                    {mobileMenu && (
                        <div id="mobile-menu" className="fixed inset-0 z-50 bg-pergamino flex flex-col items-center justify-center space-y-8 fade-in" role="dialog" aria-modal="true" aria-label="Menú de navegación">
                            <button onClick={() => setMobileMenu(false)} className="absolute top-6 right-6 text-pompeyano" aria-label="Cerrar menú" autoFocus>
                                <Icon path={Icons.X} size={40} />
                            </button>
                            {NAV_ITEMS.map(item => (
                                <a
                                    key={item.key}
                                    href={`#${item.key}`}
                                    className="font-cinzel text-2xl font-bold text-texto hover:text-pompeyano tracking-widest"
                                    onClick={() => setMobileMenu(false)}
                                >
                                    {item.label}
                                </a>
                            ))}
                        </div>
                    )}

                    {/* ── Contenido principal ───────────────────────────────── */}
                    <main id="contenido-principal" className="flex-grow container mx-auto relative z-10" role="main">
                        {page === 'home'       && <PageHome           data={data} />}
                        {page === 'nostri'     && <PageNostri         data={data} />}
                        {page === 'fasti'      && <PageFasti          data={data} />}
                        {page === 'activity'   && <PageActivityDetail data={data} title={params.title} />}
                        {page === 'imagina'    && <PageImagina        data={data} albumId={params.id} />}
                        {page === 'tabularium' && <PageTabularium     data={data} />}
                        {page === 'article'    && <PageArticle        data={data} id={params.id} />}
                        {page === 'civitas'    && <PageCivitas        data={data} />}
                    </main>

                    {/* ── Pie de página ─────────────────────────────────────── */}
                    <footer className="bg-texto text-pergamino py-12 border-t-8 border-pompeyano mt-12 relative overflow-hidden" role="contentinfo">
                        <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/black-linen.png')]" />
                        <div className="container mx-auto px-6 text-center relative z-10">
                            <img
                                src={data.general.logoUrl}
                                alt="Ibidem Logo"
                                className="h-16 mx-auto mb-8 opacity-50 grayscale hover:grayscale-0 transition-all duration-500"
                            />
                            <div className="flex justify-center gap-8 mb-8">
                                <a href={data.general.facebook}       aria-label="Ibidem en Facebook"> <Icon path={Icons.Facebook}  size={32} /></a>
                                <a href={data.general.instagram}      aria-label="Ibidem en Instagram"><Icon path={Icons.Instagram} size={32} /></a>
                                <a href={`mailto:${data.general.email}`} aria-label="Enviar correo a Ibidem"> <Icon path={Icons.Mail}      size={32} /></a>
                            </div>
                            <div className="flex justify-center flex-wrap gap-4 text-sm font-cinzel text-gray-400 mb-6">
                                <button onClick={() => setLegalModal('legal')}          className="hover:text-white underline">Aviso Legal</button>
                                <span aria-hidden="true">|</span>
                                <button onClick={() => setLegalModal('accesibilidad')}  className="hover:text-white underline">Accesibilidad</button>
                            </div>
                            <p className="font-cinzel text-xs text-gray-500">
                                &copy; {new Date().getFullYear()} IBIDEM. Todos los derechos reservados.
                            </p>
                        </div>
                    </footer>

                    {legalModal && <LegalModal type={legalModal} onClose={() => setLegalModal(null)} />}
                    <ScrollToTop />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
