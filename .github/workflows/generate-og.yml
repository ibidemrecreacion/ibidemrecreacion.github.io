name: Generar páginas OG y sitemap

on:
  push:
    paths:
      - 'datos.json'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar páginas OG y sitemap
        run: python3 generate_og_pages.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add article/ sitemap.xml
          git diff --cached --quiet || git commit -m "chore: regenerar páginas OG y sitemap"
          git push
