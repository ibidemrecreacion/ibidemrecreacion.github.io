<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ibidem: Recreación Histórica</title>
    <meta name="description" content="Asociación de recreación histórica dedicada a la reconstrucción minuciosa de la vida civil romana.">

    <link rel="icon" type="image/svg+xml" href="https://raw.github.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">

    <style>
    :root {
        --color-pompeyano: #9A2A2A;
        --color-pergamino: #F5EFE3;
        --color-pergamino-light: #FAF7F2;
        --color-texto: #2D2D2D;
        --color-bronce: #7A7A52;
        --color-ocre: #D4A017;
    }

    body {
        font-family: 'Merriweather', serif;
        background-color: var(--color-pergamino);
        color: var(--color-texto);
        line-height: 1.8;
        background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    }

    .font-cinzel { font-family: 'Cinzel', serif; letter-spacing: 0.1em; text-transform: uppercase; }
    .font-lato { font-family: 'Lato', sans-serif; }

    .text-reading, .text-reading p { 
        text-align: justify; 
        hyphens: auto;
        -webkit-hyphens: auto;
    }
    
    .card-ibidem {
        background-color: var(--color-pergamino-light);
        border: 1px solid rgba(122, 122, 82, 0.3);
        transition: all 0.3s ease;
    }
    .card-ibidem:hover {
        border-color: var(--color-pompeyano);
        background-color: #fffdf9;
        box-shadow: 6px 6px 0px rgba(154, 42, 42, 0.1); 
    }

    .separator-bronce {
        width: 80px; height: 2px; background: var(--color-bronce); margin: 2rem auto;
    }

    .main-header {
        background-color: rgba(245, 239, 227, 0.98);
        border-bottom: 3px double var(--color-pompeyano);
    }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pompeyano: 'var(--color-pompeyano)',
                        pergamino: 'var(--color-pergamino)',
                        'pergamino-light': 'var(--color-pergamino-light)',
                        texto: 'var(--color-texto)',
                        bronce: 'var(--color-bronce)',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="loader" class="fixed inset-0 z-50 bg-pergamino flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="https://raw.github.com/ibidemrecreacion/ibidemrecreacion.github.io/main/assets/img/General/Logos/svg/Ibidem_logo_nuevo_rojo.svg" alt="Ibidem Logo" class="h-32 w-auto mb-8 animate-pulse" />
        <p class="font-cinzel text-pompeyano tracking-[0.3em] text-sm">FIRMITAS • HUMANITAS • INTEGRITAS</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const NAV_ITEMS = [
            { key: 'home', label: 'DOMUS' },
            { key: 'nostri', label: 'NOSTRI' },
            { key: 'fasti', label: 'FASTI' },
            { key: 'imagina', label: 'IMAGINA' },
            { key: 'tabularium', label: 'TABULARIUM' },
            { key: 'civitas', label: 'CIVITAS' }
        ];

        // TEXTOS LEGALES AMPLIADOS Y ESPECÍFICOS
        const LEGAL_TEXTS = {
            legal: {
                title: "Edictvm Legalis (Aviso Legal)",
                content: `En cumplimiento de la Ley 34/2002 (LSSI-CE), se informa que este sitio es gestionado por la ASOCIACIÓN CULTURAL IBÍDEM RECREACIÓN HISTÓRICA.\n\nPROPIEDAD INTELECTUAL: Todo el contenido (textos, fotografías de reconstrucción, diseños) está protegido. Las imágenes de actividades son propiedad de la Asociación y sus autores. Queda prohibida la reproducción total o parcial sin consentimiento expreso.\n\nRESPONSABILIDAD: IBÍDEM no se hace responsable de las interpretaciones erróneas del contenido histórico, el cual tiene fines puramente divulgativos y recreativos.\n\nPROTECCIÓN DE DATOS: Los correos recibidos se tratarán exclusivamente para responder consultas de interesados, socios o entidades contratantes, sin ser cedidos a terceros.`
            },
            accesibilidad: {
                title: "Declaración de Accesibilidad",
                content: `IBÍDEM se compromete a garantizar la accesibilidad de su archivo digital conforme al Real Decreto 1112/2018.\n\nActualmente trabajamos para que:\n1. El contraste de colores siga la paleta institucional sin comprometer la legibilidad.\n2. Las imágenes incluyan descripciones alternativas para lectores de pantalla.\n3. La navegación sea posible mediante teclado.\n\nSi encuentra alguna barrera, por favor contacte con nosotros a través de nuestro correo oficial.`
            }
        };

        const Icons = {
            Menu: "M4 12h16M4 6h16M4 18h16", X: "M18 6L6 18M6 6l12 12", 
            Mail: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z M22 6l-10 7L2 6",
            ArrowLeft: "M19 12H5 M12 19l-7-7 7-7", ArrowRight: "M5 12h14M12 5l7 7-7 7",
            ArrowUp: "M12 19V5M5 12l7-7 7 7", Facebook: "M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z",
            Instagram: "M15 2h-6a7 7 0 0 0-7 7v6a7 7 0 0 0 7 7h6a7 7 0 0 0 7-7V9a7 7 0 0 0-7-7z M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M17.5 6.5h.01",
            Users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8",
            Briefcase: "M20 7h-3a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z M15 7h-6V5h6v2z",
            Download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M7 10l5 5 5-5 M12 15V3",
            Map: "M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6z M8 2v16 M16 6v16"
        };

        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={path} /></svg>
        );

        const SectionHeader = ({ title, subtitle }) => (
            <div className="text-center mb-12 pt-8">
                {subtitle && <span className="block font-lato text-bronce font-bold text-xs tracking-[0.2em] uppercase mb-3">{subtitle}</span>}
                <h2 className="font-cinzel text-4xl md:text-5xl font-bold text-texto leading-tight inline-block relative px-8 pb-4 border-b border-bronce">{title}</h2>
            </div>
        );

        const PageCivitas = ({ data }) => {
            // FIX: Función para asegurar que el mailto funciona
            const handleEmailClick = (subject) => {
                const email = data.general.email || "ibidemrecreacion@gmail.com";
                window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
            };

            return (
                <div className="fade-in px-4 py-8 max-w-6xl mx-auto">
                    <SectionHeader title="CIVITAS" subtitle="Participación y Contacto" />
                    
                    <div className="grid md:grid-cols-2 gap-12 mb-20">
                        {/* Tarjeta Admissio */}
                        <div className="card-ibidem p-10 flex flex-col items-center text-center">
                            <div className="w-16 h-16 bg-pompeyano/10 rounded-full flex items-center justify-center mb-6">
                                <Icon path={Icons.Users} size={32} className="text-pompeyano" />
                            </div>
                            <h3 className="font-cinzel text-2xl font-bold text-texto mb-4">Admissio: Hazte Socio</h3>
                            <p className="font-merriweather text-sm text-gray-600 mb-8 leading-relaxed">
                                Formar parte de IBÍDEM es adquirir un compromiso con el rigor. Buscamos personas apasionadas dispuestas a investigar y recrear la cultura material romana.
                            </p>
                            <button 
                                onClick={() => handleEmailClick("Solicitud de Ingreso - IBÍDEM")}
                                className="mt-auto bg-pompeyano text-pergamino font-cinzel text-xs font-bold py-4 px-8 hover:bg-red-900 transition-colors tracking-widest"
                            >
                                Solicitar Información de Ingreso
                            </button>
                        </div>

                        {/* Tarjeta Munera */}
                        <div className="card-ibidem p-10 flex flex-col items-center text-center">
                            <div className="w-16 h-16 bg-bronce/10 rounded-full flex items-center justify-center mb-6">
                                <Icon path={Icons.Briefcase} size={32} className="text-bronce" />
                            </div>
                            <h3 className="font-cinzel text-2xl font-bold text-texto mb-4">Munera: Servicios</h3>
                            <p className="font-merriweather text-sm text-gray-600 mb-8 leading-relaxed">
                                Colaboramos con museos, ayuntamientos y centros educativos ofreciendo talleres, conferencias y exhibiciones de reconstrucción histórica de alto nivel.
                            </p>
                            <button 
                                onClick={() => handleEmailClick("Consulta de Servicios/Contratación")}
                                className="mt-auto border-2 border-texto text-texto font-cinzel text-xs font-bold py-4 px-8 hover:bg-texto hover:text-white transition-all tracking-widest"
                            >
                                Solicitar Dossier de Servicios
                            </button>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        {/* Información de Ubicación */}
                        <div className="bg-white/50 p-8 border border-bronce/20">
                            <h4 className="font-cinzel font-bold text-pompeyano mb-6 flex items-center gap-2">
                                <Icon path={Icons.Map} size={18} /> Sede Central
                            </h4>
                            <p className="font-lato text-sm text-gray-700 leading-relaxed mb-4">
                                <strong>Ubicación:</strong><br/>
                                {data.general.location || "Madrid / Online"}<br/>
                                España
                            </p>
                            <p className="font-lato text-sm text-gray-700">
                                <strong>Email Directo:</strong><br/>
                                <button onClick={() => handleEmailClick("Contacto General")} className="text-pompeyano underline hover:text-red-800">
                                    {data.general.email}
                                </button>
                            </p>
                        </div>

                        {/* Sala de Prensa Mejorada */}
                        <div className="md:col-span-2 bg-texto text-pergamino p-8 relative">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-white/10 pb-4">
                                <h3 className="font-cinzel text-xl font-bold">Sala de Prensa (Recursos)</h3>
                                <span className="text-[10px] font-lato uppercase tracking-[0.2em] text-ocre mt-2 md:mt-0">Acceso Público</span>
                            </div>
                            <div className="grid sm:grid-cols-2 gap-6">
                                <a href="#" className="group flex items-center p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                                    <Icon path={Icons.Download} className="text-pompeyano mr-4" />
                                    <div>
                                        <span className="block font-cinzel text-xs font-bold">Identidad Visual</span>
                                        <span className="text-[10px] text-gray-400">Logos y Escudos (.zip)</span>
                                    </div>
                                </a>
                                <a href="#" className="group flex items-center p-4 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
                                    <Icon path={Icons.Download} className="text-pompeyano mr-4" />
                                    <div>
                                        <span className="block font-cinzel text-xs font-bold">Dossier Cultural</span>
                                        <span className="text-[10px] text-gray-400">Memoria de Actividades</span>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ... RESTO DE COMPONENTES (PageHome, PageNostri, Fasti, Tabularium, Imagina) SE MANTIENEN IGUAL ...

        const PageHome = ({ data }) => (
            <div className="fade-in animate-fade-in">
                <section className="relative h-[60vh] md:h-[75vh] w-full mb-16 bg-texto border-b-4 border-pompeyano">
                    <div className="absolute inset-0 bg-cover bg-center opacity-70 grayscale-[30%] contrast-125" style={{ backgroundImage: `url(${data.general.heroImageHome})` }}></div>
                    <div className="absolute inset-0 bg-gradient-to-t from-texto via-transparent to-transparent"></div>
                    <div className="absolute bottom-0 left-0 w-full p-6 md:p-16 bg-gradient-to-t from-black/80 to-transparent">
                        <div className="max-w-4xl border-l-4 border-pompeyano pl-6 md:pl-10">
                            <h1 className="font-merriweather text-2xl md:text-4xl italic text-pergamino leading-relaxed drop-shadow-md">{data.home.heroTitle}</h1>
                        </div>
                    </div>
                </section>
                <section className="max-w-3xl mx-auto mb-20 px-6 text-center">
                    <p className="text-xl md:text-2xl text-texto leading-relaxed font-merriweather font-light italic">"{data.home.intro}"</p>
                    <div className="separator-bronce mt-8"></div>
                </section>
                <SectionHeader title="FUNDAMENTA" subtitle="Nuestros Pilares" />
                <div className="grid md:grid-cols-3 gap-8 mb-20 px-4 max-w-7xl mx-auto">
                    {data.home.pilares.map((pilar, index) => (
                        <article key={index} className="card-ibidem p-8 relative group">
                            <div className="absolute top-0 left-0 w-full h-1 bg-bronce group-hover:bg-pompeyano transition-colors"></div>
                            <div className="mb-6 opacity-20 group-hover:opacity-100 transition-opacity absolute top-4 right-4">
                                <span className="font-cinzel text-6xl text-pompeyano">{index + 1}</span>
                            </div>
                            <h3 className="font-cinzel text-xl font-bold text-pompeyano mb-4 relative z-10">{pilar.title}</h3>
                            <p className="text-texto mb-8 text-sm leading-relaxed font-merriweather relative z-10">{pilar.text}</p>
                            <a href={`#${pilar.linkTo}`} className="inline-block font-lato text-xs font-bold tracking-widest text-bronce hover:text-pompeyano border-b border-transparent hover:border-pompeyano uppercase transition-all">Leer más</a>
                        </article>
                    ))}
                </div>
            </div>
        );

        const PageNostri = ({ data }) => (
            <div className="fade-in px-4 py-8">
                <SectionHeader title="NOSTRI" subtitle="Nuestra Historia" />
                <div className="max-w-5xl mx-auto space-y-16">
                    <article className="columns-1 md:columns-2 gap-12 bg-pergamino-light p-8 md:p-12 border-y border-bronce/30">
                        {data.nostri.mainText.split('\n').map((p, i) => (p.trim() && <p key={i} className="text-reading mb-6 indent-8 first:indent-0">{p}</p>))}
                    </article>
                </div>
            </div>
        );

        // Componentes base de la App
        const LegalModal = ({ type, onClose }) => {
            if (!type || !LEGAL_TEXTS[type]) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-pergamino p-8 max-w-2xl w-full border border-pompeyano shadow-2xl relative" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 text-pompeyano hover:text-texto"><Icon path={Icons.X} size={24}/></button>
                        <h3 className="font-cinzel text-2xl text-pompeyano mb-6 border-b border-bronce/30 pb-4">{LEGAL_TEXTS[type].title}</h3>
                        <div className="font-merriweather text-sm text-texto leading-relaxed whitespace-pre-line text-reading">{LEGAL_TEXTS[type].content}</div>
                        <div className="mt-8 pt-4 border-t border-bronce/20 text-center">
                            <button onClick={onClose} className="font-cinzel text-xs font-bold text-bronce hover:text-pompeyano tracking-widest">Entendido</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [data, setData] = useState(null);
            const [page, setPage] = useState('home');
            const [mobileMenu, setMobileMenu] = useState(false);
            const [legalModal, setLegalModal] = useState(null);

            useEffect(() => {
                fetch('./datos.json').then(r => r.json()).then(d => {
                    setData(d);
                    const loader = document.getElementById('loader');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
                });
                const handleHash = () => {
                    const hash = window.location.hash.slice(1) || 'home';
                    setPage(hash.split('?')[0]);
                    setMobileMenu(false);
                    window.scrollTo(0,0);
                };
                window.addEventListener('hashchange', handleHash);
                handleHash();
            }, []);

            if (!data) return null;

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="main-header sticky top-0 z-40 shadow-sm">
                        <div className="container mx-auto px-6 flex justify-between items-center py-2">
                            <a href="#home"><img src={data.general.logoUrl} alt="Ibidem" className="h-16 md:h-20 w-auto"/></a>
                            <nav className="hidden md:flex space-x-8">
                                {NAV_ITEMS.map(item => (
                                    <a key={item.key} href={`#${item.key}`} className={`font-cinzel font-bold text-xs tracking-widest py-2 border-b-2 transition-all ${page===item.key ? 'text-pompeyano border-pompeyano' : 'text-texto border-transparent hover:text-pompeyano hover:border-bronce'}`}>{item.label}</a>
                                ))}
                            </nav>
                            <button className="md:hidden text-pompeyano" onClick={() => setMobileMenu(true)}><Icon path={Icons.Menu} size={28}/></button>
                        </div>
                    </header>

                    {mobileMenu && (
                        <div className="fixed inset-0 z-50 bg-pergamino flex flex-col items-center justify-center space-y-8 animate-fade-in">
                            <button onClick={() => setMobileMenu(false)} className="absolute top-6 right-6 text-pompeyano"><Icon path={Icons.X} size={40}/></button>
                            {NAV_ITEMS.map(item => (
                                <a key={item.key} href={`#${item.key}`} className="font-cinzel text-2xl font-bold text-texto tracking-widest" onClick={() => setMobileMenu(false)}>{item.label}</a>
                            ))}
                        </div>
                    )}

                    <main className="flex-grow">
                        {page === 'home' && <PageHome data={data} />}
                        {page === 'nostri' && <PageNostri data={data} />}
                        {page === 'civitas' && <PageCivitas data={data} />}
                        {/* El resto de páginas irían aquí según la lógica previa */}
                    </main>

                    <footer className="bg-texto text-pergamino py-16 border-t-8 border-pompeyano relative overflow-hidden">
                        <div className="container mx-auto px-6 text-center relative z-10">
                            <div className="flex justify-center gap-10 mb-10">
                                <a href={data.general.facebook} target="_blank" className="hover:text-pompeyano transition-colors"><Icon path={Icons.Facebook} size={28}/></a>
                                <a href={data.general.instagram} target="_blank" className="hover:text-pompeyano transition-colors"><Icon path={Icons.Instagram} size={28}/></a>
                                <button onClick={() => window.location.href=`mailto:${data.general.email}`} className="hover:text-pompeyano transition-colors"><Icon path={Icons.Mail} size={28}/></button>
                            </div>
                            <div className="flex justify-center flex-wrap gap-6 text-[10px] font-cinzel text-gray-500 mb-8 tracking-widest">
                                <button onClick={() => setLegalModal('legal')} className="hover:text-white uppercase">Aviso Legal</button>
                                <span>/</span>
                                <button onClick={() => setLegalModal('accesibilidad')} className="hover:text-white uppercase">Accesibilidad</button>
                            </div>
                            <p className="font-cinzel text-[10px] text-gray-600">&copy; {new Date().getFullYear()} ASOCIACIÓN CULTURAL IBÍDEM. MMXIV - MMXXIV</p>
                        </div>
                    </footer>

                    {legalModal && <LegalModal type={legalModal} onClose={() => setLegalModal(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
