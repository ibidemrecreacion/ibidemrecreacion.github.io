const parseDate = dateStr => {
  if (!dateStr) return new Date(0);
  try {
    const MONTHS = {
      enero: 0,
      febrero: 1,
      marzo: 2,
      abril: 3,
      mayo: 4,
      junio: 5,
      julio: 6,
      agosto: 7,
      septiembre: 8,
      octubre: 9,
      noviembre: 10,
      diciembre: 11
    };
    const parts = dateStr.toLowerCase().replace(/de /g, '').replace(/,/g, '').split(' ');
    let month = -1,
      day = 1,
      year = new Date().getFullYear();
    parts.forEach(part => {
      if (MONTHS[part] !== undefined) month = MONTHS[part];else if (parseInt(part) > 31) year = parseInt(part);else if (!isNaN(part)) day = parseInt(part);

const parseMarkdown = text => {

  text = text.replace(/(<li class="ml-6.*<\/li>\n?)+/g, '<ul class="list-none my-6">$&</ul>');

  text = text.replace(/\*(.+?)\*/g, '<em class="italic font-merriweather">$1</em>');

    const trimmed = p.trim();

};

    <script>
    /* Scroll reveal — activa cards al entrar en el viewport */
    (function () {
        'use strict';

        function revealCards() {
            /* Targets: .card-ibidem (Home + Fasti) y artículos del Tabularium */
            var cards = document.querySelectorAll(
                '.card-ibidem, .max-w-6xl article.group'
            );
            if (!cards.length) return;

            var obs = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) {
                        e.target.classList.add('in-view');
                        obs.unobserve(e.target);
                    }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

            var col = 0;
            cards.forEach(function (card) {
                /* No animar las que ya son visibles en pantalla */
                var r = card.getBoundingClientRect();
                if (r.top < window.innerHeight && r.bottom > 0) return;

                /* Efecto escalonado por columna (máx. 3) */
                card.classList.add('scroll-reveal');
                card.style.transitionDelay = (col % 3) * 85 + 'ms';
                col++;
                obs.observe(card);
            });
        }

        function run() { setTimeout(revealCards, 160); }

        /* Carga inicial */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', run);
        } else {
            run();
        }

        /* Cada vez que el SPA navega a otra página */
        window.addEventListener('popstate', run);
    })();
    </script>
