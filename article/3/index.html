        const normalizeTitle = (raw) => {
            if (!raw) return "Actividad";
            const upper = raw.toUpperCase();
            if (
                upper.includes("FVNVS")            ||
                upper.includes("MORIR EN LA ANTIGUA") ||
                upper.includes("ÚLTIMO VIAJE")     ||
                upper.includes("FVUNUS")

            if (

            ) return "LAS ROSAS DE HELIOGÁBALO";
            return raw;
        };

        /** Convierte una cadena de fecha en español a un objeto Date. */
        const parseDate = (dateStr) => {
            if (!dateStr) return new Date(0);
            try {
                const MONTHS = {
                    enero: 0, febrero: 1, marzo: 2, abril: 3, mayo: 4, junio: 5,
                    julio: 6, agosto: 7, septiembre: 8, octubre: 9, noviembre: 10, diciembre: 11,
                };
                const parts = dateStr.toLowerCase().replace(/de /g, '').replace(/,/g, '').split(' ');
                let month = -1, day = 1, year = new Date().getFullYear();
                parts.forEach(part => {
                    if (MONTHS[part] !== undefined) month = MONTHS[part];
                    else if (parseInt(part) > 31)   year  = parseInt(part);
                    else if (!isNaN(part))           day   = parseInt(part);
                });
                return month === -1 ? new Date(0) : new Date(year, month, day);
            } catch {
                return new Date(0);
            }
        };

        /**
         * Transforma un subconjunto de Markdown (negrita, cursiva, listas,
         * párrafos) a HTML seguro para dangerouslySetInnerHTML.
         */
        const parseMarkdown = (text) => {
            if (!text) return '';

            // Listas ordenadas
            text = text.replace(
                /^\d+\.\s+(.+)$/gm,
                '<li class="ml-6 pl-2 border-l-2 border-bronce mb-2">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ol class="list-none my-6">$&</ol>'
            );

            // Listas no ordenadas
            text = text.replace(
                /^[-•]\s+(.+)$/gm,
                '<li class="ml-6 relative before:content-[\'•\'] before:absolute before:-left-4 before:text-pompeyano">$1</li>'
            );
            text = text.replace(
                /(<li class="ml-6.*<\/li>\n?)+/g,
                '<ul class="list-none my-6">$&</ul>'
            );

            // Énfasis
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="font-bold text-pompeyano">$1</strong>');
            text = text.replace(/\*(.+?)\*/g,     '<em class="italic font-merriweather">$1</em>');

            // Párrafos
            return text
                .split('\n\n')
                .map(p => {
                    const trimmed = p.trim();
                    if (trimmed.startsWith('<ol') || trimmed.startsWith('<ul')) return trimmed;
                    return `<p class="mb-5 text-lg leading-relaxed">${trimmed.replace(/\n/g, '<br/>')}</p>`;
                })
                .join('');
        };

        /**
         * Igual que parseMarkdown pero añade la clase `first-para-drop-cap`
         * al primer <p> generado, para la letra capitular del artículo.
         * Se usa exclusivamente en el contenido de la primera sección.
         */
        /** Estima el tiempo de lectura en minutos (200 palabras/min) */
        const readingTime = (art) => {
            const text = [
                art.intro || '',
                ...(art.sections || []).map(s => [
                    s.content || '',
                    ...(s.subsections || []).map(ss => ss.content || '')
                ].join(' '))
            ].join(' ');
            const words = text.trim().split(/\s+/).length;
            const mins  = Math.max(1, Math.round(words / 200));
            return mins === 1 ? '1 min de lectura' : `${mins} min de lectura`;
        };

        const parseMarkdownWithDropCap = (text) => {

                )}
                <h2 className="font-cinzel text-4xl md:text-5xl font-bold text-texto leading-tight inline-block relative px-8 pb-4 border-b border-bronce">
                    {title}
                </h2>
            </div>

        const ScrollToTop = () => {
            const [visible, setVisible] = useState(false);
            useEffect(() => {
                const onScroll = () => setVisible(window.scrollY > 300);
                window.addEventListener("scroll", onScroll);
                return () => window.removeEventListener("scroll", onScroll);
            }, []);
            return (
                <button
                    onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                    aria-label="Volver arriba"
                    className={`fixed bottom-8 right-8 p-3 bg-pompeyano text-pergamino shadow-lg z-30 transition-all border border-pergamino ${visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                >
                    <Icon path={Icons.ArrowUp} size={20} />
                </button>
            );
        };

        const LegalModal = ({ type, onClose }) => {
            const titleId = "legal-modal-title";
            const closeBtnRef = useRef(null);
            useEffect(() => {
                if (closeBtnRef.current) closeBtnRef.current.focus();
                const onKey = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';
                return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
            }, []);
            if (!type || !LEGAL_TEXTS[type]) return null;
            const { title, content } = LEGAL_TEXTS[type];
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
                    onClick={onClose} role="presentation">
                    <div className="bg-pergamino p-8 max-w-2xl w-full border border-pompeyano shadow-2xl relative max-h-[85vh] flex flex-col"
                        onClick={e => e.stopPropagation()} role="dialog" aria-modal="true" aria-labelledby={titleId}>
                        <button ref={closeBtnRef} onClick={onClose} aria-label="Cerrar ventana"
                            className="absolute top-4 right-4 text-pompeyano hover:text-texto transition-colors">
                            <Icon path={Icons.X} size={24} />
                        </button>
                        <h3 id={titleId} className="font-cinzel text-2xl text-pompeyano mb-6 border-b border-bronce/30 pb-4 pr-8 flex-shrink-0">{title}</h3>
                        <div className="overflow-y-auto flex-grow">
                            <p className="font-merriweather text-sm text-texto leading-relaxed whitespace-pre-line">{content}</p>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── Páginas ─────────────────────────────────────────────────────────────

        const PageHome = ({ data }) => (
            <div className="fade-in">
                {/* Hero */}
                <section className="relative h-[60vh] md:h-[75vh] w-full mb-16 bg-texto border-b-4 border-pompeyano">
                    <div
                        className="absolute inset-0 bg-cover bg-center opacity-70 grayscale-[30%] contrast-125"
                        style={{ backgroundImage: `url(${data.general.heroImageHome})` }}
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-texto via-transparent to-transparent" />
                    <div className="absolute bottom-0 left-0 w-full p-6 md:p-16 bg-gradient-to-t from-black/80 to-transparent">
                        <div className="max-w-4xl border-l-4 border-pompeyano pl-6 md:pl-10">
                            <h1 className="font-merriweather text-2xl md:text-4xl italic text-pergamino leading-relaxed drop-shadow-md">
                                {data.home.heroTitle}
                            </h1>
                        </div>
                    </div>
                </section>

                {/* Intro */}
                <section className="max-w-3xl mx-auto mb-20 px-6 text-center">
                    <p className="text-xl md:text-2xl text-texto leading-relaxed font-merriweather font-light italic">
                        "{data.home.intro}"
                    </p>
                    <div className="separator-bronce mt-8" />
                </section>

                {/* Pilares */}
                <SectionHeader title="FVNDAMENTA" subtitle="Nuestros Pilares" />
                <div className="grid md:grid-cols-3 gap-8 mb-20 px-4 max-w-7xl mx-auto">
                    {data.home.pilares.map((pilar, index) => (
                        <article key={index} className="card-ibidem p-8 relative group">
                            <div className="absolute top-0 left-0 w-full h-1 bg-bronce group-hover:bg-pompeyano transition-colors" />
                            <div className="mb-6 opacity-20 group-hover:opacity-100 transition-opacity absolute top-4 right-4">
                                <span className="font-cinzel text-6xl text-pompeyano">{index + 1}</span>
                            </div>
                            <h3 className="font-cinzel text-xl font-bold text-pompeyano mb-4 relative z-10">{pilar.title}</h3>
                            <p className="text-texto mb-8 text-sm leading-relaxed font-merriweather relative z-10">{pilar.text}</p>
                            <a
                                href={`/${pilar.linkTo}`}
                                className="inline-block font-lato text-xs font-bold tracking-widest text-bronce hover:text-pompeyano border-b border-transparent hover:border-pompeyano uppercase transition-all"
                            >
                                Leer más
                            </a>
                        </article>
                    ))}
                </div>
            </div>
        );

        const PageNostri = ({ data }) => (
            <div className="fade-in px-4 py-8">
                <SectionHeader title="NOSTRI" subtitle="Nuestra Historia" />
                <div className="max-w-5xl mx-auto space-y-16">
                    <article className="columns-1 md:columns-2 gap-12 bg-pergamino-light p-8 md:p-12 border-y border-bronce/30">
                        {data.nostri.mainText.split('\n').map((p, i) => (
                            p.trim() && (
                                <p key={i} className="text-reading mb-6 indent-8 first:indent-0">{p}</p>
                            )
                        ))}
                    </article>
                    <article className="flex flex-col md:flex-row gap-8 items-center justify-center bg-white/50 p-8 border border-bronce/20 max-w-3xl mx-auto">
                        <div className="relative shrink-0">
                            <img
                                src={data.nostri.founder.image}
                                alt={`${data.nostri.founder.name}, fundador de Ibidem`}
                                className="w-40 h-40 rounded-full object-cover border-4 border-pergamino shadow-lg sepia-[20%]"
                            />
                            <div className="absolute inset-0 rounded-full border border-bronce opacity-50" />
                        </div>
                        <div className="text-center md:text-left">
                            <h4 className="font-cinzel text-2xl font-bold text-pompeyano mb-1">{data.nostri.founder.name}</h4>
                            <span className="font-lato text-xs text-bronce uppercase tracking-widest block mb-4">{data.nostri.founder.years}</span>
                            <p className="text-texto italic text-sm leading-relaxed text-justify hyphens-auto">{data.nostri.founder.desc}</p>
                        </div>
                    </article>
                </div>
            </div>
        );

        const getCountdown = (dateStr) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const eventDate = parseDate(dateStr);
            if (!eventDate || eventDate < today) return null;
            const diffDays = Math.round((eventDate - today) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return { label: '¡Hoy!',     urgente: true };
            if (diffDays === 1) return { label: '¡Mañana!',  urgente: true };
            if (diffDays <= 7)  return { label: `${diffDays} dies`,   urgente: true };
            return { label: `${diffDays} dies`, urgente: false };
        };

        const ActCard = ({ act, showCountdown = false }) => {
            const countdown = showCountdown ? getCountdown(act.lastEvent?.date) : null;
            return (
            <div
                role="button" tabIndex={0}
                onClick={() => navigate(`/activity/${encodeURIComponent(act.titulo)}`)}
                onKeyDown={e => e.key === 'Enter' && (navigate(`/activity/${encodeURIComponent(act.titulo)}`))}
                aria-label={`Ver detalle: ${act.titulo}`}
                className="snap-center min-w-[85vw] md:min-w-0 card-ibidem group relative cursor-pointer flex flex-col p-8 border-t-4 border-t-bronce hover:border-t-pompeyano hover:-translate-y-1 transition-all duration-300 shadow-sm md:shadow-none h-full">

                {countdown && (
                    <div className={`absolute top-0 right-0 px-3 py-1.5 font-lato font-bold text-[10px] uppercase tracking-widest flex items-center gap-1.5 ${countdown.urgente ? 'bg-pompeyano text-pergamino' : 'bg-bronce/20 text-bronce border border-bronce/30'}`}>
                        {countdown.urgente && (
                            <span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse inline-block" aria-hidden="true" />
                        )}
                        {countdown.label}
                    </div>
                )}

                <span className="font-lato text-xs font-bold text-ocre uppercase tracking-wider mb-2 block">{act.categoria}</span>
                <h3 className="font-cinzel text-xl font-bold text-texto mb-1 group-hover:text-pompeyano transition-colors">{act.titulo}</h3>
                {showCountdown && act.lastEvent?.date && (
                    <span className="font-merriweather text-xs italic text-bronce mb-4 block">{act.lastEvent.date}</span>
                )}
                {!showCountdown && <div className="mb-4" />}
                <div className="font-merriweather text-sm text-gray-700 leading-relaxed mb-6 line-clamp-4 flex-grow"
                    dangerouslySetInnerHTML={{ __html: parseMarkdown(act.descripcion.substring(0, 200) + '...') }} />
                <div className="mt-auto pt-4 border-t border-bronce/20 flex justify-between items-center">
                    <span className="font-lato text-xs text-bronce font-bold uppercase tracking-widest">
                        {act.count} {act.count === 1 ? 'Intervención' : 'Intervenciones'}
                    </span>
                    <span className="text-pompeyano md:opacity-0 group-hover:opacity-100 transition-opacity font-cinzel font-bold text-xl" aria-hidden="true">→</span>
                </div>
            </div>
            );
        };

        const buildGroups = (events) => {
            const groups = {};
            events.forEach(event => {
                const key = normalizeTitle(event.title || event.eventTitle || "Actividad");
                if (!groups[key]) groups[key] = {
                    titulo:      key,
                    descripcion: EXTENDED_DESCRIPTIONS[key] || event.desc,
                    categoria:   event.category || "Divulgación",
                    count: 0, lastEvent: event,
                };
                groups[key].count++;
                const isNewer = parseDate(event.date) > parseDate(groups[key].lastEvent.date);
                if (!EXTENDED_DESCRIPTIONS[key] && isNewer) {
                    groups[key].lastEvent   = event;
                    groups[key].descripcion = event.desc;
                }
            });
            return Object.values(groups);
        };

        const PageFasti = ({ data }) => {
            const { upcoming, past } = useMemo(() => {
                const allEvents = Array.isArray(data.fasti) ? data.fasti : [
                    ...(data.fasti.upcoming || []),
                    ...(data.fasti.past     || []),
                ];
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const upcomingRaw = allEvents.filter(e => parseDate(e.date) >= today);
                const pastRaw     = allEvents.filter(e => parseDate(e.date) <  today);
                return {
                    upcoming: buildGroups(upcomingRaw),
                    past:     buildGroups(pastRaw),
                };
            }, [data]);

            const Grid = ({ items, showCountdown = false }) => (
                <div className="flex overflow-x-auto snap-x snap-mandatory gap-6 pb-8 md:grid md:grid-cols-2 lg:grid-cols-3 md:gap-8 md:overflow-visible md:pb-0 -mx-4 px-4 md:mx-auto md:px-0 scrollbar-hide">
                    {items.map((act, idx) => <ActCard key={idx} act={act} showCountdown={showCountdown} />)}
                </div>
            );

            return (
                <div className="fade-in px-4 max-w-6xl mx-auto py-8">
                    <SectionHeader title="FASTI" subtitle="Actividades" />

                    {/* Próximas actividades */}
                    <section className="mb-16" aria-label="Próximas actividades">
                        <div className="flex items-center gap-4 mb-8 flex-wrap">
                            <h3 className="font-cinzel text-2xl font-bold text-texto">Proxima Eventa</h3>
                            {upcoming.length > 0 && (
                                <span className="inline-flex items-center gap-1.5 bg-pompeyano/10 border border-pompeyano/30 text-pompeyano font-lato text-[10px] font-bold uppercase tracking-widest px-3 py-1">
                                    <span className="w-1.5 h-1.5 rounded-full bg-pompeyano animate-pulse inline-block" aria-hidden="true"></span>
                                    Próximamente
                                </span>
                            )}
                        </div>
                        {upcoming.length > 0 ? (
                            <Grid items={upcoming} showCountdown={true} />
                        ) : (
                            <div className="bg-pergamino-light border border-bronce/20 p-10 md:p-14 text-center">
                                <p className="font-merriweather text-gray-500 italic text-sm mb-8">
                                    Non sunt agenda in praesenti.<br/>
                                    <span className="not-italic text-xs text-gray-400">Síguenos para estar al tanto de las próximas noticias.</span>
                                </p>
                                <div className="flex justify-center gap-6">
                                    <a href={data.general.facebook} target="_blank" rel="noopener noreferrer"
                                        aria-label="Ibidem en Facebook"
                                        className="flex flex-col items-center gap-2 text-bronce hover:text-pompeyano transition-colors group">
                                        <Icon path={Icons.Facebook} size={32} />
                                        <span className="font-lato text-[10px] uppercase tracking-widest">Facebook</span>
                                    </a>
                                    <a href={data.general.instagram} target="_blank" rel="noopener noreferrer"
                                        aria-label="Ibidem en Instagram"
                                        className="flex flex-col items-center gap-2 text-bronce hover:text-pompeyano transition-colors group">
                                        <Icon path={Icons.Instagram} size={32} />
                                        <span className="font-lato text-[10px] uppercase tracking-widest">Instagram</span>
                                    </a>
                                </div>
                            </div>
                        )}
                    </section>

                    <div className="separator-bronce mb-12" aria-hidden="true" />

                    {/* Catálogo de actividades pasadas */}
                    {past.length > 0 && (
                        <section aria-label="Catálogo de actividades">
                            <h3 className="font-cinzel text-2xl font-bold text-texto mb-8">Acta Priora</h3>
                            <Grid items={past} />
                        </section>
                    )}
                </div>
            );
        }
        const PageActivityDetail = ({ title, data }) => {
            const decodedTitle = decodeURIComponent(title);

            // Todos los eventos que corresponden a este título canónico, ordenados desc
            const activityData = useMemo(() => {
                const all = Array.isArray(data.fasti)
                    ? data.fasti
                    : [...(data.fasti.upcoming || []), ...(data.fasti.past || [])];
                return all
                    .filter(e => normalizeTitle(e.title || e.eventTitle) === decodedTitle)
                    .sort((a, b) => parseDate(b.date) - parseDate(a.date));
            }, [data, decodedTitle]);

            // Artículos del Tabularium relacionados por palabras clave del título
            const relatedArticles = useMemo(() => {
                if (!data.tabularium) return [];
                const keywords = decodedTitle
                    .split(/[:\s]+/)
                    .filter(w => w.length > 3)
                    .map(w => w.toUpperCase());
                return data.tabularium
                    .filter(art => keywords.some(k => art.title.toUpperCase().includes(k)))
                    .slice(0, 2);
            }, [data, decodedTitle]);

            if (activityData.length === 0) {
                return (
                    <div className="text-center py-20 font-cinzel">
                        Actividad no encontrada.{' '}
                        <a href="/fasti" className="text-pompeyano underline">Volver</a>
                    </div>
                );
            }

            const mainInfo    = activityData[0];
            const description = EXTENDED_DESCRIPTIONS[decodedTitle] || mainInfo.desc;

            return (
                <div className="fade-in px-4 py-8 max-w-5xl mx-auto">
                    <button
                        onClick={() => navigate('/fasti')}
                        className="mb-8 font-lato text-sm font-bold text-pompeyano uppercase tracking-widest flex items-center hover:underline"
                    >
                        <Icon path={Icons.ArrowLeft} className="mr-2" /> Volver al Catálogo
                    </button>

                    <SectionHeader title={decodedTitle} subtitle={mainInfo.category || "Actividad IBIDEM"} />

                    {/* Descripción principal */}
                    <div className="bg-pergamino-light p-8 md:p-12 border border-bronce/30 shadow-sm mb-16 relative">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-pergamino px-4">
                            <span className="font-cinzel text-pompeyano text-2xl">§</span>
                        </div>
                        <h3 className="text-center font-cinzel text-lg text-texto mb-6 font-bold">Características y Propósito</h3>
                        <div
                            className="font-merriweather text-lg text-gray-700 leading-relaxed text-justify"
                            dangerouslySetInnerHTML={{ __html: parseMarkdown(description) }}
                        />
                    </div>

                    {/* Lecturas relacionadas */}
                    {relatedArticles.length > 0 && (
                        <div className="mb-16 border-t border-bronce/30 pt-8">
                            <h3 className="font-cinzel text-xl font-bold text-texto mb-6 flex items-center gap-2">
                                <Icon path={Icons.Book} className="text-pompeyano" /> Lecturas Relacionadas (Tabularium)
                            </h3>
                            <div className="grid md:grid-cols-2 gap-6">
                                {relatedArticles.map(art => (
                                    <a
                                        key={art.id}
                                        href={`/article/${art.id}`}
                                        className="block bg-white border border-gray-200 p-4 hover:border-pompeyano transition-colors group"
                                    >
                                        <h4 className="font-cinzel font-bold text-texto group-hover:text-pompeyano text-sm mb-2">{art.title}</h4>
                                        <span className="font-lato text-[10px] text-gray-500 uppercase tracking-widest">Leer Artículo &rarr;</span>
                                    </a>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Historial de intervenciones */}
                    <div className="relative border-l-2 border-bronce ml-4 md:ml-0 md:border-none">
                        <h3 className="font-cinzel text-2xl font-bold text-texto mb-8 md:text-center pl-6 md:pl-0">
                            Historial de Intervenciones
                        </h3>
                        <div className="space-y-8 md:space-y-0 md:grid md:grid-cols-2 gap-8">
                            {activityData.map((evt, idx) => {
                                const album     = data.imagina ? data.imagina.find(a => a.id === evt.id) : null;
                                const hasGallery = !!album || (evt.images && evt.images.length > 0) || !!evt.coverImage;
                                return (
                                    <div
                                        key={idx}
                                        className="bg-white p-6 border border-gray-200 shadow-sm relative ml-6 md:ml-0 hover:shadow-md transition-shadow"
                                    >
                                        <div className="md:hidden absolute top-6 -left-[31px] w-4 h-4 rounded-full bg-pompeyano border-4 border-pergamino" />
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="font-lato text-xs text-bronce uppercase tracking-widest block mb-1">{evt.date}</span>
                                                <h4 className="font-cinzel text-lg font-bold text-texto">{evt.title || evt.eventTitle || decodedTitle}</h4>
                                                <span className="font-merriweather text-xs italic text-gray-500 block mt-1">
                                                    {evt.location.locality} — {evt.location.place}
                                                </span>
                                            </div>
                                            {hasGallery && <Icon path={Icons.Camera} className="text-pompeyano opacity-50" />}
                                        </div>
                                        {hasGallery ? (
                                            <a
                                                href={`/imagina/${evt.id}`}
                                                className="block w-full text-center py-2 mt-4 border border-pompeyano text-pompeyano font-lato text-xs font-bold uppercase tracking-widest hover:bg-pompeyano hover:text-white transition-colors"
                                            >
                                                Ver Reportaje Gráfico
                                            </a>
                                        ) : (
                                            <span className="block w-full text-center py-2 mt-4 border border-gray-200 text-gray-300 font-lato text-xs font-bold uppercase tracking-widest cursor-not-allowed">
                                                Sin Registro Gráfico
                                            </span>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const PageTabularium = ({ data }) => {
            const [filter, setFilter] = useState('TODOS');
            const [query,  setQuery]  = useState('');
            const categories = ['TODOS', ...new Set(data.tabularium.map(a => a.category))];
            const filtered = data.tabularium.filter(a => {
                const matchCat = filter === 'TODOS' || a.category === filter;
                const q = query.trim().toLowerCase();
                const matchQ = !q ||
                    a.title.toLowerCase().includes(q) ||
                    a.author.toLowerCase().includes(q) ||
                    (a.summary && a.summary.toLowerCase().includes(q));
                return matchCat && matchQ;
            });

            return (
                <div className="fade-in py-8">
                    <SectionHeader title="TABVLARIVM" subtitle="Archivo y Artículos" />

                    {/* Buscador */}
                    <div className="max-w-xl mx-auto mb-8 px-4">
                        <div className="relative">
                            <label htmlFor="tabularium-search" className="sr-only">Buscar artículos</label>
                            <input
                                id="tabularium-search"
                                type="search"
                                value={query}
                                onChange={e => setQuery(e.target.value)}
                                placeholder="Buscar por título, autor o contenido…"
                                className="w-full bg-white border border-bronce/50 p-3 pl-10 font-lato text-sm focus:border-pompeyano focus:ring-2 focus:ring-pompeyano/20 outline-none transition-colors"
                            />
                            <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-bronce" width="16" height="16"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                                aria-hidden="true" focusable="false">
                                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                            </svg>
                            {query && (
                                <button onClick={() => setQuery('')} aria-label="Limpiar búsqueda"
                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-bronce hover:text-pompeyano transition-colors">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true" focusable="false"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Filtros por categoría */}
                    <div className="flex justify-center flex-wrap gap-4 mb-12 px-4" role="group" aria-label="Filtrar por categoría">
                        {categories.map(cat => (
                            <button
                                key={cat}
                                onClick={() => setFilter(cat)}
                                aria-pressed={filter === cat}
                                className={`px-5 py-1 font-lato text-xs uppercase tracking-widest transition-all border ${
                                    filter === cat
                                        ? 'bg-texto text-pergamino border-texto'
                                        : 'bg-transparent text-texto border-bronce hover:border-pompeyano hover:text-pompeyano'
                                }`}>
                                {cat}
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 && (
                        <p className="text-center font-merriweather text-gray-500 italic py-16" role="status">
                            No se han encontrado artículos para tu búsqueda.
                        </p>
                    )}
                    <div className="max-w-6xl mx-auto px-4 grid md:grid-cols-2 gap-12">
                        {filtered.map(art => (
                            <article key={art.id} className="group bg-pergamino-light border border-transparent hover:border-bronce/30 transition-all duration-500">
                                <div className="aspect-video overflow-hidden relative">
                                    <img
                                        src={art.img}
                                        className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105 grayscale-[20%] group-hover:grayscale-0"
                                        alt={art.title}
                                        loading="lazy"
                                    />
                                    <span className="absolute bottom-0 left-0 bg-pompeyano text-pergamino px-3 py-1 text-[10px] font-lato font-bold uppercase tracking-widest">{art.category}</span>
                                </div>
                                <div className="p-8">
                                    <h3 className="font-cinzel text-xl md:text-2xl font-bold text-texto mb-3 leading-tight group-hover:text-pompeyano transition-colors">
                                        <a href={`/article/${art.id}`}>{art.title}</a>
                                    </h3>
                                    <div className="font-lato text-[10px] text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2 flex-wrap">
                                        <span>{art.date}</span>
                                        <span className="w-1 h-1 bg-bronce rounded-full" aria-hidden="true" />
                                        <span>{art.author}</span>
                                        <span className="w-1 h-1 bg-bronce rounded-full" aria-hidden="true" />
                                        <span>{readingTime(art)}</span>
                                    </div>
                                    <p className="font-merriweather text-sm text-gray-700 line-clamp-3 mb-6 text-reading">{art.summary}</p>
                                    <a href={`/article/${art.id}`} aria-label={`Leer artículo: ${art.title}`}
                                        className="text-pompeyano font-lato font-bold text-xs uppercase tracking-widest hover:underline flex items-center">
                                        Leer Artículo <Icon path={Icons.ArrowRight} className="ml-2" size={14} />
                                    </a>
                                </div>
                            </article>
                        ))}
                    </div>
                </div>
            );
        }
        const RelatedArticles = ({ art, data }) => {
            const related = useMemo(() => {
                if (!data.tabularium) return [];
                return data.tabularium
                    .filter(a => a.id !== art.id && a.category === art.category)
                    .slice(0, 3);
            }, [art, data]);

            if (related.length === 0) return null;

            return (
                <div className="mt-16 pt-8 border-t border-bronce/30">
                    <p className="font-lato text-[10px] uppercase tracking-[0.2em] text-bronce mb-6 text-center">
                        También en {art.category}
                    </p>
                    <div className="grid md:grid-cols-3 gap-6">
                        {related.map(r => (
                            <a key={r.id} href={`/article/${r.id}`}
                                className="group block bg-pergamino-light border border-bronce/20 hover:border-pompeyano transition-all duration-300">
                                <div className="aspect-video overflow-hidden">
                                    <img src={r.img} alt={r.title} loading="lazy"
                                        className="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 group-hover:scale-105 transition-all duration-500" />
                                </div>
                                <div className="p-4">
                                    <h4 className="font-cinzel text-sm font-bold text-texto group-hover:text-pompeyano transition-colors leading-snug mb-2 line-clamp-2">
                                        {r.title}
                                    </h4>
                                    <span className="font-lato text-[10px] text-bronce uppercase tracking-widest">{r.date}</span>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        const ShareBar = ({ art }) => {
            const [copied, setCopied] = useState(false);
            const url       = `${window.location.origin}/article/${art.id}`;
            const title     = encodeURIComponent(art.title);
            const urlEnc    = encodeURIComponent(url);
            const shareText = encodeURIComponent(`${art.title} — Ibidem Recreación Histórica`);

            const copyLink = async () => {
                try {
                    await navigator.clipboard.writeText(url);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch {
                    // Fallback para navegadores sin clipboard API
                    const ta = document.createElement('textarea');
                    ta.value = url; document.body.appendChild(ta);
                    ta.select(); document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            const shares = [
                {
                    label: 'Facebook',
                    icon:  Icons.Facebook,
                    href:  `https://www.facebook.com/sharer/sharer.php?u=${urlEnc}`,
                    color: 'hover:text-[#1877F2]',
                },
                {
                    label: 'X',
                    icon:  Icons.XTwitter,
                    href:  `https://x.com/intent/tweet?url=${urlEnc}&text=${shareText}`,
                    color: 'hover:text-[#000]',
                },
                {
                    label: 'WhatsApp',
                    icon:  Icons.WhatsApp,
                    href:  `https://wa.me/?text=${shareText}%20${urlEnc}`,
                    color: 'hover:text-[#25D366]',
                },
            ];

            return (
                <div className="mt-16 pt-8 border-t border-bronce/30">
                    <p className="font-lato text-[10px] uppercase tracking-[0.2em] text-bronce mb-4 text-center">
                        Compartir este artículo
                    </p>
                    <div className="flex justify-center items-center gap-5 flex-wrap">
                        {shares.map(s => (
                            <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer"
                                aria-label={`Compartir en ${s.label}`}
                                className={`flex flex-col items-center gap-1.5 text-bronce transition-colors ${s.color}`}>
                                <Icon path={s.icon} size={22} />
                                <span className="font-lato text-[9px] uppercase tracking-widest">{s.label}</span>
                            </a>
                        ))}
                        {/* Copiar enlace */}
                        <button onClick={copyLink} aria-label="Copiar enlace del artículo"
                            className={`flex flex-col items-center gap-1.5 transition-colors ${copied ? 'text-bronce' : 'text-bronce hover:text-pompeyano'}`}>
                            <Icon path={copied ? Icons.Check : Icons.Link} size={22} />
                            <span className="font-lato text-[9px] uppercase tracking-widest">
                                {copied ? '¡Copiado!' : 'Copiar enlace'}
                            </span>
                        </button>
                    </div>
                </div>
            );
        };

        const PageArticle = ({ id, data }) => {
            const art = data.tabularium.find(a => a.id == id);
            useEffect(() => {
                window.scrollTo(0, 0);
                // Schema.org Article para SEO
                const existing = document.getElementById('schema-article');
                if (existing) existing.remove();
                if (art) {
                    const schema = {
                        "@context": "https://schema.org",
                        "@type": "Article",
                        "headline": art.title,
                        "description": art.summary || art.intro?.substring(0, 160),
                        "image": art.img,
                        "author": { "@type": "Person", "name": art.author },
                        "publisher": {
                            "@type": "Organization",
                            "name": "Ibidem Recreación Histórica",
                            "url": "https://ibidemrecreacion.github.io"
                        },
                        "datePublished": art.date,
                        "mainEntityOfPage": {
                            "@type": "WebPage",
                            "@id": `${window.location.origin}/article/${art.id}`
                        }
                    };
                    const tag = document.createElement('script');
                    tag.id = 'schema-article';
                    tag.type = 'application/ld+json';
                    tag.textContent = JSON.stringify(schema);
                    document.head.appendChild(tag);
                }
                return () => {
                    const el = document.getElementById('schema-article');
                    if (el) el.remove();
                };
            }, [id]);
            if (!art) return null;

            return (
                <article className="max-w-4xl mx-auto bg-pergamino-light p-6 md:p-16 my-8 border border-bronce/10 shadow-sm fade-in">
                    <a
                        href="/tabularium"
                        className="inline-flex items-center text-bronce hover:text-pompeyano transition mb-8 font-lato text-xs font-bold uppercase tracking-widest"
                    >
                        <Icon path={Icons.ArrowLeft} size={14} className="mr-2" /> Volver al archivo
                    </a>

                    <header className="mb-12 text-center border-b border-bronce pb-8">
                        {art.antetitle && (
                            <span className="text-ocre font-lato font-bold text-xs tracking-[0.3em] uppercase block mb-4">{art.antetitle}</span>
                        )}
                        <h1 className="font-cinzel text-3xl md:text-5xl font-bold text-texto mb-6 leading-tight">{art.title}</h1>
                        <div className="font-lato text-sm text-gray-500 uppercase tracking-widest flex flex-wrap justify-center gap-x-3 gap-y-1">
                            <span>{art.date}</span>
                            <span aria-hidden="true">•</span>
                            <span className="text-pompeyano">{art.author}</span>
                            <span aria-hidden="true">•</span>
                            <span>{readingTime(art)}</span>
                        </div>
                    </header>

                    <div className="mb-10 relative">
                        <img src={art.img} className="w-full h-auto shadow-md sepia-[10%]" alt={art.caption || art.title} />
                        <div className="text-center mt-2 font-merriweather italic text-xs text-gray-500">{art.caption || art.title}</div>
                    </div>

                    <div className="prose prose-lg max-w-none font-merriweather text-texto text-reading">
                        {/* Introducción destacada (sin capitular) */}
                        <div className="text-xl md:text-2xl font-light italic leading-relaxed mb-10 pl-6 border-l-4 border-pompeyano text-gray-700">
                            <div dangerouslySetInnerHTML={{ __html: parseMarkdown(art.intro) }} />
                        </div>

                        {/* Secciones: la primera lleva capitular en su primer párrafo */}
                        {art.sections.map((sec, i) => (
                            <section key={i} className="mb-12 flow-root">
                                <h2 className="font-cinzel text-2xl font-bold text-pompeyano mb-6 mt-8">
                                    {sec.title}
                                </h2>
                                {sec.image && (
                                    <figure className="md:float-right md:w-5/12 md:ml-8 mb-6 mt-1 clear-right">
                                        <img
                                            src={sec.image.src || sec.image}
                                            className="w-full shadow-sm border border-gray-200 p-1 bg-white"
                                            alt={sec.image.caption || sec.title}
                                            loading="lazy"
                                        />
                                        {sec.image.caption && (
                                            <figcaption className="text-center text-xs italic text-gray-500 mt-2">{sec.image.caption}</figcaption>
                                        )}
                                    </figure>
                                )}
                                <div className={i === 0 ? 'drop-cap' : ''} dangerouslySetInnerHTML={{ __html: i === 0 ? parseMarkdownWithDropCap(sec.content) : parseMarkdown(sec.content) }} />

                                {sec.subsections && sec.subsections.map((sub, j) => (
                                    <div key={j} className="mt-8 ml-4 pl-4 border-l border-bronce/30 flow-root">
                                        <h3 className="font-cinzel text-lg font-bold text-texto mb-3">{sub.subtitle}</h3>
                                        {sub.image && (
                                            <figure className="md:float-right md:w-5/12 md:ml-6 mb-4">
                                                <img src={sub.image.src} className="w-full shadow-sm" alt="" />
                                                {sub.image.caption && (
                                                    <figcaption className="text-center text-xs italic text-gray-500 mt-2">{sub.image.caption}</figcaption>
                                                )}
                                            </figure>
                                        )}
                                        <div dangerouslySetInnerHTML={{ __html: parseMarkdown(sub.content) }} />
                                    </div>
                                ))}
                            </section>
                        ))}
                    </div>

                    {/* Bibliografía */}
                    {art.bibliography && (
                        <div className="mt-16 pt-8 border-t border-bronce/50 bg-white/30 p-8">
                            <h3 className="font-cinzel text-lg font-bold text-texto mb-4">Fontes (Bibliografía)</h3>
                            <ul className="space-y-2 font-lato text-sm text-gray-600">
                                {art.bibliography.map((b, i) => (
                                    <li key={i} className="pl-4 border-l-2 border-pompeyano/50">
                                        {typeof b === 'string'
                                            ? b
                                            : <span><strong className="text-texto">{b.author}</strong>. <em>{b.title}</em>. {b.publisher} ({b.year}).</span>
                                        }
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                    <RelatedArticles art={art} data={data} />
                    <ShareBar art={art} />
                </article>
            );
        };

        const PageImagina = ({ albumId, data, fotoIndex }) => {
            const [selected,      setSelected]      = useState(null);
            const [lightboxIndex, setLightboxIndex] = useState(null);
            const [copiedAlbum,   setCopiedAlbum]   = useState(false);
            const [copiedPhoto,   setCopiedPhoto]   = useState(false);
            const touchStartX = useRef(null);

            const albums = useMemo(() => {
                const combined = [...(data.imagina || [])];
                const events   = Array.isArray(data.fasti)
                    ? data.fasti
                    : [...(data.fasti.upcoming || []), ...(data.fasti.past || [])];
                events.forEach(e => {
                    if (combined.find(a => a.id === e.id)) return;
                    if (!e.images && !e.coverImage)         return;
                    const imgs = e.images ? [...e.images] : [];
                    if (e.coverImage && (!imgs[0] || imgs[0].src !== e.coverImage)) {
                        imgs.unshift({ src: e.coverImage });
                    }
                    if (imgs.length > 0) {
                        combined.push({
                            id: e.id, eventTitle: e.title || e.eventTitle,
                            date: e.date, coverImage: e.coverImage || imgs[0].src, images: imgs,
                        });
                    }
                });
                return combined.sort((a, b) => parseDate(b.date) - parseDate(a.date));
            }, [data]);

            // Cargar álbum y abrir foto si viene por URL (?foto=N)
            useEffect(() => {
                const alb = albumId ? albums.find(a => a.id == albumId) : null;
                setSelected(alb);
                if (alb && fotoIndex !== undefined && fotoIndex >= 0 && fotoIndex < alb.images.length) {
                    setLightboxIndex(fotoIndex);
                } else {
                    setLightboxIndex(null);
                }
            }, [albumId, fotoIndex, albums]);

            // Teclado + scroll lock + URL sync cuando el lightbox está abierto
            useEffect(() => {
                if (lightboxIndex === null || !selected) {
                    // Limpiar ?foto de la URL si existe
                    if (albumId && window.location.search.includes('foto')) {
                        window.history.replaceState({}, '', `/imagina/${albumId}`);
                    }
                    return;
                }
                const total = selected.images.length;
                // Actualizar URL con el número de foto (1-indexed)
                window.history.replaceState({}, '', `/imagina/${selected.id}?foto=${lightboxIndex + 1}`);

                const onKey = (e) => {
                    if (e.key === 'Escape')     { setLightboxIndex(null); }
                    if (e.key === 'ArrowRight') setLightboxIndex(i => Math.min(i + 1, total - 1));
                    if (e.key === 'ArrowLeft')  setLightboxIndex(i => Math.max(i - 1, 0));
                };
                window.addEventListener('keydown', onKey);
                document.body.style.overflow = 'hidden';
                return () => {
                    window.removeEventListener('keydown', onKey);
                    document.body.style.overflow = '';
                };
            }, [lightboxIndex, selected, albumId]);

            const closeLightbox = () => {
                setLightboxIndex(null);
                if (selected) window.history.replaceState({}, '', `/imagina/${selected.id}`);
            };

            const copyToClipboard = async (text, setCopied) => {
                try {
                    await navigator.clipboard.writeText(text);
                } catch {
                    const ta = document.createElement('textarea');
                    ta.value = text; document.body.appendChild(ta);
                    ta.select(); document.execCommand('copy');
                    document.body.removeChild(ta);
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            // ── Vista de álbum individual ─────────────────────────────────
            if (selected) {
                const total    = selected.images.length;
                const lbImg    = lightboxIndex !== null ? selected.images[lightboxIndex] : null;
                const albumUrl = `${window.location.origin}/imagina/${selected.id}`;
                const albumUrlEnc  = encodeURIComponent(albumUrl);
                const albumTxtEnc  = encodeURIComponent(`${selected.eventTitle} — Ibidem Recreación Histórica`);
                const photoUrl = lightboxIndex !== null
                    ? `${window.location.origin}/imagina/${selected.id}?foto=${lightboxIndex + 1}`
                    : albumUrl;

                const SHARE_LINKS = [
                    { label: 'Facebook', icon: Icons.Facebook, color: '#1877F2',
                      href: (u) => `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(u)}` },
                    { label: 'X',        icon: Icons.XTwitter,  color: '#000',
                      href: (u) => `https://x.com/intent/tweet?url=${encodeURIComponent(u)}&text=${albumTxtEnc}` },
                    { label: 'WhatsApp', icon: Icons.WhatsApp,  color: '#25D366',
                      href: (u) => `https://wa.me/?text=${albumTxtEnc}%20${encodeURIComponent(u)}` },
                ];

                return (
                    <React.Fragment>

                        {/* ── Lightbox — portal a document.body para escapar del
                             stacking context de <main z-10> y aparecer sobre
                             el <header z-40>                                   */}
                        {lightboxIndex !== null && lbImg && ReactDOM.createPortal(
                            <div
                                onClick={closeLightbox}
                                onTouchStart={e => { touchStartX.current = e.touches[0].clientX; }}
                                onTouchEnd={e => {
                                    if (touchStartX.current === null) return;
                                    const diff = touchStartX.current - e.changedTouches[0].clientX;
                                    touchStartX.current = null;
                                    if (Math.abs(diff) < 40) return;
                                    if (diff > 0 && lightboxIndex < total - 1) setLightboxIndex(i => i + 1);
                                    if (diff < 0 && lightboxIndex > 0)         setLightboxIndex(i => i - 1);
                                }}
                                role="dialog" aria-modal="true" aria-label="Visor de imágenes"
                                style={{
                                    position: 'fixed',
                                    top: 0, left: 0, right: 0, bottom: 0,
                                    zIndex: 9999,
                                    background: 'rgba(0,0,0,0.96)',
                                }}
                            >
                                {/* Botón cerrar — claramente distinguible de los iconos de compartir */}
                                <button
                                    autoFocus
                                    aria-label="Cerrar visor"
                                    onClick={e => { e.stopPropagation(); closeLightbox(); }}
                                    style={{
                                        position:   'absolute',
                                        top:        '12px',
                                        right:      '16px',
                                        zIndex:     10,
                                        display:    'flex',
                                        alignItems: 'center',
                                        gap:        '6px',
                                        background: 'rgba(255,255,255,0.1)',
                                        border:     '1px solid rgba(255,255,255,0.25)',
                                        borderRadius:'4px',
                                        cursor:     'pointer',
                                        color:      'rgba(255,255,255,0.85)',
                                        padding:    '5px 10px 5px 8px',
                                        lineHeight: 1,
                                    }}
                                >
                                    <Icon path={Icons.X} size={16} />
                                    <span style={{ fontFamily:'Lato,sans-serif', fontSize:'0.7rem',
                                                   letterSpacing:'0.1em', textTransform:'uppercase' }}>
                                        Cerrar
                                    </span>
                                </button>

                                {/* Franja anterior */}
                                <div
                                    onClick={e => { e.stopPropagation(); if (lightboxIndex > 0) setLightboxIndex(i => i - 1); }}
                                    style={{
                                        position: 'absolute', top: 0, left: 0, bottom: 0, width: '64px',
                                        zIndex: 5, display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        cursor: lightboxIndex > 0 ? 'pointer' : 'default',
                                        color:  lightboxIndex > 0 ? 'rgba(255,255,255,0.5)' : 'transparent',
                                    }}
                                >
                                    {lightboxIndex > 0 && <Icon path={Icons.ChevronLeft} size={36} />}
                                </div>

                                {/* Imagen — top:0 porque el portal está sobre el header */}
                                <div
                                    onClick={e => e.stopPropagation()}
                                    style={{
                                        position: 'absolute',
                                        top: '48px', left: '64px', right: '64px', bottom: '88px',
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        overflow: 'hidden',
                                    }}
                                >
                                    <img
                                        key={lbImg.src}
                                        src={lbImg.src}
                                        alt={lbImg.caption || `Foto ${lightboxIndex + 1} de ${total}`}
                                        style={{
                                            maxWidth: '100%', maxHeight: '100%',
                                            width: 'auto', height: 'auto',
                                            objectFit: 'contain', display: 'block',
                                        }}
                                    />
                                </div>

                                {/* Franja siguiente */}
                                <div
                                    onClick={e => { e.stopPropagation(); if (lightboxIndex < total - 1) setLightboxIndex(i => i + 1); }}
                                    style={{
                                        position: 'absolute', top: 0, right: 0, bottom: 0, width: '64px',
                                        zIndex: 5, display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        cursor: lightboxIndex < total - 1 ? 'pointer' : 'default',
                                        color:  lightboxIndex < total - 1 ? 'rgba(255,255,255,0.5)' : 'transparent',
                                    }}
                                >
                                    {lightboxIndex < total - 1 && <Icon path={Icons.ChevronRight} size={36} />}
                                </div>

                                {/* Pie: caption + compartir + contador */}
                                <div
                                    onClick={e => e.stopPropagation()}
                                    style={{
                                        position: 'absolute', bottom: 0, left: 0, right: 0,
                                        padding: '8px 80px 14px', textAlign: 'center', zIndex: 6,
                                    }}
                                >
                                    {lbImg.caption && (
                                        <p style={{
                                            color: 'rgba(255,255,255,0.72)', fontFamily: 'Merriweather,serif',
                                            fontSize: '0.78rem', fontStyle: 'italic',
                                            marginBottom: '8px', lineHeight: 1.5,
                                        }}>
                                            {lbImg.caption}
                                        </p>
                                    )}
                                    <div style={{
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        gap: '18px', marginBottom: '6px',
                                    }}>
                                        {SHARE_LINKS.map(s => (
                                            <a key={s.label} href={s.href(photoUrl)}
                                                target="_blank" rel="noopener noreferrer"
                                                aria-label={`Compartir foto en ${s.label}`}
                                                onClick={e => e.stopPropagation()}
                                                style={{ color: 'rgba(255,255,255,0.35)', lineHeight: 0, textDecoration: 'none' }}
                                                onMouseOver={e => e.currentTarget.style.color = s.color}
                                                onMouseOut={e => e.currentTarget.style.color = 'rgba(255,255,255,0.35)'}
                                            >
                                                <Icon path={s.icon} size={17} />
                                            </a>
                                        ))}
                                        <button
                                            aria-label="Copiar enlace de esta foto"
                                            onClick={e => { e.stopPropagation(); copyToClipboard(photoUrl, setCopiedPhoto); }}
                                            style={{
                                                background: 'none', border: 'none', cursor: 'pointer',
                                                lineHeight: 0, padding: 0,
                                                color: copiedPhoto ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.35)',
                                            }}
                                        >
                                            <Icon path={copiedPhoto ? Icons.Check : Icons.Link} size={17} />
                                        </button>
                                    </div>
                                    <p style={{
                                        color: 'rgba(255,255,255,0.22)', fontFamily: 'Lato,sans-serif',
                                        fontSize: '0.6rem', letterSpacing: '0.12em', textTransform: 'uppercase',
                                    }}>
                                        {lightboxIndex + 1} / {total}
                                    </p>
                                </div>
                            </div>,
                            document.body
                        )}

                        {/* ── Galería masonry ───────────────────────────────── */}
                        <div className="fade-in py-8" style={{ background: 'var(--color-pergamino)' }}>
                            <div className="max-w-7xl mx-auto px-3 md:px-6">
                                <button onClick={() => navigate('/imagina')}
                                    className="mb-6 font-lato text-sm font-bold text-pompeyano uppercase tracking-widest flex items-center hover:underline">
                                    <Icon path={Icons.ArrowLeft} className="mr-2" /> Regresar a la Galería
                                </button>
                                <SectionHeader title={selected.eventTitle} subtitle={selected.date} />

                                {/* Compartir bajo el título */}
                                <div className="flex justify-center items-center gap-5 mb-10 -mt-4">
                                    {SHARE_LINKS.map(s => (
                                        <a key={s.label} href={s.href(albumUrl)}
                                            target="_blank" rel="noopener noreferrer"
                                            aria-label={`Compartir galería en ${s.label}`}
                                            style={{ textDecoration:'none' }}
                                            className="text-bronce transition-colors hover:text-pompeyano"
                                            onMouseOver={e => e.currentTarget.style.color = s.color}
                                            onMouseOut={e => e.currentTarget.style.color = ''}>
                                            <Icon path={s.icon} size={20} />
                                        </a>
                                    ))}
                                    <button onClick={() => copyToClipboard(albumUrl, setCopiedAlbum)}
                                        aria-label="Copiar enlace de la galería"
                                        className="text-bronce hover:text-pompeyano transition-colors"
                                        style={{ background:'none', border:'none', cursor:'pointer', lineHeight:0, padding:0 }}>
                                        <Icon path={copiedAlbum ? Icons.Check : Icons.Link} size={20} />
                                    </button>
                                </div>


                                <div className="masonry-grid"
                                    style={{ columnCount:'var(--cols)', columnGap:'10px', '--cols':2 }}>
                                    <style>{`
                                        @media (min-width:640px)  { .masonry-grid { --cols: 3 !important; } }
                                        @media (min-width:1024px) { .masonry-grid { --cols: 4 !important; } }
                                        .pin-card { break-inside:avoid; margin-bottom:10px; cursor:zoom-in; }
                                        .pin-card img { display:block; width:100%; height:auto;
                                                        border-radius:10px; transition:transform 0.3s ease; }
                                        .pin-card:hover img { transform:scale(1.02); }
                                    `}</style>
                                    {selected.images.map((img, i) => (
                                        <div key={i} className="pin-card"
                                            onClick={() => setLightboxIndex(i)}
                                            role="button" tabIndex={0}
                                            onKeyDown={e => e.key === 'Enter' && setLightboxIndex(i)}
                                            aria-label={`Ampliar foto ${i + 1}${img.caption ? ': ' + img.caption : ''}`}>
                                            <div style={{ borderRadius:'10px', overflow:'hidden', background:'#e8e3d9' }}>
                                                <img src={img.src} loading="lazy" alt="" />
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* ── Compartir álbum ───────────────────────── */}
                                <div className="mt-16 pt-8 border-t border-bronce/30">
                                    <p className="font-lato text-[10px] uppercase tracking-[0.2em] text-bronce mb-4 text-center">
                                        Compartir esta galería
                                    </p>
                                    <div className="flex justify-center items-center gap-5 flex-wrap">
                                        {SHARE_LINKS.map(s => (
                                            <a key={s.label} href={s.href(albumUrl)}
                                                target="_blank" rel="noopener noreferrer"
                                                aria-label={`Compartir galería en ${s.label}`}
                                                className="flex flex-col items-center gap-1.5 text-bronce transition-colors"
                                                style={{ textDecoration:'none' }}
                                                onMouseOver={e => e.currentTarget.style.color = s.color}
                                                onMouseOut={e => e.currentTarget.style.color = ''}>
                                                <Icon path={s.icon} size={22} />
                                                <span className="font-lato text-[9px] uppercase tracking-widest">{s.label}</span>
                                            </a>
                                        ))}
                                        <button onClick={() => copyToClipboard(albumUrl, setCopiedAlbum)}
                                            aria-label="Copiar enlace de la galería"
                                            className="flex flex-col items-center gap-1.5 text-bronce hover:text-pompeyano transition-colors"
                                            style={{ background:'none', border:'none', cursor:'pointer' }}>
                                            <Icon path={copiedAlbum ? Icons.Check : Icons.Link} size={22} />
                                            <span className="font-lato text-[9px] uppercase tracking-widest">
                                                {copiedAlbum ? '¡Copiado!' : 'Copiar enlace'}
                                            </span>
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </React.Fragment>
                );
            }

            // ── Cuadrícula de álbumes ─────────────────────────────────────
            return (
                <div className="fade-in px-4 py-8">
                    <SectionHeader title="IMAGINA" subtitle="Archivo Visual" />
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
                        {albums.map(alb => (
                            <a key={alb.id} href={`/imagina/${alb.id}`}
                                className="group relative block overflow-hidden bg-texto aspect-[4/3] border-4 border-white shadow-lg">
                                <img src={alb.coverImage}
                                    className="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700"
                                    alt="" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent opacity-90" />
                                <div className="absolute bottom-0 left-0 p-6 w-full">
                                    <span className="font-lato text-[10px] text-ocre uppercase tracking-widest mb-1 block">{alb.date}</span>
                                    <h3 className="font-cinzel text-xl text-white font-bold">{alb.eventTitle}</h3>
                                    <span className="font-lato text-xs text-gray-300 mt-2 block group-hover:text-pompeyano transition-colors uppercase tracking-widest">
                                        Ver Colección &rarr;
                                    </span>
                                </div>
                            </a>
                        ))}
                    </div>
                </div>
            );
        };

        const Page404 = () => (
            <div className="fade-in flex flex-col items-center justify-center min-h-[60vh] px-6 text-center">
                <p className="font-cinzel text-8xl md:text-9xl font-bold text-bronce/20 leading-none select-none mb-4" aria-hidden="true">
                    IV·IV
                </p>
                <h1 className="font-cinzel text-2xl md:text-3xl font-bold text-texto mb-4">
                    Página no encontrada
                </h1>
                <p className="font-merriweather text-gray-600 text-sm leading-relaxed max-w-sm mb-10 italic">
                    «Navigare necesse est.» El camino que buscas no existe o ha cambiado de lugar.
                </p>
                <a href="/"
                    className="inline-block bg-pompeyano text-white font-cinzel text-sm font-bold py-3 px-10 hover:bg-red-900 transition-colors">
                    Volver a la Domus
                </a>
            </div>
        );

        const PageCivitas = ({ data }) => {
            const [formStatus, setFormStatus] = useState('idle');
            const handleSubmit = async (e) => {
                e.preventDefault();
                setFormStatus('sending');
                const formData = new FormData(e.target);
                try {
                    // IMPORTANTE: sustituye TU_FORM_ID por tu ID de Formspree
                    // Créalo gratis en https://formspree.io → New Form → copia el ID
                    const res = await fetch('https://formspree.io/f/TU_FORM_ID', {
                        method: 'POST', body: formData,
                        headers: { 'Accept': 'application/json' },
                    });
                    if (res.ok) { setFormStatus('ok'); e.target.reset(); }
                    else        { setFormStatus('error'); }
                } catch { setFormStatus('error'); }
            };
            return (
                <div className="fade-in px-4 py-8 max-w-3xl mx-auto">
                    <SectionHeader title="CIVITAS" subtitle="Contacto" />
                    <div className="bg-pergamino-light border border-bronce/30 p-8 md:p-12 shadow-sm">
                        <div className="mb-10 text-center">
                            <div className="separator-bronce mb-6" aria-hidden="true" />
                            <p className="font-merriweather text-base text-gray-700 leading-relaxed max-w-xl mx-auto">
                                ¿Tienes alguna consulta, deseas colaborar con nosotros o simplemente quieres ponerte en contacto?
                                Escríbenos y te responderemos a la mayor brevedad posible.
                            </p>
                        </div>
                        <form onSubmit={handleSubmit} noValidate aria-label="Formulario de contacto">
                            {/* Honeypot anti-spam — los bots rellenan este campo; Formspree rechaza esos envíos */}
                            <input type="text" name="_gotcha" style={{display:'none'}} tabIndex={-1} autoComplete="off" aria-hidden="true" />
                            <div className="space-y-5">
                                <div>
                                    <label htmlFor="c-nombre" className="block font-lato text-xs font-bold uppercase tracking-widest text-bronce mb-2">Nombre y apellidos <span className="text-pompeyano" aria-hidden="true">*</span></label>
                                    <input id="c-nombre" name="nombre" type="text" required autoComplete="name" placeholder="Cómo te llamamos"
                                        className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano focus:ring-2 focus:ring-pompeyano/20 outline-none transition-colors" />
                                </div>
                                <div>
                                    <label htmlFor="c-email" className="block font-lato text-xs font-bold uppercase tracking-widest text-bronce mb-2">Correo electrónico <span className="text-pompeyano" aria-hidden="true">*</span></label>
                                    <input id="c-email" name="email" type="email" required autoComplete="email" placeholder="tu@correo.es"
                                        className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano focus:ring-2 focus:ring-pompeyano/20 outline-none transition-colors" />
                                </div>
                                <div>
                                    <label htmlFor="c-motivo" className="block font-lato text-xs font-bold uppercase tracking-widest text-bronce mb-2">Motivo de la consulta</label>
                                    <select id="c-motivo" name="motivo"
                                        className="w-full bg-white border border-gray-300 p-3 font-lato text-sm focus:border-pompeyano focus:ring-2 focus:ring-pompeyano/20 outline-none transition-colors">
                                        <option value="">— Selecciona una opción —</option>
                                        <option value="informacion">Información general</option>
                                        <option value="ingreso">Solicitud de ingreso como socio</option>
                                        <option value="contratacion">Contratación de servicios</option>
                                        <option value="prensa">Prensa y medios</option>
                                        <option value="otro">Otro</option>
                                    </select>
                                </div>
                                <div>
                                    <label htmlFor="c-mensaje" className="block font-lato text-xs font-bold uppercase tracking-widest text-bronce mb-2">Mensaje <span className="text-pompeyano" aria-hidden="true">*</span></label>
                                    <textarea id="c-mensaje" name="mensaje" rows={5} required placeholder="Escribe aquí tu mensaje..."
